body:
  text: 第二十一回造謠言片語驚心除牌子雙棲遂願卻説慶如自君實處出來正要到迎春坊告知林林這番創舉卻見小牧自後趕上道慶如今日香海報上不知那個叫化子造你謠言你曾見麼慶如愕然道沒有小牧從袖中取出一張小報來慶如接過只見上寫著道迎春坊茶花第二樓武林林與東方亞猛水乳交融恩情固結聞節後決計從良奉來賄遷其樂何如惟聞東方亞猛為會黨中人將來不無株連之慮我為武林林危之慶如看罷不由不怒氣上沖道什麼人這般胡説我同會黨宗旨不合毫無干涉如何説我是會黨中人呢小牧道我到報館裏問過原來就是華中茂叫他上的他們怕他的勢力不敢不上據説原稿還要利害經他們改輕了才上的據我看來這華中茂與你結怨甚深大有傾陷之意他的機械百出你要格外小心方好慶如聽了身上冷了半截只得謝了小牧匆匆回來一一的告與林林林林大怒道這華中茂真不是東西我又不曾得罪了你你造這種謠言幹甚至於我不肯與你要好那是你程度不夠你不怨自己反怨別人慶如我從前拿他比那傻伯爵此刻看來伯爵不過是傻子罷了卻沒有他這種陰險我倒要奮發我的才智要與他大做一場呢慶如勸道忍些氣罷這個人豈是好惹的他一動手連外國人都怕他的我們還是收斂些為妙林林沈吟道也罷此刻端節快了一過節我們就除去牌子搬到公館房子裏去住那時深居簡出就不怕他了慶如點點原來上海北裏的規矩所有欠出的酒局帳都是按三節收取卻決不能收到十成只因上海的滑頭最多他們雖是穿著的好看其實不名一錢平日大吃大喝招搖過市一到節間都是匿迹消聲躲在家裏不敢出來把酒局等帳付之一漂好在這種債務是不能經官控追的所以放心膽大毫不要緊一過於節依然出世不過冤家路窄如果在馬路中遇見不免要剝衣出醜因此他們又生出一付計劃只盼望所做的相好嫁人或是死了就有詞可藉奉旨奉憲的漂帳即使這人並不嫁人也要造許多謠言説他要嫁好讓大家漂局這小報就是他們的扒問了那時被誣的人須要立刻聲明更正還好挽回不然此説一傳就要分文無著林林只顧避害卻沒有想到這一層到了節間收數十分短少但他所欠的帳曉得他要不做了都來逼索不肯挂欠林林只得將歷年積蓄盡數取出還清各項方才停妥那日是端節上一日有虹口華公館裏華大人派一當差的人來叫娘姨阿寶到他公館裏去有要言吩咐阿寶進來告訴林林道華大人差人來喊只怕要開銷局帳罷林林沈吟道局帳他不會送來恐怕是另有緣故你只管去就是阿寶應諾到華公館來果然架子極大顯赫非常管門的引到書房中坐了一會只見華中茂腆著肚子出來指著凳子叫阿寶坐下自己踞在炕上哼吃吃的説道阿寶俺今天叫你到來非為別事只為俺前日看見香海報上登你先生要嫁人了俺很歡喜但是上海人也很多為什麼一定要嫁給那個什麼東方亞猛俺不曉得你先生看上他那幾樣若説他是前任上海縣的侄兒有些威勢此刻他的叔子早已死了若説他是個財主俺聽見人説他去年年底的帳只還得一半至今沒有還清看來是個窮鬼至於他這個留學生更是沒用的了今年京裏大考他的同學都去考得高升三級只有他自己曉得沒有學問決考不上所以不敢前去只靠著一張嘴在堂子裏騙人也是你先生的晦氣上了他的當此刻索性要嫁他起來了你們跟他一場要勸勸才是阿寶道俺們也曾勸過幾次怎奈不肯聽那項大少俺們看來也不覺得怎的如今聽你大人説了果真有些不妥當待俺回去極力的阻擋便了中茂道還有一件事要你回去對你先生説像俺這種年紀你先生是不歡喜的俺也不敢想吃這天鵝肉此刻有一頭好親事待我來做個媒你如果幫我説成了必有千金重謝你你道是什麼人家呢説起來真要嚇死人乃是京中的王大人他上月有信來托我代他要一位才貌雙全的側夫人這王大人年紀很輕不過二十幾歲相貌生得十全也曾出過洋卻已做到六部尚書的地位是當今老佛爺最信用的人不久就要封王拜相真是一人之下萬人之上普天下那一個及得他來他卻於溫柔鄉里著實講究是個風流不過的人論他的家財足有大半個天下別的不講只上午做一回壽就收了一百萬你想還有數麼這種去處才不辱沒了你先生的才貌難道一定要跟那窮酸苦惱一世麼至於聘金添妝等項或是一萬或是二萬只要你先生開一開口總照上海沒有出的數好在我同王大人交情很深這錢我送了他也好報答你先生一番待我的情你也好在這裏頭做起一個家當來呢阿寶聽了喜逐顔開連聲道謝道難得你大人這般用情真是恩德無量俺先生聽得有這般好處那有不願之理待我立刻回去告訴了他只怕還要喜壞他哩説罷便站起告辭中茂將他肩上一拍道你必格外留意成全了這事豎起一個大指道一千現洋送你獨享阿寶含笑辭回一路好生徼幸見了林林把上項事一一説知還加了許多慫恿的話頭卻因慶如在旁沒有説出中茂謗毀的話林林頓時大怒指著阿寶罵道你這冒失鬼你聽了這種卑鄙不堪的言語還敢到我這裏來轉述難道你不會當場搶白他麼王大人又是怎麼牛不喝水強按頭我不喜歡就是天上的神仙當今的皇帝不許他覷我一覷我要喜歡就是叫化子也由得我要好那些臭富貴臭金銀只好嚇嚇別人倒要想哄動老娘不要迷糊了你們的心了罵得阿寶怒氣衝天骨都著嘴道我是好意為你又不是我的話肯不肯在你那個受你這種罵賭氣把簾子一掀喃喃的出去了林林自覺一時氣頭上過分了些也不理他慶如呆子半晌道林林這件事倒不好措置哩這工尚書是有名的一個色鬼平日招權納賄無所不為這華中茂確是他一個得力的走狗專在上海替他藏私搜羅美色這件事他要説到就能做到如果實行起來此刻暗昧世界只怕就要有些不測之變你我倒要善處為妙林林沈吟許久道有了華中茂那廝所怕的是我嫁你所以吃這寡醋若曉得我沒有嫁也就寬下來了如今可差阿寶去回復他只説下節不過歇夏並不嫁人過了中秋原要應局的所有京裏的事到那時再議好在歇夏上海是行的他也不好阻我了慶如道這樣回他只好緩過一時久後如何好呢林林道等他寬緩了些我們就揀地方去旅行給他一個溜之乎也好麼慶如道也只好如此便喊阿寶進來叫他去説阿寶道這樣還好只是我本沒有生意先生歇夏我是要跟去的林林曉得阿寶捨不得這媒金還想後來亨用只得答應阿寶自去了這裏慶如租定了新馬路梅壽裏一所房屋三樓兩廂把自己行裝也就遷入因有華中茂一番打吒不好稱為納妾變成上海人所謂租小房子了一至初六那天林林坐了一頂轎子由迎春坊遷新馬路來阿寶阿招兩人跟去把茶花第二樓匾額依舊懸挂起來好在説是歇夏所以出院時毫無開銷不比嫁人要犒賞喜封這一遷在慶如林林要算遂心如意的了
