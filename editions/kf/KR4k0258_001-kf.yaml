body:
  text: 第一回錯中錯悟繁華一夢情外情談影事前塵春申十裏繁華地數得巴黎第二群玉坊頭恩談街上一樣花魂遊戲湘簾斐幾有白袷才人青樓妙伎一段風流盡教播入管弦裏滄桑幾番閱遍歎離奇社會情場轉變馬克無雙武大絕豔散出自由種子鶯花小史卻吸收文明包羅政見無限傷心讓美血淚調寄齊天樂話說男女愛情本是天地生成的雖說是與生俱生與死俱死卻未生之前先已有了根柢已死之後常留無限波瀾所以愛情到了熱極之時覺得天可以傾地可以陷山可以崩好綿綿的情仍是比金剛愈堅比乙太更具永不磨不滅的樣兒據科學家說男女身上有陰陽兩電得此吸引就是隔著千年萬年千里萬里電力不減即愛情不滅你道永我不永久所以男女相遇除非了不起愛情不發電力還可以彼此無關若是腦海中留了一點影子就要弄出生生死死希希奇奇的事來隨便嚴刑峻法禮的路義防也不過說說罷了何會真能夠把已起的愛情已發的電力生生的遏滅了呢倒是順其自然或者代爲疏通尚可以隱藏於密不致激而生變但看空中的雷電順了防雷鐵直流地下再無轟裂之患若是不加防備那高堂大廈就不免毀于雷火了支那自古相傳的男女制過嚴平日不相交接不相往來直至合巹之時方扭做一堆不要說配合不由自主未必得宜不免生了外心就使兩情愛悅銖兩相稱但是未合巹之前無論種種拘禁不過拘得身如何能拘得心在男子有世務縈心尚可排解那女子幽禁深閨到了花朝月夕難保不春心暗動彼此萬難排遣就有乘隙躍牆的事做出來了就算那女子守禮謹嚴不肯躍閒蕩檢只是腦電已發不可複收便要釀出厭厭歉歉傷春的症候了並且向來不曾閱曆得精透不免要愛情妄用鍾愛於闒茸不堪佻亻迖無行的男子迨至時物變遷郎君薄幸東流溝水西去伯勞可憐那無瑕白璧已經有不磨之玷了這其間怨憤輕生古往今來不知凡幾合這兩項看來不知傷多少天地之和哩倒不知預先放他們男女彼此往來熟習再加自幼讀書通曉學問眼光也精了主意也老了不要說平常些的男子哪里在他眼上就真真是個好人物也要算計得周密估量得實在真能個一竹竿打到底主肯把葳蕤妙質會托於他白首如新青蠅無玷你道不出閨門的女子做得到麽怪不得春情發動要吃那無邊的苦呢看官你道這幾句說話是做書的說的麽呵呵其實不然還記得那一天晚上我偶然吃了幾杯酒薰薰然向一隻睡椅上橫臥才覺身子已出了門那路上花明柳暗塵香真是無窮景致信步行來陡見前面一座白玉牌樓大書著香海兩字裏邊卻有無數金迷紙醉的地方粉白黛綠的人物我那時心裏迷迷糊糊的走了進去不知曆了多少昏朝多少所在至今一些想不出卻記得走過一所高樓明煌煌的寫著茶花第二樓五個大字上面卻湘簾半卷花影參差隱隱約約一個少年在那裏引杯痛飲擊節狂歌不一會立起身來在粉壁之上題著一首新詞剛剛寫完頓時酒上湧上來往後便倒口角間卻流出血來那裏我心中大駭奔上樓去杯要想救他那知上得樓來樓中卻空空洞洞一無所有少年也不見了只有一本書掉在中間上面題著新茶花的簽條揭開看時原來便是這少年和那樓中美人的歷史原原本本一覽無遺不覺點頭道原來如此就將少年方題的齊開樂詞抄下來做個弁首倒也相稱便自言自語道我好僥悻走到此處卻得了這本稿子如今待我攜回去托申江小說社刻印出來給大家看只怕也不輸次序紅生的茶花女哩正要下樓不防簾兒一閃像花間夾蝶一般飛進一個美人嬌聲喝道偷書賊要往那裏去我心中一樣呆政權要訴說緣故不料那美人忽地不見了卻變成一隻斑斕猛虎咆哮的向我撲來阿呀不好了我的性命不保了一交跌倒正不知是失了三魂還是走了七魄定睛一看原來還因在睡椅上通體汗下如雨正是繁華一夢何時醒夢裏人談夢裏因不知夢中這部書裏說的是何種人載的何等事待我將記得一一鋪敍出來
