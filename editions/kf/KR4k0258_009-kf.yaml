body:
  text: 第九回一封電金太守冒死陳言三馬路謝校書懸牌應局看時卻是湖北的留學生陳君元戚便道有什麽事這般大驚小怪元戚道你還不知道麽你看這上海的新聞報說罷將報擲下慶如拾起看時上寫著道北京來電冊立端郡王之子溥爲大阿哥云云慶如看了道我當是什麽事原來是皇位繼續問題這是保皇會的事你待要怎樣元戚道你還不知道哩上海電報的總辦金太守就是發起女學堂的人得了這信馬上聯合了一千多同志打一個電報到北京去請王大人代奏收回成命等語這個電報到了京頓時有電報來把金太守革職拿問還要查抄家產金太守已經是甕中的鼈了幸虧上海縣中一個朋友趕去通信詐了他一萬銀子才放他逃走此刻聽說逃到澳門家產已被抄去了頓時一家星散你道可憐不可憐慶如道你又來拿這過頭的事來嚇我怎的我只爲這幾日心緒不佳沒有出門朋友們曉得我有心事都不來纏擾所以倒挨著你來報新聞了元戚也笑道你的心事我早已知道了不過沒有個知心著意的美人兒伴你朝夕可是不是想我們生在這文野過渡的時代雖是要學那文明人的結婚怎奈家中已有了妻子難道好棄了她再娶一個麽如果這般行爲先已違背了道德上的契約還成個人麽所以我們這個時代最難要求兩全之計還是在北裏中尋個知心紅粉同她周旋一番聊以抒發愛情倒是無上的消遣法兒慶兄你道何如慶如喜得拍掌道英雄所見略同足見我兩人一鼻孔出氣只是此地新橋一帶佳麗雖多苦於我們要守學生的規則一跬步都有報館中人監察稍有不慎明日便有朝日報上登出來這正是說不出的苦其實學生的品行好歹何曾在此就算到青樓稍爲閱曆也不值什麽何必如此認真呢元戚也笑道重洋遠涉爲的是求學問自然不該涉足花柳了這倒不必壞自己的名譽去博一時的快樂還是上海地方金迷紙醉粉黛之叢真是溫柔鄉哩慶如連忙搖頭道罷罷你提起上海連我頭都漲痛了我在上海混了多年何曾看見個真有愛情的妙人兒那下等的無鹽嫫母自然不必說了那上等稍須有些姿色也不過矯揉造作並非天然卻只要生意一好便自尊自大起來任意的慢客姘戲子軋馬夫無所不爲算是時髦的起點最可惡的自己任意放蕩馬車大菜用度浩繁還要倒貼給姘頭自然身上的債越積越大了她們卻有個好法子只消揀一個有錢的主兒假意同他要好願意嫁他說的都是恩深義重的話等到那人著了迷傾家蕩產的娶她回去那時債也還了身子也輕鬆了哪里肯受人家的拘束便頓時翻轉一副臉兒終日間吵吵鬧鬧這樣又不好了那樣又不好了不是爭罵就是哭泣還有一種利害些的更做出許多醜行卻有意給外人曉得等到他丈夫怕得了醜名不得不放他出去就是他的心願足了依舊的迎張送李亂花亂用到急時再行前法這個法子在他們口頭禪叫做泡浴你想這種傢夥值得用真愛情待他麽所以我此刻看花的意興遠不如前了元戚不通道這是你一人造的謠言罷了他們雖是墮落煙花原來本是個女子那女子的性情是真摯不過的想洋場十里間豈無一二小家碧玉潔身自好的豈無一個絕世美人偶墮塵劫的我定要物色出來一證你說話的真假呢慶如大笑道你本來快要回國了且到上海試驗試驗也是一樁學問只不要自尋煩惱便了元戚道你看就是了便匆匆的別去過了幾日聽見梁啓超在橫濱設了一個清議報以後又改了新民叢報聯合了許多人捐了許多錢說是保皇其實不曾辦一件事只多做了幾篇文章多打了幾個電報是真的元戚同他們本來宗旨不合便不去睬他一到畢業收拾收拾別了慶如徑回上海來一下了棧就有許多同志來看他元戚一一應酬也曾開了幾次的談話會演說會不覺過了幾個月那時元戚要發起一個印書局也成功了便搬入局中住料理些筆墨事件倒也清閒自在一日同一個朋友閒談說起同慶如在東京打賭一事那人道目下上海的花事雖是闌珊卻不至於像慶如所說的就像迎春坊的武林林三馬路的謝珊珊只怕也算是個美人胎了元戚道我也恍惚聽見有人說起過這兩個你都認得麽那人道武林林我不曾見過這謝珊珊是極熟的元戚高興道我們就去訪珊珊何如那人道那樣罷今晚我們在大新街的金穀香一敘我做介紹你就去叫他來那邊樓底下就是馬車必經之處也可看看如水如龍的景況元戚道那也好謝珊珊的歷史你可曉得麽那人道珊珊本是一家大人家的姬妾中東一戰他丈夫以諸生從戎死在陣上噩耗回來珊珊痛不欲生卻又爲大婦所不容逐出門來幸虧她大伯是一個大員給他些銀子叫他尋一所庵堂焚修度日不料出來之後又被奸人哄騙依然墮落花叢美人身世要算是可憐得很呢元戚也慨歎一回那人便先去了這裏元戚料理些印刷事件天有傍晚接到金穀香的請客票下面寫個杜字知道就是方才那個人了原來那人姓杜號叫小牧是一個風流的班首上海倌人沒一個不認得的當下元戚坐車望金穀香來上了樓找到房間見先有了幾個客問起姓名卻都是有名的名士有號山人的有號詞客的有號亭長的一一寒喧過了那日正是禮拜從張園愚園回來的馬車在樓下經過不知有許多憑欄一望但見衣香鬢影散綺流芬那繁華真算到極處了元戚一眼瞥見北頭來了一輛雕輪繡轂的轎車馬夫兩人一色杏黃緞的號衣紅縷大帽駕著新金山的大馬飛一般來車中一個粲者穿一身月白的衫裙襟上簪一朵碗大的茶花分明有一般光彩四射耀得人不敢正視正要定睛細看只聽得雜遝蹄聲早已抹過轉角了一陣香風隨著氣浪漂過來迷迷糊糊的腦中映片未減似乎仍有一個絕妙美人站在面前半晌半晌方才回過一口氣來問小牧道那是何人竟有這般美麗小牧轉問旁人道這就是武林林了元戚踴躍道何不就叫她來看看小牧咋舌道這武林林的局好難叫哩你具了這種才貌便自命不凡看世上一班墮鞭公子走馬王孫哪一個在他的眼他卻並不待慢只是嘻笑怒駡旁若無人的數說一陣談論一陣也不懂有許多人會說會笑到他面前便一句也沒有了再不消說去狎他了所以他倒很自由的應局的遲早都聽他自便沒有人去責備他的他最喜歡坐馬車在家的時候極少人去那邊尋不著他他常常說人家來恭維我奉承我卻是假的其實他們看我是個妓女看不起我是真的我爲什麽冶容裝飾去受他作踐我只消像行雲流水一般自尋我的樂處就是了直要等有真愛我真敬我的我方肯把真愛情報之呢這是他平常的議論你道容易請教不容易請教呢元戚默默然半晌方把念頭打斷不一時客已到齊主人替元戚開了一張謝珊珊的局票旁邊添寫著杜薦兩個字其餘的客也一一寫了便叫細崽發出一面點菜吃起來到第三道菜上時衆局都到了謝珊珊卻是最後一個一進門便問那個叫的小牧用手對元戚一指道這位陳大少叫的珊珊向小牧嫣然一笑亭亭的走到元戚身邊坐下元戚回頭一看頓覺魂靈兒飛去半天只管呆呆的看珊珊被他看不過低鬟一笑更是有一種幽情從眉梢眼角蕩漾出來便把思念武林林的都移在珊珊身上心中暗忖道這人姿色雖比不上剛才的車上人兒也算是美的了我陳元戚一腔情緒只怕要網著他了珊珊也想這個客人舉止有些與衆不同不可輕慢便兩心相映坐到席散方走去時叮嚀叫元戚到他那裏元戚答應了當晚就與少牧同去自有一番情致從此時相往來成了一個鶼蝶緣了
