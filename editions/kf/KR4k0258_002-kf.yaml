body:
  text: 第二回交際場中志士爭稱新黨衆香國裏野蠻講得自由大凡人腦盤中間天生有一種電氣各爲心電若是腦筋專注一端那電力發得多就成一大電流不但驅使全體的機關不可以感動他人的腦電便和那水裏的風潮空中的天潮一般大力鼓蕩無論何物不得不隨之而靡此刻各國發明的催眠要也是這種道理所以一代中間只要有腦筋最敏的一個出來提倡一種主義天下人就都認定這種主義附和起來那時熱度的高直高到極處好像天地間除了這種主義之處再沒有高似他的隨便有什麽阻力都要衝破其實這裏頭的好處他也未必曉得不過他的腦電受了他動力不知不覺跟人家走罷了像戰國的遊說漢的經學晉的清談唐之詩賦宋之道宋之道學地之詞典明代及國初的科學近今之洋務啼是有好有壞有有用有無用但是極盛的時候都是風行一世沒一個不入其門中的倘使事後問竟究爲什麽緣故也要自己不解啞然失笑呢你想腦電的感動動力大不大即如洋務一門在本朝康熙乾隆年間大約絕不曾曉得有這兩個字的名詞直到鴉片煙一戰圓明園一燒才算是洋國務院的開幕時代那時就有李潤叔徐雪人一班人大聲疾呼做了個西學的哥倫波說也希奇初起時人少不免招了許多嫉妒許多困難到後人婁一天多似一天勢力也一天大似一天恰好又有外交的種種失敗相逼而來到暗裏助力不少即如琉球之役臺灣之役高麗之役越南之役一次一次國勢日微卻党勢日盛便名目也新了主義也改了見解也精了一直到日清大戰更是入了絕大的盤渦不知有許多人直沈到底許多人直升上天真是組織出一個淒風苦雨的曆史卻又包括著一篇花團錦簇的文章看官你道感慨不感慨歡迎不歡迎呢正是党會乖張山河破碎鬥大明珠鍾情彼差卻說中國自甲午後朝野上下都曉得不是變法不能圖存不是維新不能自立那新党的勢越發大了只要表上有名的隨便走到那裏都有人招待他奉承他恭敬得了不得引得那些人如發狂一般村裏一字不識的鄉人要說兩句新名詞自命爲道人不要真真淹貫的了記得那一年卻下了一道上諭是叫內外大臣各各保舉洋務人才破格錄取用這個詔書一下更不知轟動了多少人本是非常有舉動所以街談巷議當作一件新聞與相傳說那一天蘇州城裏有幾個少年聚在一處大家議論這件事卻好外面送進一張新聞報翻開看時上面刊著協辦大學士龔同和工部尚書呂端芬刑部侍郎章蔭桓聯名保薦廣東在籍工部主事康有爲舉人梁啓超才堪大用奉的朱批卻是著該省督撫送部引見衆人看了此段內中有一個清華高貴自視不凡的少年舉手加額道南海先生師徒登用中國從此富強了對面一個委委瑣瑣的少年道不就是做新學僞經考的康先生麽他學問是中國第一難怪叔翁先生推許呢原來起先發言的少年姓姜號季霞單名一個表字是一個孝廉對面那個也是一榜姓苟名鵬號叫缽山都是新黨中表表的當下季霞便道缽山兄還不知道這康先生真是孔子以後一人非顔曾可及所以他自號長素就是長於素王的意思他門下學生卻有超回軼賜的號是見他自命不凡了此番既經奉旨出山想必經過上海兄弟到想去會他一會也可以稍慰平生的渴想並且看看時務報館裏王讓卿真是伊一班人當下兩人分手季霞便回去收拾行李搭了戴生昌的蒸汽船望上海進發過了一夜已抵碼頭吩咐家人下了晉升棧自己卻輕身上岸喚了一部東洋車直到大馬路泥城橋時務報館裏會見了王讓卿詢知康長素已到上海就住在館裏此刻卻同他高弟良君出門去了季霞談了一會又拜會了幾個人方才回棧便接了一張請客票是遁叟的名字請他到西合興姚蓉初家吃酒的那遁叟姓黃名滔號子詮是個洋務中前輩卻又有些名士派譬如半路上出家的和尚總不脫的酒肉氣季霞剛才也拜過他便已面約了今晚一局並且曉得康先生也是在座的便叫家人回復一個曉得了一面換了便服徑到姚蓉初家赴宴一上樓便見一個蒼顔白髮的偉丈夫在那裏高談闊論季霞上前見了遁叟便道季翁來得正好且聽我演述普法一場大戰季霞笑道子翁先生又開了書庫了一面同衆人招呼卻認得一個是山陰吳桂笙一個是金匱周浣薇一個就是王讓卿還有一個不認識請教起來原來是廣東來的辛憨亮表字即庵和康先生是一人之交此次到滬公幹順便同來的季霞便問康長翁何以尚未到來即庵答道大約即刻就到了正說時樓梯邊的藥水鈴轔轔轔響起來娘姨曉的有客上來就到簾外去迎只見登登的扶梯上來兩個人便問道是黃大人朋友麽兩人點頭娘姨揭開門簾報道黃大人朋友來季霞擡頭看時前面一人方面大耳微微有幾根發後面一人雖是少年卻十分英俊遁叟起立大笑道康聖人來了此地難得聖駕降臨大約也可稱爲聖地了卓如如何未來不然倒是個聖賢高會哩季霞方知那少年不是良君便恭恭敬敬的向長素說道勾吳下士傾慕道德久矣何意今夕得瞻道貌又和少年殷勤幾句方知也是康先生的高弟叫什麽馬孟北大家招呼了一陣恰好姚蓉初出局回來簾衣一掀香風滿座季霞的眼光覺得一閃倒閃得花碌碌的看不清楚但覺輕雲薄霧中擁著一輪寶相香嫣玉軟嬌媚十分便呆了一呆蓉初轉眼一望也就嫣然一笑更覺勾魂攝魄蓉初來敬瓜子毫不覺得卻被遁叟把他肩上一拍道這是申江第一名花老叟賞鑒得不差麽季霞吃了一驚自知失檢紅了臉卻一句回答不出蓉初又笑了少頃臺面擺好主人請客入座自然是長素首席了餘人以次坐定便各各的飛箋叫局桂笙叫的是陸孟劬浣薇叫的是淩碧霞長素推說沒有卻被衆人曉得他的舊好便寫個金媚聖其餘各有新歡舊好毋庸細說當下八人清歌細酌倒也歡暢酒至半酣長素喟然歎道子翁我們人生在這個世界真是古今一大變局那裏還好照著舊法辦下去不是我說句狂話就是孔子再生也沒有不變法的況且孔子在周時就是個變法的主兒你看他做了一部春秋就要想實行黜周王行主義何嘗是一味的迂闊呢只可恨那一班亂臣賊子仗著些小聰明將微言大義來塗抹了留傳後世倒成了現在的教科書你道可恨不可恨所以兄弟此番進京打定一個變法的主意無論可行不可行總要達我的目的爲止中間倘有阻力或者要拿出一種強迫的手段也未可知哩子詮未及答言蓉初正給各人斟酒聽了便笑道康大人奈說羅個金四呀金四是洋行裏個剛白度噲衆人哄然大笑起來方把長素的話打斷少頃席散季霞便與長素訂定趨教之期然後別去子詮等衆人去後也就回寓蓉初送到梯邊叫聲走好了便進去了接腳上來一個打茶圍客人蓉初見了登時滿面堆下笑來拉到窗口前面切切私語娘姨阿金卻走出外間坐下弄那五關斬將的骨牌兒不防耳邊一聲阿金姐擡頭看時卻是他的嫂子笑微微的問道先生呢阿金將嘴一弩伸了兩個指頭他嫂子會意便低聲道俺們的先生倒真快活呢他自己贖了身脫了父兄娘的拘管成日成夜坐馬車吃大菜穿好吃好就神仙也沒這般享福他又喜歡抽幾筒煙每天起得晚晚的實心足意也沒人敢說他一聲他生意又好自有一般揮金如土的大人老爺大少闊客前來竭誠報效他卻正眼不覰一覰偏是越嗔嫌那些人那些人越肯用錢他就拿那些人的錢來送給姚二一班人你道快活不快活剛才黃大人他們說的什麽自由只怕俺們先生要算自由到極處了阿金搖頭道你曉得些什麽自由不自由那自由兩字也是俺們講的麽你不過聽了這一班人的議論就隨口拉來做個口頭禪好不害臊他嫂子撲嗤也笑了正說時外面又有個姓羊的來叫堂唱蓉初不得不去叮囑姚二在房等候自己帶了阿金出局到公陽裏去
