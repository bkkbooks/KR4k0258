body:
  text: 第六回秘密社運動新大陸歡喜緣巧遇味蓴園看看走到一座高大的洋房門首馬車卻停了那人便把公一拉下車來只見門前挂一盞燈昏暗不明燈下恍惚站兩個人裝束不很清楚大約十分雄武見了面不發一言便往門裏一閃卻看見門裏是一條黑漆漆的路微露燈光那人便向公一換了一副和藹的相貌道請到裏面一談公一也猜知八九便跟他直進門來經過幾重門檻方推開一個小門看裏面時雖有許多人卻都靜悄悄的內中一個少年站起身來連聲道平君受驚了公一向前執手爲禮道足下不是沈君亦仙麽聞名久矣少年道嚴君真快人也便給各位引見道這位是黑浪君這位是史堅如君這位是陳千秋君公一一見了那少年便道今晚奉邀平君到此特爲提議一椿大事必須借重幹君不知平君肯允許否公一鞠躬道諸君俠腸熱膽欽佩實深今日有所見教倘不礙中國治安的事件無不應命那少年四顧愕然道平君你道今日的中國能夠不破壞就可以享治安麽平君道破壞雖是有時可以做治安的基礎然而能夠不破壞豈不更好譬如一座房子樣式太舊就不免要改一個新樣假使那房子已經腐敗必須重新造起但是要拆去舊屋卻是很不容易呢那將斷未斷的梁將坍未坍的壁雖是沒用若驚動他他就要倒下來不知要壓死多少人那時就有幾個激烈的木工要想用些炸藥把舊屋概行轟去免其倒塌好雖好只是藥性猛烈將地皮轟陷成了一個池帶累旁觀的死了許多那預備新建築的木料也一齊壞了木石飛到四面連鄰舍都受損害趕來費氣把屋基都占去了那個木工本是要好豈知連老家也回不去了倒不如聽了那和平的計算只消用大木撐住四圍使他不能倒塌慢慢的一根一根的拆起來拆去一根舊的便換上一根新的不多幾天也就可以全新了這是我一向抱持的主見孫君以爲何如那少年聽了哈哈大笑道原來平君志願如此真是士各有志不能相強你們送他出去罷幹君也就告辭道無知妄談尚乞孫君恕之便走了出來仍由原引入的那人引出大門坐了馬車一霎時已到大馬路停車那人送公一下車叫聲乎君保重後會有期便忽喇一鞭去了公一定一定神踱回家中心裏十分納悶一夜沒有睡著翻來複去直至天明倒沈沈睡去了一覺醒來已經正午外面送進一張傳單卻是保皇會的廣告正不曉得是何人發起便又有人來約他到張園聽演說會公一也答應了吃過飯爽朗正領略間倏地後面趕上一輛鏤金象皮輪的雙馬車裏面坐著一個三十四五年紀的絕世佳人渦印雙圓黛痕一點真是十分美麗見公一看他便把眼光溜了一溜嫣然一笑公一心想何處來此尤物卻見那馬夫絲繮一領便超出前面去了隨手跟上一輛鋼絲的自由車追風逐電一般坐著一個美少年帶一頂麥邊涼帽壓在眉梁依稀是天仙戲園裏的孫三兒暗道原來是他那前面馬車上的一定是狀元夫人曹夢蘭了他們倒這般快樂呢不一時到了張園停在安塏地門首慢慢的進去只見會場上已經開會上面挂了一幅龍旗一個人正在臺上演說認得是崔鶴卿此次演說的主義爲的是設立女學原來上海的女學堂從前都是教會中設立一二處不好算做發達此刻卻有電報局的總辦金君連三倡議創辦就在滬南桂墅裏地方金君住宅左近賃了一座房屋請了許多女教習擇期開辦贊成的都是上海一班闊人今日一會是商量辦事的方法公一上前招呼了金君因是父執十分致敬金君就請公一也上臺演說一回當下議定紛紛各散公一卻從東北草地上慢慢的看些水木不防樹背後嗤的一聲公一嚇得一跳定睛看時卻見兩個人手牽著手裙衫悉索的進一小亭去了看那背後形便是孫三兒曹夢蘭兩人因他蹤迹詭秘不覺失笑便也出園上車回去走至半路後面轔轔蕭蕭的仍是他們兩人趕上前去公一隻吟了兩句七十鴛鴦同命鳥一雙蝴蝶可憐蟲細細揣摹語意卻已到了自家門首只見當差的回道項少爺在裏頭等侯呢公一進來見了閒談一回便把今日所見的告訴慶如慶如笑道聽你這般言語是很羡慕他們了其實這種緣只好叫做孽緣不過是肉欲上的事情罷了那真真愛情一點都說不上哩說罷又歎息道茫茫塵海誰足爲我想像中的美人只好付諸虛願的了兩人慨歎一回外面闖進一人卻是湖州孫求齊年少英奇才華卓越因他親戚徐念劬在湖北當差寫信來叫他去投考武備學堂路過上海特來看望當下握手道故歡若生平寒喧了一會公一慨然道求齊你聽我說中國最缺的是軍人性質自古迄今算當兵是個賤役從軍是個苦事把室家看得重自然把國家看得輕了那唐宋人的詩集大半是描摩行軍的苦處勞人思婦怨謗重重這般的人民如何能撐得起一個國呢所以漢族與他族競爭沒有一回不敗的那皇祖逐鹿大勝的功勳久矣不可尋了現在湖北張制台創這武備學堂卻專收世家子弟士林英俊就是要把軍人資格擡高使天下不再賤視的意思你此去倒要淬礪精神做一個第一的完全軍人休負了自己的靈明呢求齊領諾了慶如也囑咐一番當晚便同他祖餞親自送至小東門金利源碼頭招商局的江永輪船上方叮嚀鄭重而別求齊送他們上岸也就胡亂回艙中睡下一時上船的送客的挑行李的賣食物的出出進進鬧個不清頭聽見說船上扒手極多便不敢合眼直到半夜已過輪船開行方才半醒半睡的打瞌睡
