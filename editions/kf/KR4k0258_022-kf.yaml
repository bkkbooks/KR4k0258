body:
  text: 第二十二回新馬路初仿匏止坪百花裏驚散燒炭黨那日慶如請了兩席酒算是暖房除了公一季留君實小牧外又請了幾個鄰居子青是已經回去了當下林林梳妝出來與諸人相見大家見他已改了內家的裝束不施脂粉淡冶天然腳上卻穿一雙京鞋上繡兩隻蛺蝶走起來閣閣的響季留笑道林林改了妝倒可以入得天足會了林林也笑道我的腳本來不十分小一向把他拘束得好不苦腦最可惡的是堂子裏的惡習偏是大姐要大腳小姐要小腳成爲牢不可破的例好端端的腳指頭生生的拿他彎過來疊在腳底裏上面又載著若大一個身軀好像拿幹百斤石頭壓在已經摺轉的嫩骨上你道痛不痛如今是好了我不于這營生也就好放他自由了季留笑道林林你說女人的腳是小的好看還是大的好看小牧搶說道如果不講他的痛苦不痛苦只說他好看不好看並且也不必說男女子權的道理只當女人是男人一個玩物卻也是大的好看小的不好看爲什麽呢小腳的女人雖是尖瘦可愛但裏頭卻是污穢並且疤痕密布其色黑紫真是不堪目擊反是沒有纏過的腳血脈流通柔如凝脂脫剝出來自有一種蕩人心魄的姿勢你道好看不好看公一聽了笑道說得刻劃入細但不嫌太穢褻麽林林微笑不言君實也說道林林你把腳放了可以做些文明事業不如進女學堂去讀書罷林林搖頭道罷罷中國此刻的女學真還在幼稚時代那女學生一進了學堂就如封了王一般一根便紙條還寫不出就只當自己是個文明人帶起眼鏡拖起辮子看人不在眼裏像我們這種人去就學是他們不屑與伍的以爲是個賣淫婦其實他們的行爲也未必高如我輩不過不好說罷了像金小寶被學堂裏革出來就是一個榜樣好在我此刻有慶如在此他是我的師傅我想別的科學還不要緊我第一要學琴歌覺得這件事可以和平我的心志增進我的幸福我從前雖學過什麽胡琴琵琶但覺得聲音或是噍殺或是淫靡總不及這個好就是那曲調也不離這兩種毛病沒有發抒性情的好處你們道是如何慶如笑道你要學琴這是很容易的我明天就去搬一張批阿拿來我教你就是季留拍手道本來馬克格尼爾姑娘的琴是巴黎第一此刻要做上海的首唱了大家附和了一陣方才席散卻說季留那一天正在寓所忽地外間傳進一張請客票來是請到百花裏花如玉家酒敘的主人的姓是個何字另外又綴小字是君實已到即候速臨等語季留心想這姓何的莫不是子青出來了但他並不做花如玉且字迹不對決是別人本想不去又想君實在彼借此敘敘也好便回一聲曉得了自己穿上一件大衣徑來赴席走進門來只見房中已經坐席君實果在那裏背後坐著小花四寶旁邊卻空一位季留與主人招呼了便坐在君實旁邊那主人向著君實季留道久仰二君是個江東豪俠咱小弟也在江湖上頗有名人多稱我落坑虎今日小酌奉屈一敘以後便可時常往來了說著把手指首坐一個肥胖大漢道這是我們的老大朝天獅子馬德芳想二君必定聞過名的季留吃了一驚暗問君實如何認識他們君實輕輕說道這主人還是今天初會面我因聽得草澤英雄很有幾個好的所以想來物色物色季留尚要說時只見馬德芳忽然說道這幾年我的威名也夠了兩江兩湖四川雲貴的小弟兄足有上萬那一個不奉著我號令一到上海那一個不來孝敬他們如果吃了外國官司只消我去同他說一聲應該十年的減作五年應該永遠監禁減作廿年巡捕房裏的外國人只聽我的話所以他們越發怕我了有哪個不識的人得罪了我我吩咐了他們任你逃到哪里總要結果了性命幾年來不曉得有許多人死在我手裏真是賽過梁山及時雨哩正在說得高興只聽樓梯上一陣腳聲德芳回過頭來直挺挺的站著一個外國人頓時嚇得呆了望桌子底只一鑽那花如玉還當是請的客人想要招呼只見那外國人把手中棒一指說了一句頓時走上許多外國包探印度巡捕中國巡捕把主客都圍住了嚇得娘姨大姐鬼哭神號君實見勢不妙恰好座旁有個窗口便一腳跨上鑽出窗來喜得就是連著隔壁人家一個露臺往上跳去伏作一堆靜聽消息不題那西探將各人一一用手銬銬看見季留沒有頭髮問他是那個人季留說是中國人那人不信道你的面孔赤黑一定是個安南人如果真是安南人我可送到法國領事處去保釋季留發怒道我真是中國人爲什麽要冒充那亡國的奴隸那西探被他一喝倒吃了一驚也不來銬他一面把馬德芳從桌下拖出只聽得馬德芳沒口的喊饒命道我的姊夫是法蘭西巡捕房二頭腦看他的面上饒了我罷西探也不理他揀一付大銬銬了再查點人數時只有七個缺了一人卻見小花四寶的哥哥拿著一根胡琴跟著妹子來出局此時躲在扶梯背後發抖西探指道就是他一把抓過來嚇得那烏龜只是叫看官那烏龜本是不會叫的此刻逼得他叫了已經殺盡勝會如何還聽得出他叫的是些什麽呢當下把八個人趕下樓來到了馬路上一個個把辮子連起幸得季留沒辮子不會吃這一苦一徑押到巡捕房來關了一夜等候明天解到公堂去審卻說君實伏在露臺上聽得巡捕已去慢慢的爬出來真是弄得漏網餘生心上還跳不住只見小花四寶還在那裏見了君實一把拉住只是哭泣君實十分不安又見這裏曆亂翻騰存身不住便同小花四寶回家他家中聽說提去龜子自是慌亂君實只好安慰一番出來探信原來這次舉動是捉拿長江盜匪打聽得這晚在百花裏吃酒恰如甕中捉鼈手到擒來只苦了季留也湊一個數到了明天送到公堂只因還要聽候上憲派員會審所以並不判斷只將馬德方千季留連那龜子取保候審一則因是留學生究竟體面一些一則因是龜奴委系誤拘那馬德方卻因他姊姊姘了一個法國巡捕他來說情靠在這褲帶的分上所以一併保出到後來會審平季留同龜奴無罪釋放餘者殺的殺監的監輕重不一只有這馬德芳是個匪首正要辦他誰知他一保出來便行了三十六計中的上計辦他不動直到四五年後才在寧波拿住死在獄中這是後話不提卻說平季留自經此一番挫折從此灰心世務絕意進取只在家中務農連上海也少來了
