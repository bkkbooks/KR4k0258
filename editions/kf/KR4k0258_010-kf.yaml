body:
  text: 第十回香國掄元文人韻事潢池盜甲傑士驚心有一日元戚館中沒事覺得無聊便往三馬路謝寓來上得樓梯靜悄悄的樓下喊著客人卻沒有娘姨出來接住門簾下著也不知裏頭做些什麽曉得有異便躡手躡足走到後房張望時只聽正房似有兩個人切切私語的聲音掀開一角簾子看時一個馬夫模樣的人穿了一身元緞衣服打了一根油松大辮辮有四五兩重坐在榻床上低低的說道我聽見你此刻做了一個沒辮子的恩客可是有的麽珊珊道又不是和尚如何見沒辮子不過剪過頭髮罷了也算不得恩只是走得勤些哪里趕得上你呢元戚聽了氣往上伸要想進去又不知究竟是什麽人忍了又忍狠命一摔簾子回身下樓登登登走了驚動裏面珊珊趕快出來已經不及原來那時娘姨們回避出去落得逍遙自在幹他們的事去了所以一時樓上無人元戚上來他們竟沒有聽見當下動問客堂曉得就是元戚珊珊悔之無及那人也覺沒趣草草的走了元戚回到館中一腔怒氣不息心中暗忖像珊珊這樣高貴的人如何卻同這種下等人結緣莫非真應了慶如的話麽我當初不肯相信誰知今日卻臨到自己身上咳罷了罷了只當前天沒有認得他是了這樣一想便心中清淨許多仍舊幹他的事業不提只是酒後茶餘予懷悵觸不知灑了多少臨風涕淚呢過了幾日三馬路娘姨大姐一天來請幾次元戚只是不理一日正在無聊拿著一本書躺在睡椅上看只聽耳邊一聲大少俺們先生來了睜眼一望外頭冉冉的進來正是珊珊看她眉顰斂翠渦印消紅比前清減了好些卻更添十分丰韻氣早平了一半站起身來道你來做什麽珊珊款款走到身旁坐下道你好狠心這兩天一次不來倒在外頭造許多謠言你你說時哽咽起來元戚連忙道沒有的事這兩天我事忙所以沒來今天正想來走走恰好你來了何曾造什麽謠言呢珊珊掩淚道別人不知我的心也還罷了你也這個樣教我有什麽活頭元戚攔道好了不用說了算我差便了娘姨從旁插嘴道不來是你陳大少差呀俺們先生一心和你要好你不曉得在哪里聽了閒話卻來放野火照你們這樣交情可是該的元戚認過不遑連前日親眼看見的一字不敢提起坐了一回珊珊回院元戚便跟了去這一晚百樣奉承自不必說從此更死心塌地竭力的報效了有一天正到三馬路來看見客堂房間裏坐著兩個人煙容滿面穿的衣服也是舊幌幌的正在那裏談天說地誰家的先生好誰家的先生多說個不了珊珊也坐在那裏見元戚來了方走進正房來陪元戚問是何人珊珊道就是爲開花榜的事他們正議論哩坐了一回外頭娘姨進來問珊珊道他們要走了問你所說的話作準不作準他們好去做珊珊道作準就是了只叫他們不要搭我的漿娘姨出去回復那兩人走子珊珊也沒有送過了兩天香海報上開了一個花榜第一名狀元便是謝珊珊住三馬路那評語是什麽藐姑仙子洛水神妃十分傾倒元戚看了心中一喜好像自己中了狀元一般立刻拿了報跑到三馬路來想要報喜走進門只見黑壓壓擁著一屋的人語言龐雜上麵點著大紅蠟燭香煙繚繞中間挂了一副描金彩畫大紅報單上寫著道捷報貴院先生謝印珊珊奉香海報館大主筆取中一甲第一名花榜狀元擇日上匾慶賀元戚看罷走上樓來只見前天所見兩人又坐在客堂房間裏了又是什麽榜眼怎樣好探花怎樣好傳臚怎樣好但是都不及狀元的好又是名貴哩高華哩說不盡許多好處卻只有幾個姨娘在那裏跟著打哄不見珊珊在彼心中詫異徑進房中卻見繡幕低垂銀釣不上一個小大姐上前道陳大少來了俺先生有病呢元戚吃了一嚇走近床前看時果然杏臉失妍桃腮少潤伸吟床褥宛轉衾綢元戚便在床沿坐下低聲的問道怎麽一夜就病了呢珊珊仰起頭見是元戚便道也沒有什麽病不過早晨起來覺得怪煩的後來又被底下人聲一吵更是頭昏腦脹睡了一回倒覺好些說罷氣喘不止元戚把他的頭一摸熱得似火一般不覺大驚道你這病不輕呢須要請個醫生才好珊珊道東面有一個姓胡的醫生聽說很好已經叫相幫去請了無戚便不肯走開一會兒倒茶一會兒送水的服侍外面娘姨進來說那兩個人要走了東西預備了罷珊珊歎口氣道早知這般沒福要這狀元做什麽東西在箱子裏你們開出不給了他們罷娘姨答應自去打發元戚也不理會只耽心珊珊的病情一時醫生來了元戚便陪著診脈已畢請到廂樓裏開方元戚動問病源那醫生搖頭道病勢非輕只怕要發喉痧元戚吃了一驚道這便如何是好不知可以止住他不發出來麽那醫生道病象已成如何能夠不發只要發出來不十分利害已中僥倖又搖搖頭道看來竟是極危之症只怕兄弟的才學吃不住他呢姑且了這方再看如果無效還是另請高明爲是元戚聽了更加吃驚原來上海地方人煙繁密穢氣薰蒸新鮮的空氣極少又加飲食不慎飲水不潔每當春秋之交疫癘盛行最利害的是喉風往往傳染開來一家要死掉幾個像盛名鼎鼎的小林寶珠就死在這個病上所以元戚著急當下醫生走了一家人驚慌自不必說元戚道這個醫生未必靠得住還是把上海有名的像張襄雲巢崇山羊月樵他們請幾個來聽得說街閣陳蓮舫也在這裏要打聽地址趕快去請才好床上珊珊聽了倒說又不像是你恍惚同坐馬車到張園一般走走又不是張園了只見一片汪洋竟是一條大海一下裏你又不見了海中跳出許多鬼怪來拖我我嚇得大喊就此驚醒照這夢看來大約不久于人世了元戚竭力撫照一番從此元戚日夜在珊珊處侍奉湯藥跬步不離看看日重一日喉間腐爛飲食不進無戚忙得發昏一連幾日沒有回館誰知北方卻鬧出一樁大事那天元戚在三馬路有一個館裏頭人來請他說朋人在館立等叫他一定回館一次元戚摸不著頭腦只得囑娘姨服侍我去去便來回到館中原來卻是唐笏臣倉皇的說道你如何此刻才來你可曉得北京義和團起事要扶清滅洋學習什麽拳法又有大師兄二毛子等名目此刻已鬧得糟透京裏頭雜亂無章德國的公使日本的書記生都給他們殺了上頭五大臣信了他們的邪術一意主張排外許景澄袁昶好意去勸他反拿來正法洋兵已聯合了八國打破了大沽口要進京去救使館看來大事不妙中國亡在目前我們若不趁此做些事業將來淪爲奴隸永無翻身日子我已預備一切刻下先在上海開一個會搜羅些人才你快來幫一幫忙無戚大驚道我這兩天有事沒有出來那裏曉得竟鬧了出這般大事你想動倒也不差只是我是不能與聞的一來有些事務牽纏二來近來身體也不好只好過幾時看情形再說笏臣著急道此刻是什麽時候我們所做的是什麽事好把別樣來推卻麽這是你存心不肯做了那就老實說就是何必又要等察看情形元戚一時回答不出笏臣也氣憤憤的走了去自趕他事不題這裏無戚仍回到三馬路來盡心竭力的要治好珊珊的病哪知日重一日就是盧扁複生也無可挽回了
