body:
  text: 第二十九回昭雪沈冤僥倖半年犧牲幸福傷心一代紅顔林林要緊收拾也不理他阿寶自己坐下了便笑問道阿呀先生你這般忙碌可是要動身到那裏去了林道正是阿寶又問道什麽事這等要緊林林見他聒噪不過只得把慶如受屈的事告訴了他阿寶失驚道原來果真有這件事我還當是華大人的謠言哩林林聽他話中有話便問道華大人怎麽講阿寶鄭重道先生你是我的舊主人你的事我有不關心的麽這件事不是我來多嘴本來你先生太過分了自然要惹出禍來倒害丁項大少枉送了一條性命林林著急道你囉嗦什麽快講你的阿寶道說起來話長哩就是你先生早先不肯聽我的話被華大人聽見了很見怪你便寫信到京裏去一概告訴了王大人自然又加上些激怒的話大概說你先生戀住了項大少不肯離開除非把項大少除去了那人就是我們的了又說項大少是個會黨要除去是好下手的這信去後前天忽然京裏來了一個電報華大人正在書房裏看過之後只聽他呵呵大笑道這番看項慶如還能奪我口裏的肉麽便把我叫去一一告訴了我說是王大人如何著惱如何發電到南京制台那裏說項大少是個匪黨要他拿住嚴辦南京制台如何發急便發電到上海道叫拿人他們如何商量一定要治死項大少如果項大少不肯招認他們如何要嚴刑逼供那夾棍梭子如何利害如項大少再不招認他們要如何在獄中謀斃報個病死了事王大人又如何囑託華大人叫把你硬擡進京華大人又如何買囑巡捕包探四處偵察你的舉動恐怕你要逃走王大人又如何許華大人的官升三級如何許你如到京就封爲側福晉享受榮華富貴阿寶滔滔不斷的說了林林一言不發竟軟癱在椅上那眼淚不住的流下阿寶又接上說道華大人還叫我關照你一句話說本來是就要這般做的但他與你相好在先究竟不忍他說如果你肯從此斷絕項大少一邊安心樂意嫁與王大人他也不肯害人性命就可以替項大少想法把他救回來包你毫無傷損先生你道如何肯不肯說明了我好去回復他林林聽了正在沈吟阿寶又道先生你這一句話關係項大少的生死你如再不肯休想再救得項大少的性命只落做個含冤之鬼你想想如何對得住他呢你不如答應了雖是從此不能相見也算報答過他的恩情了林林聽到此處覺得腦筋一動異常感觸便問道你能保得項大少平安回來麽阿寶笑道先生又來了這是何等大事我能胡亂說的麽自然可以作數的林林把手一拍道罷罷只要救得慶如性命就犧牲我的幸福也說不得了便對阿寶道你去對華大人說叫他趕快想法去救出項大少來只要項大少有了釋放的信我就聽憑他們擺佈便了阿寶贊道好爽快我說先生沒有個不明白的只是還有一說也是華大人說的他恐怕先生見放了項大少又要反悔雖是不怕但如果執意不從起來他們也無可如何所以要預先說明如果先生這樣仍要照舊去害項大少的林林笑道我一應許了人從沒有反悔的叫他放心阿寶才笑容滿面的去了過了幾日兩邊均已說妥上海道署又接南京來電是昨奉京電項國瑞系屬誤拘可即釋放等因仰即覓保來保釋勿延次日新聞紙上登了出來自有慶如家屬叫人去保不題阿寶先一日已來送信便約定明日放輛馬車來接林林到華公館暫住再行定期進京林林當下又哭了一場想起巴黎茶花女因要保全亞猛名譽仍爲馮婦我此刻爲慶如的性命也另嫁他人情事十分相類可見得我取這個樓名時已經有了讖了又想馬克當訣絕亞猛時已將自己當作已死我此刻何嘗將死的人然則今天便是我的死期自今天以後只當另是一人另過一生並且自誓不再以人道自居不再以愛情待人不再享人生幸福則今天不可不自祭一番以爲我今生結果的紀念又想慶如那裏不可不留一封信以爲我的臨終遺囑於是拭幹了淚痕從新靚妝起來換了一身鮮豔衣服將自己的小照供在中間向瓶中取了一枝茶花奠酒三爵自己作了一副挽聯是集的曲文一代紅顔爲君絕三生遺恨在人間又鋪紙命筆作致慶如的劄道茶花第二謹致書於東方亞猛君執事前日已矣我亞猛所摯愛之茶花其自此長絕矣我兩人之姻緣其自此永訣矣我作此書時我肝腸進裂淚血滴紙作殷紅色昏絕復蘇者屢矣以我之哀痛如是知我亞猛讀我書時亦必肝腸進裂淚血滴紙作殷紅色也嗚呼我書至此我心亦碎矣自君被禍我無日不在泣血中固不若今日之爲最痛也君知之乎君之禍起於近日而其根實種於我倆情固結之時情者禍之媒其信然耶我既以情禍君我又忍視君之獨就禍耶我欲以死拯君而君不可拯則仍我禍君也我常深思極計苟有以拯君者雖碎割我之體肉至如粉米如細沙複經風揚作無量數之小體或滅絕我之生命使死而爲鬼我均甘之君被禍之次日阿寶複來始悉彼奸人之譎計複盛其勢以挾我君試思之我以一煢獨無告之婦人何足以抵抗彼之勢力者然而我心至堅刀鋸鼎鑊何畏者乃彼奸複以甘言舐我迫我以不得不允之勢則謂我允之足以拯君也嗟乎我待死久矣所以忍須臾者欲拯君耳處無可如何之時等之死耳允之何害此我所以允之而不顧也嗟乎亞猛自我允之而我兩人之間遂樹一萬丈之堅牆永永不得複接矣我不復接君我生何樂固即死耳而彼奸又恫我謂我死仍將不利於君嗟乎我又何敢遽死耶今我與君絕矣此後之歲月當如入阿鼻之獄中非複人生所有然我之腦中仍深印亞猛小影非利欲所能滅也由此一念自一年以至十年百年千年萬年萬萬年永永不滅也亞猛勖哉以君才調努力當世何患不足千古幸無以我爲念臨命倉卒不盡欲言垂死之茶花武林林絕筆林林作了書擲筆就寢明晨交于隔壁一個鄰居托他候慶如來時交與他便自梳洗少頃阿寶坐了馬車來林林收拾收拾即登車而去正是侯門一入深入如海從此蕭郎是路人卻說慶如自被拘到南京押在上元縣裏雖問過幾堂但本無實據並未定案整整坐了半年的監那日得了京電又有人來保便把他放出來趕緊搭船回滬趕到茶花第二樓一進了門只見景物蕭條美人已去不覺吃了一驚那鄰居過來將林林留下的信交與他並將大概情形約略說了慶如不聽猶可聽了登時失了三魂走了七魄一跤望後便倒不省人事好容易灌姜湯掐人中救醒了他也沒有心緒再留立刻搬入一家客棧躊躇了一夜打定一個厭世派的主義收拾琴劍竟自飄然長往不知到天之涯還是海之角去了從此杳無音信
