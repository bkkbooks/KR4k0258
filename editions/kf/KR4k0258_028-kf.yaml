body:
  text: 第二十八回逞機械密布遮天網工羅織重演黨人碑直到酒闌燈灺公一方醉了出來明日便動身走了又過了好些時正是隆冬時候慶如料理過年事務忙一個不清頭結算店賬卻又是折的甚沒好氣只見店外闖進一人向他拱手道項兄請了慶如一看那人有些面熟只叫不出他姓名便也說請了尊駕何來那人道項兄怎麽忘懷了俺姓王今年不在貝君實席上會過一面的今日來此卻是有一樁買賣來作成寶號便是有個舍親他家裏住在小東門內是個癲子不能出門一步但是很喜歡看些新書說是可以開通智識因聞得寶號裏新書最多所以叫俺來問可有幾種新書大約他都要買些不過舍親是個精細不過的人最好請項兄到他家中把這書中的好處說給他聽他聽住了必定有一樁大買賣在後頭不知項兄肯屈駕同著俺一去麽慶如聽了曉得此事成了有許多利息可以做過年開消怎麽不願便道這又何妨左右隻在城中又不是出口便同你去見見令親好多認識一友那人大喜道如此即請同行罷慶如叫店夥照料店務自己整頓衣冠便同那人一徑到小東門來一進了城被那人引到一條僻靜小巷早有四五人雄赳赳氣昂昂在那裏等候一見來了便蜂擁上前不問情由一腳把慶如絆倒慶如正在走路沒有留心吃這一絆早已仰面朝天被他們按住把他兩手翻到背後用繩綁了慶如只當是斷路的喊道我又沒有錢你們綁我怎的一人就拿一掌道胡說你是個匪党頭目咱們奉了制台紮子在此找你多時了說著又有一人手拿一卷字紙塞在慶如衣袋中也不知是甚東西慶如急道我是個留學生怎麽說起我是匪類來那是你們差了他們道差與不差你到南京去辨與我們無干說著又把他揪起來頸上套一根鐵鏈拖了就走慶如沒法只得跟他覺得身上被踢的地方很痛勉強來到道署他們上去稟知捉了一名巨匪那道台吩咐立刻帶進見慶如是個瘦弱書生便道這人是個讀書人難道是會匪麽那先前來請他的那人搶上打一千道回大人此刻的讀書人做賊的多哩只搜他的身上看有叛逆證據沒有道台道也罷你們便去細細搜來就有幾個人上來搜尋一遍在衣袋裏取出一卷字紙呈上去道這紙上不知寫些什麽請大人過目道台接看時原來是革命軍大統領孫致總督淮揚等處兵馬副元帥項的照會一通不覺吃了驚便喝問道你是項國瑞麽慶如答道正是道台道你既是留學生如何私通會黨圖謀不軌從實講來慶如道我如果真是會黨也不給你們容易捉住了道台把這封紙擲下道證據現在難道是誣你的麽慶如道這是方才拿我時塞在我衣袋裏的如何好算證據道台道賴得好乾淨我只問你與會黨究竟來往不來往慶如道他們有他們的宗旨我有我的宗旨向來不合如何會往來道台道這等說你是冤枉的了但上海的人也很多他們爲什麽單要拿你呢慶如道這個明明是有人與我作對來誣陷我的道台道此刻我也不來細問你是大帥密劄嚴拿的人我只把你解到南京聽候大帥發落你到那裏去辯罷便吩咐把他發上海縣暫行嚴禁明日起解就有人牽了出來徑送縣署自有當值的把他押到外監釘鐐收禁慶如一進了監只覺得穢氣觸鼻陰風襲人一片淒慘氣象十分難受卻是事到其間亦無可如何只得蹲在一塊地上細想何人與我作對把這種謀反大逆的事來陷我看來既經入此網羅自己又無錢無勢只怕要性命送在此處了正在悲苦只見外面走進數人道我道是誰原來是大少爺如何吃了這個天大的冤枉慶如一看卻是上海縣裏幾個書吏他叔子做上海縣時認識的真是昔日衙齊貴介今爲獄底囚徒愈加氣憤便拖住他們盡行告訴了內中一個姓朱的經承道大少爺你細想一想有什麽人與你有仇的俗語說得好解鈴還仗系鈴人仍要走這個原路方好寬緩下來不然這個案是個重案向來不照例辦的靠自己一張嘴決然分辯不清只怕要性命不保慶如道我一向忠厚待人其實並無他隙只好容我慢慢想來朱經承道或是遊戲中間彼此抵觸你還不覺人家到結了怨也是有的你只想著了告訴我便是此刻你在上海還有什麽未了的事也好說與我聽替你代辦或是有什麽至交好友可以出些力的也好替你送信慶如歎道那些好友此刻是走的走病的病一個都不能出來其餘都是泛交聽見我遭了事躲避還來不及那肯出力倒是家裏有個小妾費心去知照一聲方好帶些便費來奉送朱經承道我們受過令叔大老爺的恩典那個要你使費不過道署裏是要些的我替你去說便了只是這個如夫人不是有名的武林林麽慶如點頭道是朱經承對同伴眨眨眼道這藥線頭就是他了說著便告辭出來這裏自有人來照料因是署中有人招呼過所以格外要好慶如只得暫且住下卻說林林那天晚上正備了一個火爐一壺酒要等慶如回來消寒不料直到更深夜靜還不見回又沒人去找真是滿腹憂疑只得睡下不防次日天明有朱經承去報信並囑速去一會今天要起解的頓時急得個林林把平日的千伶百俐不知何處去了收拾了那樣又忘了這樣好容易打丁一個包也不換衣請朱經承領了徑到縣前打聽誰知已有道衙裏人來提去了只得又趕道前誰知已解上兵輪去了只得又趕到江邊原來這個兵輪是專一伺候差使今天早晨奉到密飭早已預備人犯一到立時起碇向南京進發了真是來遲一步進退維穀也顧不得什麽便放聲大哭起來朱經承再三勸住把他仍送回家中安慰了許多話自去了林林哭了許久忽地想起我平日自命是何等人今日遭了這等無妄家亡人散難道就像庸俗女子一般一味哭泣不成畢竟要出了主意救出他來方是道理不然便死也死在一處也博得同穴同歸算計定了便將店關了叫一個店夥看守覰便盤出一面收拾些銀兩行李打算今晚搭了長江船趕去正在忙亂只見阿寶笑嬉嬉又從外面進來
