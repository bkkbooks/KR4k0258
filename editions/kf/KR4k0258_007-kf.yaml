body:
  text: 第七回武備學堂組織小團體禁煙善會出現大滑頭行了數日已到漢口便渡過江來進了武昌城去見徐念劬談些家鄉的事便在公館住下等到武備學堂招考日期預備去考居然取了便入堂那時總持湖北學務的就是辛即庵他待學生的籠絡本領是極高的求齊便也常去談談好在學堂裏陸陸續續來了許多少年英俊的人頗還寂寞時時結幾個會演說演說十分興頭一日有人介紹他去訪一個湖南人陶笏臣真是一見如故便成了刎頸之交不時來往那天笏臣來辭行說要到上海運動要求齊介紹幾個上海朋友求齊便寫了一封致項慶如信托他招待一切一面留他上午飯邀了幾個同志密切長談笏臣席間太息道方今政府說到此地也咽住道唉現在腐敗的情形不必說了只可惜的那般平日口裏只管說要犧牲身命倘果然有犧牲的機會他又說這等事沒有什麽大影響我們要留著身命幹那大的有影響的於是天天說運動卻天天運動不成功這時侯連說運動的都不說了如今我們在座兄弟固然比那般新黨不同究意這等事非同兒戲總要力戒我以上所說的毛病罷了大家一齊拍掌舉起杯子來道我等大衆同心誓聽公的教訓赴湯蹈火有所不避今日我公赴滬謹祝速達目的共用幸福中國前途興盛在此一舉並願我公爲國自重滿飲此杯笏臣接過酒來一飲而盡道謹竭駑鈍勉赴事機一面也還敬一杯便告辭去了當晚下船一路上耽擱招呼了許多會友在安慶大通住了些時方才到上海來佈置一切便來找尋慶如誰知慶如已到日本遊學去了原來日本步學西法事事在精神上講究不像中國專門的講形式所以那國勢臻臻日上自甲午戰勝連英國這樣強國都要與他結了同盟訂個互相幫助的約他卻毫不滿意只記念俄德法三國於預遼東的事當做第一大恥辱通國上下大家預備著要報此仇就是小學生的課本上都有這些話頭因此越發打起精神整理得十分美善拿中國人鼾睡不醒的樣子去比他真有天淵之隔了不想夜長夢多也有幾個翻身醒了的便一縱身跳過東洋吸些新鮮空氣免得常打呵欠那就要算一班留學生了留學生中間第一個破天荒的說不出是那個這慶如同他的好友何子謙張頌和也是先前的班次了慶如抱了一腔孤憤無處可伸聽得有這般一個極衆國好像下界凡人得了上天的路徑又像黑暗地獄的鬼魂有了投生的望豈有不歡欣鼓舞的麽便告知父母別了朋友收拾琴劍剪去頭髮換了服色居然頭帶呢帽身披大衣足穿革履胸間打了一個絕美的領結等到禮拜六那一天趁了三菱公司的郵船乘風破浪的去了恰恰是笏臣到的前一天真是不湊巧笏臣跑了一個空只得回來卻也被他運動了許多人東邊演說西面立會忙了幾個月聲氣也廣了名聲也大了什麽正氣會國會立了不曉得好多朋友中間除了同鄉的湖南人外很結識幾個那天有人請他在一品香吃大菜主人姓章是一個郎中是湖南人本是很熟的不過所請的客卻有一大半不認識內中有一個大眼睛白面孔的招呼得很親熱便問他姓名原來就是上海有名的大滑頭叫做褚世升的笏臣向來曉得他的大名因爲他平日所做的事都是鬼鬼祟祟騙人的勾當同自己宗旨相去萬里所以不大同他交談那世升卻因他是個名士要想求他做一篇序文讚揚他戒煙丸的功效就笏翁長笏翁短不住的奉承看官大凡上海的滑頭有兩種絕大的本領一種是拍馬屁一種是吹牛皮這兩種相輔而行是缺一不可的假如你只會拍馬屁卻不會吹牛皮那人家雖然喜歡你的恭維未必肯上你的當假如你只會吹牛皮卻不會拍馬屁那就要惹人家的厭沒心腸來聽你了所以上海滑頭都練就這兩副工夫都到了絕頂方才哄得住人家當下世升便把全副本領施展出來對笏臣道笏翁貴省是本朝中興元勳的珂裏山靈水秀代産奇才笏翁應運而生將來一定也是一個大大的元勳兄弟今日幸識荊州將來一定要求提拔的至於貴省人豐功偉烈彪炳寰區中國人民盡受福蔭所以簪纓相繼青紫連綿不說別的就這兩江總督一缺別省人如何做得來真是東南半壁倚若長城的了像現在劉峴帥尤其老成持重身系安危並且禮賢下士識拔人才記得兄弟前番到省循例稟見也沒有什麽格外孝敬他老人家因兄弟在上海略略有些聲名頓時傳見談了有五六點鍾方才辭了出來以後又便衣傳見四五次因爲兄弟稍知醫理便要委一個醫學堂總辦的差使又因爲兄弟在南洋開了一個機廠便要委到南洋考察商務倒是兄弟接了家裏電報有些要事所以竭力辭了如今還時時有信來問能去不能去哩真算得是生平第一知己了話末說完對坐一人卻撲嗤一笑道大約峴帥久聞足下的大名因此必須借重呢世升見此人訕笑他不敢再說回轉頭又同別人講他的丸藥去了笏臣也付諸一笑不來理他不多時席已散了那天因沒有叫局所以散得快些笏臣臨走又被世升拉住一定要請教住址明天准來奉候還有戒煙丸要仰仗大筆做一篇贊哩笏臣含糊答應匆匆坐上車去了世升又同別人一個個拉攏幾句直到主人都走方才坐了包車回南路來一面盤算一面留心細看路上的行人卻見電光底下對面來了三個人後面兩個像跟班模樣前面一個老者四方面孔赤黑的鬍鬚認得是一位觀察公慌得跳下車來上前請了一個安叫聲大人卑職伺候便往旁邊一站那大人定睛一看約略有些認得點了點頭道不用客氣世升連忙招呼道難得大人降臨敝地卑職斗膽攀留憲駕到迎春坊林寶珠家花酒替大人洗塵那大人道也好世升見大人允了喜得盡情立刻喚了一部馬車同大人坐上把包車讓給跟班坐子在車中剛問得大人何時在省中啓行行軒在那裏兩句話已經到了迎春坊口
