body:
  text: 第二十五回奮雄心俄日戰爭溺豔情膏肓疾病卻説慶如送葬回來與林林説了仍舊在新馬路居住轉瞬已是深秋天氣那時俄日大戰已經起手俄人屢敗日人屢勝皆因日本是個立憲國人人視國事為家事那些從征的兵士都曉得這一次交戰關係本國興亡所以捨命上前無一退縮者以為犧牲我一己的性命方能保全祖國的國祚那俄國卻是個專制國雖是國富兵強但人人懷著個自私自利的心拿國家的事當做別人的事性命看得重自然遇陳必逃了所以未戰之先照國勢論來自然是俄勝日敗日人那邊明曉難敵但他要報從前的仇要免將來的滅亡大家奮起雄心以必死為目的自然所向無敵所以到後來竟是日勝俄敗出於各國意料之外直到俄國陸軍連連退敗太平洋海軍盡數殲除不得已將波羅海戰艦調出中途又為日人擊沈從此勝負大定方有美國出來調停和義將俄人在東三省及高麗所得權利讓與日本方才罷戰東亞的風雲為之一變真是歷史上一大紀念只可惜鐵山的義勇隊沒有辦成不然也好立些功績使白種人曉得黃種的勇敢是中東一般的這也不必講了本書卻要敘出一人於這戰事上略略有關係的就是那石耕朱他在京裏當差倚著曾經到過日本又是日人為之介紹頗為得意所以賺了些錢就捐了一個知州心上很感激日本人的好處趁此戰事中間他也想做些事業一來報答日人二來圖個升官發財便糾結了一個姓歐的動身往東三省來一路上逢州過縣都要州縣辦差伺候自稱是個道台大人奉了達摩王爺密諭前來查辦事件的人家見他聲勢赫奕不敢待慢真個當他是小欽差看待一徑到了奉天便去謁見加將軍那將軍立時傳見問他的來意他就回道此番是奉遠摩王爺的密諭叫來辦一椿機密大事説罷又請將軍屏退了左右方輕輕道王爺的意思因為俄日開戰我們雖不能明助著誰但究竟日本是個同種同文的國向來同中國十分親近所以必須暗助他們一臂才是睦鄰的道理不過中國官兵是不好輕動的如果一動就要受俄人的責備王爺因想起東三省向有一種馬賊又叫紅鬍子名為盜賊其實卻是義兵自庚子組織之後專與俄人為難也很得過勝仗如把這種人招撫了暗暗助些糧械渝以意旨叫他們搜尋俄人屯兵所在攻他不備或是與日本裏應外合使他腹背受敵自能操其勝算功成之後許他優豫爵賞他們一定勇幹效力的好在他們不在我們權力所到之處即使助了日本在俄人也不能責我而日本必定感激我國的説著又湊進一步輕輕説道況且日本公使曾與職道講過如蒙大帥幫助成了此事那這糧餉軍械是他們出錢不過由我們轉給並且另外有些孝敬所以我們王爺叫職道特地來稟過大帥就好趕緊辦理那將軍見他説話時鬼頭鬼腦有些好笑他只當將軍喜歡了越發的搖頭擺尾自鳴得意加將軍一想不好他這話多分靠不住我前日接到京裏老八的信説是政府本意要助俄國的只因情理上講不過去所以宣告了中立那裏會有暗助日本的事況且俄國待我們政府總算好的了那一年不孝敬幾百萬就我這裏也格外有些好處那日本不過結交些讀書人不犯著去幫他只怕這石道是打著王爺的旗號來替日本做事的那就如何容得但我又風聞石某人確系達摩王爺的紅人又恐是真的不如暫時叫他留在這裏只消打一個電報到京裏一問便明白了當下想定開口道王爺要辦這件事真是對付強鄰的上策兄弟立刻奉行但老兄遠來辛苦暫請歇息等兄弟辦好文書再派幾個幹員同老兄前往耕朱忙請安謝了然後退出豈知加將軍立刻發電到京詢明並無此事並且石某還只是知州並不是道員加將軍接了回電方才放心立刻派人把石耕朱看管起來解回北京要治他一個假冒官職招搖撞騙的罪幸達摩王爺究竟有些不忍出來關説只落得削職還鄉正是有興而來無興而返成了一場話柄這耕朱回到上海聞得慶如住在新馬路便來探訪慶如問起行蹤著實揶揄道你的官心也太重了不過這一事卻是為保全領土起見所以委曲求全如果辦成其功不小但是談何容易呢此刻四海一身茫無歸宿不如與我結伴來作春申之夢吧耕朱因想起賽金花本系京都舊識此刻聞已回南要同慶如去訪誰知因虐待幼妓的事被人告發經新衙門判定遞解安徽原籍去了一時覺得名士美人同此身世存身不住便也匆匆回去了慶如送了回來屈指知心好友俱已風流雲散僅存公一小牧兩人卻又各有牽絆不常見面其餘如季留是杜門不出的了君實是挈眷回籍去了子青也是回鄉婚娶了元戚是上京當差去了算來只有林林還是相陪朝夕真是結綰同心花開並蒂覺得莽莽天涯惟有美人知我因此更加密合誰知秋風愈厲秋雨愁人那一日晚間慶如正與林林剪燭西窗淪茗清話忽聽窗外一陳西風蕭蕭瑟瑟飄下幾點冷雨打著玻璃窗好像進珠濺玉一般慶如不覺歎口氣道青春不再白髮催人光陰真如白駒過隙呢想去年在張圓中初會之後中間經了多少悲歡卻又一年已過此後茫茫身世雖不知如何但據目下看來世情惡薄時運崎嶇磨折偏多修名不立只怕要長此沈淪辜負我一腔熱血了説罷又歎了幾聲林林笑道慶如你可曉得人生最易得的是功名富貴最難得的是知心良友此刻你的功名雖是所投不利但你我實已結了同心生死不渝難道不強似萬鍾駟馬麼慶如又歎道你的話雖是但是我並不是羡慕那惡濁的富貴如果要他早已去求何必苦苦的辭脫呢我只恨我的志願重重阻礙不能發抒一點生在這個世界眼見這般社會卻于同胞的幸福毫無所裨益豈不是虛生一世麼林林曉得他的牢騷大發只得加意安慰又坐了良久方才睡下明日慶如便覺咳嗽氣弱初起尚輕漸漸的吐起鮮血來林林著急極意的調理服侍一面請了四馬路上博愛醫院裏一個佐佐木醫生前來診治服了許多藥過了一月方能漸漸痊可從此身輕于燕骨瘦如柴豪雲壯氣已消磨於無何有之鄉了
