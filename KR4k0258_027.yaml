body:
  text: 第二十七回金谷香華萬福行刺海參崴平公一遠征卻説慶如回來林林告訴阿寶的事大家傷感時世一回也就罷了次日慶如到店料理一天到傍晚時接到一張金穀香的請客票請慶如去吃番菜主人名字是萬福兩字慶如一想這人大約是新民學校裏華萬福了前日我到他校裏因訪耀秦雖曾見過這華某幾次但並非深交還是去好不去好呢沈吟一會只得又打聽還有何客那侍者遞上一張條子卻請的是已革廣西巡撫黃棠下面署名卻是一個姓胡的慶如心想這黃中丞雖是去位但生於怕與大員往來便決意辭了説聲謝謝自回家去誰知當夜金穀香卻發生一樁奇事卻説黃中丞名棠表字少春雖曾做過廣西撫台卻因辦理軍務不善只落得削職而回他與學界中也大為反對據説他在廣西時候曾議借法兵來平匪亂學界中定他一個喪失國權之罪他卻極口呼冤説是並無此事究竟不知誰是誰非不必深論當下他接到姓胡的客票心想借此交通些聲氣也好為開復地步便帶了一個當差坐了馬車徑到大新街來剛走進金穀香只見迎面樓梯上倏地下來一人走得迅疾還沒有看清只見那人一隻手把他揪住一隻手舉起來袖中露出一枝尺餘長的手槍對準了他扳機便放那黃棠驚得叫喊不出只得瞑目待死誰知過了些時耳中只聽得機簧的聲音不見有彈子出來也覺詫異莫非我已死了麼睜開眼時只見一個巡捕正一把揪了那人那人還很命的掙扎那巡捕把口笛籲烈烈一吹頓時有幾個印度巡捕狠巴巴跑上來把那人橫拖倒曳的去了黃棠曉得已經沒事卻驚得移腳不動好像鬼門關放轉一般呆了好久早有他當差來請他坐馬車回去他方才醒了些問道這這這是什麼人呢他當差回道那就是請大人吃番菜的不知為了何故竟要行刺起大人來幸虧他手槍的機簧已經鏽住放不出彈子沒有鬧出大事這是大人的洪福黃棠又呆了一呆道難道這人就是胡大人麼他當差道這人不是胡大人胡大人是家人認得的據金穀香説是姓華叫萬福是新馬路什麼學堂裏的教習黃棠大驚道我同他並不認識怎麼無緣無故要起我老命來此刻這人怎樣呢他當差道那時家人見他行凶一時不及救護就回身喊了巡捕一同上來捉住的此刻人是已經解到巡捕房了巡捕們曉得是你大人不敢驚動只討了一張片子去説明天叫家人到堂上去對質樓上也沒有胡大人請大人就回公館去罷黃棠道這樣説來真是虧了你我若再做到督撫一定把你升做個武巡捕就不怕那些匪黨了他當差的屈膝謝謝一同回去自有他姨太太置了酒與他壓驚不在話下那華萬福白白的舉動一場毫無成效只落得身為重犯幽禁囹圄還牽連了新民學校一道封皮封禁起來次日到了堂上華萬福直供與黃棠並無嫌怨只因他在廣西任上借外人兵力屠戮同胞既已被罪還鄉又復不安本分潛行來滬結連外人運動開復將來許以特別利益故冒用胡某之名邀他出來為同胞四萬萬人殺之事之不成命也云云問官因他所説黃某俱屬暖昧並無實據又説他擾害租界治安所以定了他一個監禁西罕二十年之罪後來這華萬福永無出頭之日只當在監中過了一世卻沒有做成功事何能甘心誰知因他這一提倡從此中國出了許多刺客都是聞風興起的就説他是個刺客的先聲也無不可卻説那年政府裏聽了幾個新進留學生的説話也著實醒悟了説是不立憲不能自強便派了五個大臣到東西洋去考察憲政以便仿照辦理誰知又激動了一個刺客姓胡名越是專門主張革命的他一想如果當今的政府真個立了憲法那時民心歸附國本堅牢便搖動他不得了就想趁五大臣出京時一炸彈炸殺他娘嚇得他們不敢出洋考察不成便立不成憲可以為所欲為了這是他們的私心不必講他誰知五大臣的命運還高不該死在這炸彈上所以胡越胸前懷著炸彈走到火車上恰好五大臣上車卻被護衛諸人盤詰了好久藥性發了頓時炸烈把胡越炸成兩段其餘不過傷了些間人連五大臣一根頭髮也沒有損著那頓時就震動天下暗殺暗殺喧譁不已當下政府急了便要窮治黨人除滅後患各省督撫奉了上命真個緹騎四出瓜蔓株連拿了許多沒要緊的人嚇得上海這班假新黨消聲息影遠走高飛還存些走不掉的只得把放浪的形骸收拾了些沒有辮子裝了一根假辮子腳上穿皮靴的換了一雙布鞋真個街市肅清看官大凡做留學生的人雖是有好有歹都有些事業做出來上等的掙了一個官發財發福或是廁身學界談忠談孝下等的索性入了會黨無法無天倒也海闊天空十分快樂最苦是這班中等的角色他的性情倔強既不能紆紫拖青手段低微又不敢違條犯法只落得蹲在上海吃吃花酒談談嫖經卻又要被認做黨人提去殺的殺監的監好不可憐也是他們自作的孽誰教你不良不莠呢卻説平公一當時得了這個消息他是方正不過的人十分看不過便想作避地避人之舉恰好海參崴地方有人來請他去當報館主筆他想借此遊歷也無不可便答應了收拾些琴書走來與慶如作別慶如大驚道你再一走真要寂寞死我了你想從前我等知已往還何等熱鬧如今只剩了幾人如何再經得你走呢公一歎道馳驅奔走自古皆然我們都是寒士自然不能常聚一處哩慶如道聽説他們在京裏的倒很熱鬧大家靠了留學生的頭銜當了章京丞參的差終日只韓家潭等堂子窯子裏玩那才舒服哩公一道他們自有他們福我們萬萬及不來的倒不必講他只是我去了我也要打算得長策方好這裏也不是你久居之地慶如笑道你叫我到那裏去呢只怕我的性情還是此地算最合宜哩大家慨歎一回慶如要想替他餞行此刻是窮了請不起大菜與館子只得邀他到家叫林林親自弄兩樣菜倒也清甜可口一面折柬叫他的夥計出店去請杜小牧來陪誰知小牧因酒色過度生了一場傷寒大症幾乎死去幸虧救活此刻還是委頓床褥不能出來只得叫林林也坐了三個人低斟淺飲起來
