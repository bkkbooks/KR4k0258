body:
  text: 第二十三回義勇隊壯志成虛革命軍偽書出世慶如聞得季留有此禍事便也出力與他打點幸得平安無事也很代為徼幸這日正在教林林學琴揀那巴黎情愛的歌詞翻成中文用曼聲歌唱以為笑樂只聽門銓響處侍者引進一人認得是日本回來的紀鐵山卻是從前在東京時相過從的便欣然迎接出來問他幾時回國鐵山敘述一番便道我在東京聞得慶翁在上海溺於豔情一味的到青樓索笑但據我看來自古英雄雖大半留心美色然而因美色而失敗的也居其多數可見並不是好色不礙為英雄正是因好色把英雄的事業阻礙了此刻我們這一班人有的弄得經濟上十分困難有的耗費了有用的光陰那一個不中了此毒慶翁你要改革才是慶如聽了覺得很不入耳要想把林林的奇遇表揚一番又想鐵山是個方正的人於溫柔道竟是門外漢同他説了不但不能領悟還要受他埋怨所以只把話來掩飾問他回國何事鐵山歎道中國國勢已是危到極點了北邊有了那強大的俄國守了先皇彼得的主義一心只想蠶食我的土地東三省已在他的掌握了卻虧得東鄰有個新起的日本曉得唇亡齒寒他也不能保全就想用全國之力同俄人競爭替中國奪回東三省來此刻差不多要決裂了慶翁你想想東三省是中國的地方被俄人生生的奪去日本是個鄰國卻憤憤不平的要與我出氣難道中國好坐視不聞麼如果真是裝聾作啞只當不知一任他們相殺只怕將來就是日本勝了那東三省也做了他們的戰勝俘獲晶決不肯讓我分他一杯羹了兄弟為保全中國疆土起見想著西國本有義勇隊的編制遇到國家有戰事時候由民間組織一個軍隊自己籌餉備械前往助戰這才是軍國民哩此刻中國學生在日本學習陸軍的已經不少如果聯合起來可以自成一軍只要內地紳商官吏助些器械糧餉就可以用著國民兵的名義到東三省去幫助日本共戰強俄將來戰勝之後也算中國有此一場勞績不然東三省的主權不保即使不勝也使外人曉得中國大有人在不是畏葸無能怯于公戰的我前日在東京把這個主義宣布了大受陸軍學生的贊成已經聯合了四五百人舉了許多將校日日在那裏操演準備赴敵因此我回國來要想運動國內的官民作個後援慶翁這上海一路我就托了你了務必把吟風弄月的勾當暫時收拾起來預備著龍爭虎鬥罷慶如改容道鐵翁你的志真算得壯的了人心不死大廈可支我為中國前途賀但是你要運動內地的官吏只怕有些做不到罷那內地的官吏膽小如鼠不敢做一點事看此刻政府的舉動倘使俄日戰事出來是決計中立的你想政府定了主見還有誰人敢於違背你去説他他那裏肯聽你呢至於中國的紳商是隨著官場走的只要官場一提倡他們就高興官場一查辦他們就嚇死了那裏有什麼真見識這募捐一層也就不容易哩鐵山道我也是這般想但想現在的直隸總督阮公是一個敢作敢為的人如果能説動了他那就可使政府改變方針民間易於號召所以兄弟想到天津去一次只等我有信來就知大事已成即煩慶翁與我在上海提倡起來慶如領諾鐵山又囑咐幾句匆匆的搭船北上這裏林林從屏後笑盈盈的轉出來道這紀君久聞其名今日在屏角窺見英風俠骨真是一個豪傑只可惜不解風情未免有些粗魯慶如笑道據你這樣説一個人必須在堂子裏嫖過方算得英雄麼殊不知他同他的夫人閨房靜好不肯旁馳外鶩那才是鍾情之至哩只是他此刻到天津去這目的一定不能達的倒可惜只一番壯志終要變成空虛的了林林道都像你這般厭世那天下事尚可問麼此刻他已去了過後再講我們昨天約的夜馬車怎樣呢慶如道小牧要來他是帶著林翠寶的等他來了再説此刻先把冰水浸的鮮藕鮮荔拿些來吃罷正説時門外鈴鈴的車聲到門而止少頃杜小牧手挽著林翠寶徐步進來慶如接著笑道你們兩人好似出水芙蕖臨風搖揚真足令蓬蓽生輝小牧一進來見有瓜果搶來就吃林林笑道不到七月半怎麼餓鬼就出來了翠寶上前拉住林林不依林林笑著自去向冰碗裏取出鮮藕映著玉手分外覺得雪白小牧吃了一陳便道天已傍晚我們就到張園去罷那邊有番菜可作晚膳的慶如點頭與林林重新裝束一番也喚了一部馬車一同出來到得園時已經大街火上陰陰緑樹中間微露電燈閃爍四人用了晚膳便互攜了手向草地上走來覺得空氣清新夜涼如水一洗紅塵萬丈原來上海地方人煙稠密一到夏令炎威酷烈異常真是如居爐炭寢不安席因此有坐夜馬車的風俗取其納涼消暑卻是青樓中此風最盛因青樓一櫞鬥大萬難靜對名花借此園遊倒可與素心人共消良夜好在張園裏面地方清曠水木蕭疏天然一個納涼亭墅所以連鏖接軫覓姊呼姨載笑載言通宵達旦盡有借此為祕密會者這日天氣甚熱早已聚了許多妖姬狎客東一簇西一堆在那黑暗中鬼鬼祟祟不知做些什麼事慶如等揀了一塊山石旁邊鋪下西式圈椅隨便偃坐早有伺應的人送上茶點此時皓月東升明星燦爛大家在樹影中穿綽微微辨些衣香鬢影遙望安塏地上人聲嘈雜電光照耀真覺炎涼頓別慶如慨歎一回回頭卻見林林坐在那裏手按著茗碗似啜非啜的眼看著牛女雙星默默如有所感翠寶手執紈扇一上一下拍那來往的流螢小牧張著兩張手正在替他驅逐過來慶如微笑便背了手徑向草地邊走來只見樹亭裏有幾人坐談只聽得一人忽地失聲道你可曉得老六又要升了昨天買辦對我説的洋東很歡喜他不出本月總要升他一個大寫了人道老六真能幹呢不上兩年從一個光棍掙上幾萬家私好不容易我們應當學他才是又聽一人不服道老六的英國話還沒有我好只靠著會奉承奉承得買辦喜歡只説他好其實他前天一項軍裝買辦上落了不少如何對得起買辦呢先説的那人道這就是你的不是人家正在轟轟烈烈頭上你卻在背後説壞話他如聽見了那肯再提拔你呢所以在這場面上第一要通世故萬不可得罪人再加上一個好把結沒有不得意的外國話還在其次哩這人極其佩服道原來要發財還有這許多講究我真不知以後倒要時常請教呢那人高興正要開口只見亭外又走過兩人前面一人哈哈一笑只説了一聲洋奴便直走入一簇林子裏去了慶如在星光底下看見這兩人裝束異樣前面一人像是西裝後面一人穿著一雙皮靴禿著頭頭髮是剪去的身上卻穿一件紗衫便想偵探他們的舉動放輕腳步一路跟來見他們鑽到一棵大樹底下靠著樹根坐定慶如便轉到樹背後屏聲息氣的聽説話只聽得一人問道你的事究竟幾時實行呢那人搖頭道難難我在首領面前擔任了這事如今想來好不後悔我不犯著拿我尊貴的頭顱去換那民賊的性命那如何值得呢只是我已答應了又是用了他們會裏幾千塊錢如果不作此事我就回去不得叫我拿什麼錢還他呢所以只好拜託你如有新出道的雛兒費心替我找一個叫他去頂缸他得了名我得了利豈不是好但這種人你意中有麼那人連聲道有有下缺原書如此
