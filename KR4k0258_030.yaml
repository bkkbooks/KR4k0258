body:
  text: 第三十回杜少牧悟徹青樓平公一歸結新茶花話説杜少牧這人青年巨閥雅負癡情平日揮金如土一意要在青樓中覓一知心紅粉因羡慕杜牧之為人恰好自己又姓杜所以號叫少牧也是天不負人果然覓到一個林翠寶嬌癡可愛是一流人便彼此深情契合哪知姐兒愛的是俏鴇兒愛的是鈔那個大腳虔婆原曉得什麼東西只要見錢眼開有錢便當作親爺無錢便視同仇寇杜小牧初時有錢有勢好不體面一進門來你也杜大少我也杜大少異樣奉承到得後來手中漸漸的窘乏了身上漸漸的藍縷了家當既經花完卻又欠了許多債偶然走到堂子裏都是理不理的一轉背便傾茶腳弄笤帚的魘倒不但鴇兒如是便是畫中愛寵也未免琵琶別抱弄得他無可投足只得枯坐家中又被債主逼得慌惡言惡語的催索就是鄰居親友都道他是個敗家浪子背後指指搠搠的有的説是祖宗無德有的説是父兄失教從前少牧所得的千里駒小神童等名譽早已劃除淨盡便是受過他好處的也都泛眼若不相識正是只有錦上添花誰肯雪中送炭少牧睹此情形好不傷心落淚心想我不過少於幾個錢便就要看我不起想我在嫖場上也有好幾年了從前有錢的時候人家何等奉承我何曾有人來針規一句此刻沒有錢了卻都假裝著道學面孔來教訓我可見得你們都是一腔勢利何嘗是真心為我呢我如今要恢復名譽惟有絶是青樓努力掙些家産起來只要擁了厚資不怕他們不來奉承這也是他無可如何的計劃果然少牧從此巴圖上進雖是世故人情漸漸通徹只是性靈的事漸漸遠了而且債負過巨一時恢復不來常時的憂憂不得志一日聽見慶如釋放了便想趕來一見不道做了一個交臂相失只得快怏而回走到四馬路左近只見迎面走來一人高聲喚道少牧好久不見少牧看時原來就是平公一喜道你幾時回來的幸遇幸遇公一道我昨日才到因慶如的事特來探得實信少牧道慶如已經遠逐他方了我們何不到醒夢樓淪茗清談暢敘契闊公一道甚好兩人走上樓來揀一座頭坐下公一道我到海參威一走不料上海諸舊友竟風流雲散今日剩我兩個豈不可歎慶如的事尤其變幻少牧歎道公一青樓翠館為陷人坑阱古人真不欺我想我們幾個人大都賦寄間情詩吟本事風流跌宕自謂快心豈知今日之下淒涼若是還是慶如閲曆花叢得了一個傾城知己生死不渝然而所曆的苦可為加倍報酬其餘除足下蕭然物外不沾不滯外如陳元戚之悼亡孫求齊之落魄平季留之陷獄均經歷無窮波浪即鬍子青貝君實等亦離合不常最可慨者如我少牧一縷柔情竟被惡罡風吹散今日金盡交衰美人何處尤為不聿中之至不幸者回首當年笙歌宛在真繁華一夢也公一道你也不必慨歎據我看來這原是古今常有之事天下無不散的筵席當既散之後追想未散之時何等熱鬧自然要起昔是今非之感其實這個公例原不能免的只要我心不為所動或雖動而一出於至性至情則當時行之既覺心間意適事後傳之亦覺可泣可歌千秋之後自有定評自然有真性情者雖其舉動稍出範圍猶較假談仁義道德者高出萬倍我看項慶如同武林林一樁事迹倒是必傳的我前日在海參威看見一部書叫做新茶花就編的是他兩人的事我大略看了一遍也還不失我們的真面目讓他們去傳罷説時便從袖中取出書來少牧接過隨手翻閲忽然問道這書既名新茶花林林又自號茶花第二樓你看究竟東西兩茶花那一個好公一道馬克雖好我還嫌他決絶亞猛一層並不是十分不得了的事情或者還可婉曲周旋何必遽爾絶情呢至於林林卻是除此一著實在無可解免據我看來還是武林林為優少牧大笑道説得好公平公一道我叫平公一原是議論公平的意思就將這一段公平議論作為新茶花的結果豈不是好戊申杏春晦日購自滬江即晚閲竣新茶花二集終
