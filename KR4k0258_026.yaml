body:
  text: 第二十六回金消裘敝名士蕭條裙布荊叉美人憔悴慶如經此一番大病費用已經十分拮據免不得典衣貸馬原來慶如雖是個大家中落已久連年又遭水荒田租無收家用尚且不繼自不能寄出來了林林雖有些衣服首飾並無現資所以幾個月小房子一住竟異常竭蹶起來起先還是東移西借過後便把首飾來當等到慶如病好已經奩篋一空娘姨阿寶只好辭別了另招人家僅用一粗使大姐慶如自覺過意不去十分抱歉林林卻處之泰然不以貧富易意每日仍是梳的絶光的頭簪的絶豔的花嘻嘻哈哈像沒有心事一般空窩著慶如尋些歡樂只叫黃連樹下彈琴了單差房租已欠了兩個多月如再不付就要釘門慶如頗為著急這日來與林林商量道房租只在明後日家中既不寄來好友都不在此無可稱貸我想回家一次變賣些田産卻又緩不濟急如何是好林林笑道不妨這個事我在出迎春坊時已打算好子因你有病所以沒有實行如今再緩不來了我想坐食山空天下斷無此法免不得要盡些生財之道只要日進分文也就夠我兩人吃著了論你這個性情捐官做必不願意如果低頭下氣去做教習或者書記之類你也幹不來的還不如做些生意或是開一爿小店雖然流入市井究竟還有自主之權只消稍稍沾潤一點依舊可以琴書自娛你道如何呢慶如道好雖好但資本無出也是枉然林林道不難我的首飾是已經當了剩下的衣服雖不多如果變賣起來也有五六百金就好把那當去的首飾贖回再向銀樓珠鋪裏賣去大約好得一千四五百金你拿一千金去找人合股開一個店拿四五百金存在莊上吃些利息遇有緩急也好貼補貼補我也不望得利只望每年有二三分利息那就有四百金光景可以苦苦的度日子慶如淚下道你這許多東西都是辛苦積貯如今為我消化淨盡豈不可惜想古人説的金屋藏嬌如今我不名一錢纍得你如此藍縷教我如何對得起你呢況且美人丰韻全在妝飾如今弄成這個樣式豈不失了你茶花第二樓的身分你想想馬克是何等富麗呢林林搖手道這些話你都不要説他男女配合只要愛情固結豈在錢財上計論麼這錢財本是公用之物不論何人均可有無相通何況你我是何等交情呢至於女人妝飾全在精致不在富貴自古美人他愛裝束也不過潔淨適體方為善於梳妝若不管合宜與否只要耀炫人的耳目何不打了一個金的假頭像戲裏羅漢的頭一般套在顱上豈非更覺輝煌即使不相稱若何所以無論貧富既是個美人總有一個合宜的裝束不因寒儉而減色的那馬克長居匏止坪時也未嘗不是這個打算只差亞猛生了家庭阻力所以沒有達他的目的只怕要讓我來補他未竟之志哩慶如給他説得笑子只得説道好説得暢快我只得要敬領厚情了林林也覺欣然暗想倒享受了他一副知心眼淚因問道你如今想做什麼生意呢慶如道我想別的都是外行如何做得惟在文字中打算聞得近來書鋪的生意很好我們的朋友也大家有幾部譯稿要出版如果開一個書鋪自己印些書來買再替別人發行發行到底自己曉得些只怕倒不會折本到那裏去林林道既如此事不宜遲速速去辦要緊慶如答應了從此日日的變賣金珠衣飾又約了幾個股東在棋盤街上租了一間房開起一個鏡清書局來人家見他又有了錢自然又奉承起他來殊不知慶如這回奉了林林的約束絲毫不敢亂走只是日日的早出晚歸盡心竭力料理店務林林也替他結算帳目估計利息居然一個當爐的卓文君模樣只可惜書坊的利錢微薄所賺的還不夠所用的加之上海連年米珠薪桂房價飛增新馬路的大房子住不起了只好退掉在左近又租一間局面狹小比前大不同了林林此時只穿得洋布的衫裙只帶得包金的叉鬟卻依舊愛茶花如命天天把他簪在襟上好在上海的婦女妝飾是天下第一無論如何醜婦只在背後望去沒一個不是小腰細頸雲鬢花顔只因他的髮髻梳得異樣入時上圓下尖既長且闊緊貼頸上好似烏雲映雪一般更有作墮馬妝者所以必須對面看來方見廬山真相不然未有不作天際真人之想何況林林本系天姿國色加以梳妝雖是衣飾減少越顯得素面生霞清神壓水方信美人淡妝之妙這也不在話下有一日娘姨阿寶拿了幾樣餅餌來看望林林卻好慶如在店未回林林正在那裏做些針線阿寶見他身上十分寒儉不覺歎道先生你可記得端午節上我説的話麼如果聽了我何至落到這般景象只是現在回頭也還不遲我如今在華大人公館裏伺候他第三姨太太這個姨太太也是堂子裏出身他的相貌只及得你先生的腳跟卻因嫁了華大人享了許多福別的不講只他住的穿的吃的那一項不稱心適意間時約幾個姊妹叉叉麻雀鬥鬥挖花或是喊一部馬車出去兜兜圈子那樣不好華大人又同他很説得來拿他當珍寶一般那一天我同阿昭間講起你先生如果肯嫁華大人那怕他不樣樣奉承你一定是要蓋過三姨太太何況他還不敢自己討是替王大人討的你想王府裏富貴還説得盡麼只差先生戀住了項大少不肯離開如今項大少變成蹩腳先生你也該走了前日華大人還對我説如果先生回心轉意他仍肯照原議的先生你醒悟了罷原來這阿寶不會説話夾七夾八傷觸了林林只見林林柳眉蹙起杏眼睜來指著阿寶的臉上直向上去道你是我什麼人要你來管我我窮我的與你什麼相干你受了華中茂這賊的指使要想來説動我不要做這個夢了我自己情願窮幹你屁事阿寶嚇得倒退幾步忙分辨道不是呀我是為相處多年見你落薄了心上不忍故此勸你幾句是為你好呀林林怒氣不息道我身上雖是落薄心中卻十分安逸能過這種清淨日子一天便死也是甘心的若叫我做大人家的姬妾與主人性情不合雖是享受富貴譬如金籠養鴿那裏有天空高飛的舒服呢所以無論如何苦楚我總情願要我離子項大少是萬不萬能的阿寶道先生立志如此我也不敢再勸只是華大人諄諄的差我來如何回復他呢林林道你去叫他死了這條心罷説武林林今生就此定局不可改移的了阿寶沒趣只得怏快回去告訴了中茂中茂大怒道這妮子如此可惡苦到這般田地還是倔強我若不把他收伏不用在上海住了因想了一回道有了阿寶你且去歇息我自有收拾他的法子必要把他弄得來才顯我的手段看他逃到那裏去阿寶諾諾退出華中茂自去辦理不提
