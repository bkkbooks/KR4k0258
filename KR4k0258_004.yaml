body:
  text: 第四回上海縣中快識東方亞猛福州路上間評南國鶯花紫人到了上海拜會了許多朋友因他是個小欽差就有人恭維他接風洗塵的極多紫人一一應酬也覺煩得很那天想起現任上海縣項大令是此間地方官雖見過幾面未曾深談他侄兒項慶如是個絶世英雄當今才子他懷著蓋代才華卻生在這黑暗世界因忿生愁因愁成恨便有屣視功名塵視軀殼的意思而且生性多情溫存體貼當説道一個人有了神經就有一種愛好的性質天地間形形色色優而美的就大家歡喜他惡而醜的就大家厭惡他誰也不能逃這個公例吾看了天上的雲江中的水變化萬狀重疊千層算是奇絶的了吾就不得不喜歡雲喜歡水但是雲水還是無機的物件那花一瓣一萼五顔六色嬌豔異常那鳥一翎一羽光采華美十分悅目我就不得不喜歡花喜歡鳥你們想想動植物中尚有這般微妙的物來引我愛情何況在京垓動植物之中間是一個全智全能的人在兆秭人類中間是一個最尊最貴的女子在億萬女子中間是一個至清潔至高尚的美人哪里能夠真如死灰木石一般毫不牽動愛情麼所以好色一樁事真是天地間的公性無論什麼人不能免的不過聖賢豪傑愛情真摯格外重些罷了這句話並不是我杜撰但看文王是個大聖人他愛慕淑女的時候曾經寢寐反側就曉得不是常人可及了只是好色與愛情卻還有些分別好色是軀殼上的事愛情是精神上的事兩相比較自然是精神更重子所以一個女子雖是姿色可觀思想卻十分腐敗那種色就不足好了如果那女子的性質高尚富於愛情就算不是天姿國色他的丰韻也必與庸脂俗粉不同豈不能消受我一番眷戀呢不過愛情總要彼施此受兩得其平假如我愛他他不愛我或是我不愛他他卻愛我這叫做有正電沒有負電有陽電沒有陰電斷無攝引的一日了所以必定我自己是個絶世的美男子又負著一副絶世的癡情方才可以對於絶世的美人而用我之愛不然就是不知自量了我現在僥悻有了了這副相貌這副才情若不於男女界上做些事業豈不辜負造物一番美意呢他生平就是這種議論可算是個奇人不可不與他相識一番今日無事何不進城去拜會他邀他出城來不拘何處花叢遊歷遊歷就可看他愛情的熱度了當下紫人計算已定便喚乘轎子徑進新北門到縣署投貼單拜侄少爺少頃傳話説請便有管家引進一間客座湘簾斐幾不染一塵正在嘖嘖羡慕只聽簾外腳步聲簾子一掀閃進一個人來神如秋水態似春山卓煢不群顧盼自喜便知是主人了兩下寒喧幾句紫人將來意説明慶如歎息道紫翁你道這北裏中間能得個知心妙妓麼若輩大都出身鄙賤自幼沈浸於淫穢世界飽受下流教育那思想所到不過是送舊迎新那目的所在不過是爭妍獻媚像從前薛濤的文雅蘇小的風流李香君的氣節已經渺不可追了近來歐風東漸居然平康中大受影響男女平等作為軋姘頭的口頭禪婚姻自由成了吊膀子的門面話雖説自由只是野蠻人享的自由不過野蠻自由罷了紫翁你還想及時行樂麼紫人被他一説如冷水澆頭一團高興已逃到爪哇國去了囁嚅道難道偌大申江竟無一個入眼的麼慶如想了一想道今年遊戲報花榜狀元林絳雪倒還不差既然紫翁十分高興就往那裏坐坐罷便吩咐備了轎子一同出城徑到合興裏下轎入門慶如是來慣的一徑到絳雪房間坐下紫人是初次便留心細看只見榻床上面挂著青地金字的匾額鬥大的狀元兩字筆勢極其飛舞旁邊卻是遊戲主人為林絳雪立兩行小字正看時嫋嫋婷婷走上一位校書頰暈朝霞眉籠晚翠十分富麗便也傾心賞識坐了一會慶如吩咐擺席隨意揮了幾張請客票不一刻陸續客到共得五位元紫人也都認識便起了手巾發了局票入座暢飲席間談些國政內中有一位報館的主筆陳君向紫人道令師康先生新得督辦時務報的差使不日要到上海了紫人詫異道怎麼這個消息兄弟一點不知道出京時也沒甚風聲不是風聞罷陳君道這是時務報館裏得的消息大約確實並且報館的舊總理很不舒服哩紫人道這也難怪他創辦時本是費了一番苦心的慶如道康先生向用方殷忽然大才小用只怕有些變故罷紫人再要説時只見各人所叫的局紛紛來了這日因紫人要博覽名花所以預先與諸客約定叫的都是上海有名的紅館人真是珠圍翠繞鬢影叉光紫人左顧右盼心花大開也就無心再談了慶如一一指點道這天然秀麗的是林家的小林寶珠嫵媚多姿的是迎春坊的范彩霞豐若有肌柔若無骨的是琴川沈桂雲那穿月白輕綃衫的是六馬路秦薇雲其餘像金湘娥謝倩雲高巧雲祝如椿等都是個中無上上品紫人一一領會心中已有高下了當下熱鬧了一會早已酒闌席散紫人拉子慶如回寓抵足長談不免提起今日之局來紫人道我看方才這一班人算是絶色的了怎麼慶翁還説是不足觀呢慶如歎息道中西優劣之分點就這花世界上也大有軒輊呢你看過新出的巴黎茶花女小説麼那馬克格尼爾姑娘不過一個名娼他的身分也同方才的差不多就是他的顔色也不見得沒人賽過他只是他待亞猛的一腔愛情真摯到這般地步最難的是用情深處因要保全亞猛名譽轉為不情之舉不但外人疑其無情即身受的亞猛也怨其薄情他卻仍不肯自表情願犧牲一身以達其情之目的這種人可稱為情中之聖我看他一來是由於天性二來也是歐洲的教育本好那流風所被勾欄中人也沐著了紫翁你想中國的娼家有麼所以兄弟頗想提倡一種花叢教育以人人有完全真愛情的為目的倒也是改良社會的一分子只是這種教育不必定要設立學堂只消把這個道理日日提倡起來又物色一兩個有愛情的人獎贊他崇拜他自然風靡娼界了紫翁你道如何兩人談了好入不覺天明方才睡去直至晌午後醒來外面送進一張申報揭開看時起首的代論原是梁君啓超自己敘述辦理時務報的一片苦心孤詣正操那同室戈哩紫人也是歡喜正看時又見縣裏有當差的來接侄少爺並有縣主密函折開看時上寫著頃得京理由密電康有為進呈紅丸實行篡弒事覺潛逃著一體嚴拿勿任漏網等因此電個分緊急現道憲已赴淞口查辦速即回署勿為株連密兩人大吃一驚紫人叫聲阿呀往後便倒不省人事
