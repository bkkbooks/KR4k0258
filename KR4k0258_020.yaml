body:
  text: 第二十回奪學堂同室操戈翻花樣洞房合巹卻説項慶如耽於豔福絶意進取人人代為歎息他卻絶不為意終日深居簡出做那京兆畫眉故事間時亦教林林學習洋琴自己做些新鮮曲調拍入琴裏唱起來這種樂處人也趕不上他的一日正是清明佳節心想到龍華踏青一回又想起季留的學堂離龍華不遠要順著一訪正同林林説不想簾衣一掀闖進一人正是季留卻滿面怒容一言不發慶如詫異連忙讓坐道我正要同林林來奉看不想你卻來了好久沒有來滬學堂如何發達季留擊案道你還説學堂哩已經散了慶如愕然道聽説辦得很好怎麼就會散了呢季留太息道都是魯耀青這下流種子弄壞的慶如更加奇異道耀青的學問極好如何會弄壞呢季留氣已稍平便慢慢的告訴出來原來他這學堂名字叫做觀海學院學生也有百余人十分發達所以請的教習也是留學生為多內中最出尖的就算魯耀青了他的教法又好學問又好學生已是心服加之籠絡學生的手段説來倒是一般教習的祕訣他一到學堂諸事還在其次先查學生中問那個是學問好的程度高的有思想有志氣的揀了幾個就用全付的本領去籠絡他先在講堂吹一陳牛皮誇獎自己怎好怎好把幾種普通學問演述一遍説是不傳之祕再把他們學生也稱讚幾句奉承幾聲推之為大豪傑許之為真國民一頓拍馬庇已經把學生迷得昏了一面又私下把幾個學生約到自己房間裏來密切的談心或是互換照片或是唱和詩句甚者還要置酒飲宴那時這個教習已算得全堂物望所歸了過了些時就同學堂總理及辦事人意見不合了據他的意思以為像我這樣深得人心這總理就該我做你有什麼本領倒要掌握全權這樣一想便事事反對起來面子上還是照舊卻暗地攛掇學生道本堂的功課雖是還好但管理及庶務卻腐敗到極點我不過稍為説説總理就同我不對我們事權不屬只好空歎氣罷了有時又誇説如果我做總理時便如何整頓如何改良必不像現在這個樣子的幾句因風縱火的話把學生挑撥得心裏熱刺刺就要大起風潮了此番魯耀青就用這種法子把一個觀海學院頓時吵得家翻宅亂起來如果總理實在腐敗或是不識學務只好含著眼淚忍氣吞聲的告退了無如季留這個總理本是個留學生加之問心無愧理直氣壯也不肯讓他彼時有幾個沒有煽惑的學生卻代總理打抱不平頓時學生也分為兩黨互相攻擊看官這是季留做了總理所以如此若換一個次一些的早已一窩蜂跟著走子卻説季留起初還不曉得誰的主動力後來曉得是耀青了他的性子那裏耐得立刻找到耀青當面著實責備一番耀青紅著臉正要強辨只聽拍的一聲左臉上早吃季留一掌還未閃開右邊又是一掌打得臉上越發紅起來要想回手早有許多教習勸住季留轉身就走頓時辭職耀青立身不牢便把學堂搬到上海新馬路改名新民學校果然做了總理遂了他的心願那季留一面的學生自然是四散了當下慶如聽季留説罷不覺鼓掌道快哉此擊真千古第一擊也林林笑道怪道那魯大少到了臺面上板板六十四的不肯叫局原來這樣陰險可見肯在堂子裏玩的那心地倒是光明正大的呢季留也笑了慶如正色道季留此刻的學務真是愈趨愈下了據表面看來從前人辦的學堂專用壓制手段覺得野蠻自然是此刻辦得文明了殊不知一味放任的卻也算不得文明如你所説教習奉承學生這弊病已經如此還有辦事人奉承學生的哩他只圖學生説他一聲好他就可久握大權恣其侵蝕所以一切不問任他們出入自由無惡不作講堂好像茶樓操場變作賭場學生覺得比家裏舒服自然願意來就學了就有幾個矯矯不群的住了幾日不怕你不同流合污所謂如入鮑魚之肆久而不聞其臭了那辦事人看見學生日多自以為辦有成效越發要奉承學生把功課當作一種附屬品了你想這種學堂要算做文明那賭場茶館更要算做文明的祖國了做父兄的與其送子弟到學堂不如送到賭場茶館學些祕訣倒還直接爽快呢季留道罷了罷了我從此跳出學界不做這種事了我們且説間話罷你可曉得君實要結婚快了聽説就在上海舉行我們去吃幾天喜酒才是慶如道他昨日已有請帖來的到了那時想我們幾個同志又可以一聚了一面説一面叫林林取出些酒食來三人對花小飲夜深而罷到了結婚那日慶如公一季留子青小牧陸續的來到只見堂開錦繡地疊氍毹收拾的十分富麗君實一替一替的正叫人催請伶隱汪筱儂來不多時只見一個短男子背了一個大包一個大籠踅著進來君實大喜接住慶如等問是什麼東西君實笑道少停自知須臾間筱儂到來與衆人見了這筱儂直求人氏自幼讀書深通時勢只因名場蹭蹬棄儒而優卻最喜與諸志士交往時常做些憤世嫉俗的詩篇以日本的宮崎寅藏自比論他的思想即士大夫中也不可多得卻有一椿事不好是愛吃鴉片煙當下筱儂叫君實將外衣脫下便在包中取出大紅圓領角帶皂靴籠中取出紗帽一頂先用網巾把君實的頭扎了眼角塗些脂把眉毛畫長了帶上烏紗穿了紅袍系了角帶登上了方頭靴又插了兩朵金花頓時把君實打扮成一個前朝狀元的樣大家看了拍手道妙妙虧君實如何想出這個花樣果是新鮮別致君實道我見新娘穿了鳳冠霞佩覺得新郎的箭衣外套有些不稱所以同筱儂借了這幾件衣服取其互相配對的意思有甚深意呢衆人也覺得這個喜酒來得出奇格外起徑少頃花轎到了請出新娘一般的參天合巹就這新郎的古衣古冠越顯得堂皇富麗美滿姻緣衆人吃了一夜酒也就散了讓他們掇拾古歡圓全新好不在話下
