body:
  text: 第十九回名校書情贈孔方兄留學生得意長安道只好向朋友處拉扯的了但是不很熟習的人不犯著向他開口就開口也是無用向來來往的人如公一季留等卻因年盡都已回家度歲只有求齊在此他是湖州大家或者可以商量便找到求齊處來誰知一進了門只聽得求齊長呼短歎問起情由原來因為求齊流蕩不歸家中不肯寄錢出來此刻債務逼迫無法可施正要來找慶如正是同病相憐慶如把來意説了大家倒抽著一口氣慶如先歎道早知銀錢如此易去當日何不少用掉些求齊道此刻懊悔也沒用不如再去找找朋友罷慶如道同志諸人都已散去在此者不是市儈就是官場他們只知道奉承得勢的人整千整百拗著要送給人用像我輩無錢的人去找他恨不得揮之門外那裏肯通融一文呢求齊道事已如此難道束手待斃不成且讓我姑往求之倘能如願當分潤於君慶如只得回來過了兩日求齊處因是無望家中也只寄得六百元出來道是家鄉水淹秋收歉薄的緣故那時慶如真個急了到那上天無路入地無門的時侯連迎春坊也不敢去了當晚在寓所把腦筋都想碎了實在毫無計較原來慶如在東京沒有學得經濟學聽以一點不會理財次早正是悶坐只見阿招含笑進來隨少爺為甚昨晚沒有回來俺們先生等到四點才睡也沒有睡著只當你病了急得很一早就著我來看望的慶如聽得只因區區阿堵物致使我最鍾愛的美人拋棄他最甘美的睡鄉又是慚愧又是氣苦只得説道我因料理節帳所以沒有回去此時立刻就來了當下就攜了阿招的手一徑到林林處來林林接著道慶如你昨晚不來我只當病了原來還好只是臉上何以清減了好些況且你這兩日愁眉不展必有什麼心事何不告訴了我待我與你分解呢難道你我還有不好説的話麼慶如一想果然此事本不能對所歡的説但林林的交情豈比尋常況且他的計較又好何不告訴了他或者倒有法想便把資用竭蹶的事一一的説了林林就説道這是什麼大事值得如此憂愁倒使我一夜不安慶如愕然道這是損壞名譽的事如何説不要緊林林笑道亞猛真童駿也拖慶如坐下款款的説道你可曉得上海的規矩是店帳可以少還些的只因上海的店鋪最多所以競爭最烈他恨不多拉幾個主顧保全自己的鋪子只要圖下次往來也不計目前出進如果聲名顯赫即分文不付也不要緊你的名譽是他們曉得的況且這幾家都是資本殷實不在這幾個錢的你只説一時未接到家信先付一半其餘明年再説他們必然相信不疑你此刻尚有八百余元付去一半店帳六百余元尚可多得二百元可以開銷此地的節賞至於我處的酒局帳不過三百元光景諒我還不急用等你有錢時我要用一千八百又算什麼事呢這樣一辦豈不過年很寬裕了麼慶如聽了如夢方醒將林林肩上一拍道你真是一個能手將來我如果娶你回去那時的家政必定可以井井有條了林林笑道正是我還有一件事要對你説你家中已有家眷我將來嫁了你雖説是個妾但我是不到你家鄉去的一來不願做那兩重的奴隸二來自由慣子不能受這拘束好在你總要在上海做些事業你可拿我當作一個外室就住在上海尋一個幽僻所在享些清福你往來兩處既不寂寞了正室又遂了我的自由你道好麼慶如答應了林林又道我本來想下節就除去牌子不出局子但此節揮霍了些還有許多未完本想你替我還的此刻你既有店帳未了搬出去時不免又有些費用看來只好再做一節端午後再説的了但你下節必須格外撙節還要預備過後的用度哩總要打算周密不可像馬克的貨去肩衣依然不了只得重為馮婦呢慶如道這個不妨我家中還有些田産除去家用每年可餘二千元之譜本年卻是用得多子所以不敷一到明年我拿銀錢都交托於你你與我管著做一個經紀人就不怕我浪費了林林含笑應許當晚過了一晚次日慶如回寓把各店帳一一折半還了果然毫無難色但囑明年仍來照顧而已慶如大喜把餘下的二百元袖了回到迎春坊叫齊娘姨大姐本家相幫一總賞了百元頓時歡聲雷動稱項大少爺不止慶如又將百元交林林藏了此時心無牽絆也不出去安心樂意的住下又值年底林林不去出局蛾眉坐對樂不可言只是記念求齊不知如何心想把百元贈他便與林林説明來到求齊寓所豈知那邊人回説已動身赴日本了慶如十分詫異當是他避債的口訣心想金小寶必知他的蹤迹何不到小寶處尋他當下便到三馬路來小寶接住問起求齊小寶道他麼昨日動身到日本去了慶如道如何去得怎快小寶笑道項大少你們是至好瞞不得你只因求齊在上海欠得債務太多此翻竟是周轉不來他家中又不肯寄錢與他急得什麼似的那天到我處來説起愁苦我見他久留上海無有了局勸他不如仍到日本留學他又恐怕無費我説你如果到得東京那時你家中見你仍是留學自然肯給你出費那是不用憂的至於此刻的盤川與那上海的未完我與你擔代便了他才打定主意在我處取去二百元收拾行李去了這一去或者可以巴個出頭日子也未可知哩慶如聽了大喜道小寶先生你的俠骨早已名重青樓不道你與吾輩也是這般有情真令我五體投地了小寶道這一兩百塊的事算得什麼我近來也很喜歡親近你們一班人比小報館人強多了明年我還想到女學堂去讀書哩慶如代求齊謝了便回來向林林説知還笑道這金小寶是有名的四大金剛難得他棄釋崇儒從此龍華寺前少了一尊護法了兩人笑了一回方罷後來金小寶果然改名景肖豹在南方女學堂裏充作女學生這是後話不提卻説慶如過了年關那上海的新年是繁華異常的三街六市家家閉戶不作生理只聽得鑼鼓喧天接連不絶謂之敲年鑼鼓一到午後泥城橋的路上馬車接成一字盡載著貂裘貴人明鐺美女一齊向張園進發加之自初一至初五這五天內凡北裏中人一例須系紅緞百襇裙上飄著許多飄帶好像花蝴蝶一般在那園林草木間一閃一閃分外顯得煊爛至於四馬路上人山人海擁擠不開兩旁的茶樓書館笙歌鼎沸粉黛成群最得意是那些值書場的直著嗓子高唱先生上來東西相應聲聞十裏真是説不盡繁華富麗慶如同著林林也天天去坐馬車雖應有盡有卻適可而止不肯十分放縱以為預備收場地步原來堂子的規矩凡新年客來妓家例以果盤為敬那客人必須以十六元至五十元謂之開果盤那些慳吝的人不願出此重賞就大家裹足直至十六方去謂之十六大少爺林林相識的闊人最多如華中茂輩來開果盤的絡繹不絶但是不相干的人究竟少了林林趁著清間與慶如蜜意幽歡更是不同惹得華中茂醋意重重不知造了許多謠言林林只是不理卻也無可如何轉瞬元宵已過公一到滬來訪慶如季留卻因學堂業已開課不能出來公一説起政府看重留學生格外施恩命各省督撫保送日本畢業學生齊集京師聽侯考試聽説要賞舉人進士的出身還要破格重用哩慶如你何不也去走走慶如未及回言林林先説道平大少你還説哩前天我過這麼一句倒惹他説一大篇的胡言公一問故林林把慶如前番言語述了一篇公一道慶如太憤激了我看元戚此去是必得意的他不是輩中人麼慶如笑道公一總是這個議論所難家不叫你平公一只叫你平公議也公一也笑了過了些時果然聚了十三個留學生在京師考試又殿試又殿試了一遍卻是一榜盡賜及第賈新民高高的考在一等第一賞了翰林其餘了也有賞進士的也有賞舉人的元戚也得了一個舉人出身留京聽用這資訊傳到上海慶如毫不理會卻因此哄動了通國大家一盤算從前考試科舉用了十年苦功三年辛苦僅僅得一舉人還沒有官職尚是千萬中選一盡有皓首不得的論他費去的錢更是盈千盈萬此刻只消三年的功夫到東洋去一躺所費不過千元光景卻考試起來沒有一個不取的起碼也是有個舉人當起差來每月總朋一二百元的薪水不是一年就出本了麼卻白賺著一個出身以後便都利息了這種買賣哪個不要做便拼命的出洋或是自費或是運動官費如蟻赴膻如蠅逐臭頓時把東京學生的人數從四五百人不消一年增添到一萬人以上照這樣比例起來只要五六年功夫可以把中國四萬萬人盡數搬到東洋去做留學生真是個奇觀哩
