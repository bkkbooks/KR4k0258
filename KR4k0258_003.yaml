body:
  text: 第三回禦史席間談朝政京官衙內讀英文蓉初走到臺面上便問是哪個叫的主人指著首席一個燕尾須鶯爪鼻身材臃腫五十四五年紀的人道這位羊大人叫的蓉初就挨他旁邊坐下他卻眯著兩隻眼撚著兩片須看個不住那口中涎水一點一點流下蓉初看他怪樣笑了一笑那主人便道羊大人是京裏的禦史勢力最大的他一動筆外省的督撫都要害怕你好生招接著罷羊大人聽這主人一番恭維頓時歡喜起來顛著膝蓋道不是兄弟誇口在那京都老爺當中要算兄弟是一個不避權貴的就像李少荃那麼利害只消尋著他私通外國的憑據也給兄弟參掉了所以兄弟在老佛爺面前是狠紅的宮裏的黎大叔也狠瞧得起兄弟説兄弟是個清官王爺是不必説了卻是要算端府裏和兄弟最説得來兄弟受了這種知遇更是盡心竭力要想做一番事業給兄弟的祖宗爭口氣此番兄弟進京第一就要參劾那班吃洋屁瞎吹牛皮的敗類他們放著祖宗的法子不守專講什麼維新那新法都是夷狄的法他們難道連用夷變夏這句話都不曉得麼近來更鬧得糟了又是什麼保舉人才咧開設學堂咧那都是廣東妖人康有為造的妖言京裏外許多人跟著他哄也不知是吃了什麼喪心的藥了正在説得高興那主人卻見蓉初在他背後只管掩著嘴笑一會又同阿金指指搠搠的扮鬼臉曉得這位羊大人説開了頭是幾天幾夜都説不完的便用話打岔道心翁在京多年那京師的花事聽見説是一年盛一年了不比從前都叫相公的那羊大人又起徑起來道相公有什麼玩頭呢兄弟最喜歡的是逛窯子不過近來又被他們弄壞了從前是一兩吊京錢就要樂一天近來上海去的賽金花范桂生一班人又是海式咧洋派咧的亂鬧聽見一桌酒就要二三百兩想想我們做京官一年能有多少俸銀多少孝敬經得起這樣花銷麼蓉初哼了一聲也不言語便命阿金裝了水煙立起身來説聲晏歇一淘請過來便姍姍的去了這裏衆人又鬧了一陳也就散去卻説今日首座這位羊大人是個江蘇常熟人字心柏在京裏是表表有名的此番進了京銷了假到衙供職那時康長素師徒也都到京了陛見下來雖不是連升三級卻也言聽計從舉辦新政的上諭雪片似下來不知是他們請的不是他們卻在外面誇口如何得君如何獻替鬧得聲勢越大了心計越粗了又汲引了許多同志做個幫手真是一犬吠影百犬吠聲霎時間傳遍通國心柏心中不樂每日在書房裏踱個百遍不知想什麼心事有一天他去上衙門卻是靜悄悄的想來沒甚公事便散步來訪同寅要想談些間話走到一個窗下只聽裏頭朗朗之聲是些什麼瘟士脫裏花歪愛夫雪口水失文愛脫奶愛痕探痕正在讀得高興心柏一腳跨進道紫翁讀些什麼那人道是英文一二三四十個號碼罷了心柏道原來紫翁如此好學竟能通達外夷文字難得難得只是兄弟愚見總嫌洋氣重些不是先聖先賢的遺法那人正色道心翁你説哪里話來自古識時務謂之俊傑孔子也是個時聖哪里好死守書上的話呢方今西學昌明人人磨練以備聖朝驅使正有絶大的事業哩不瞞心翁説兄弟昨日備了贄見去拜康先生為師他老人家卻十分器重小弟説是可造之才同卓如差不多呢臨走之時他給我一本拍拉圖説是西學的奧妙盡在其中因他看得起我才肯把不傳之祕來傳與我就同堯舜相傳的什麼十六字還緊要呢你想康先生是個聖人他老人家的話就是聖人的話了我們後生小子好違背他麼所以我昨日一回來就一夜沒命的讀這本書果然極有道理連天文地理都有在上頭兄弟細細揣摩明白了好些真是昨日今天大不同了心翁你聽我再讀一遍就曉得我的學問了心柏被他一陳亂説氣得發昏回身就走口裏喃喃道天之將喪斯文也歟天之將喪斯文也歟一徑出了衙門直到端郡王府裏不知鬼鬼崇崇商議些什麼去了那人見心柏走也不挽留便到康長素寓所拜謁豈知卻是擋駕那人説之再三又向袖中取出一包銀子對管門的一塞方才肯再進去通報等了好半晌方才出來説個請字那人頓時像得了九錫一般搖搖擺擺跟了管門的進去走到一間洋式的客座長素穿了一件紗袍禿著頭腳上卻是一雙靴子見了客拱拱手先向主位坐下那人卻恭恭敬敬磕了四個頭站起來用半個屁股浮在一隻椅上長素問道貴姓是松呵台甫呢那人連忙答道是紫人兩字説罷覺有無限言語要説卻頭緒紛繁一時找不出個頭只得用力找話來説長素卻仰著頭竟然不理他只談得兩句就端茶送客紫人只得出來估計沒甚指望無精打采的見了人卻又誇説康先生待他怎樣怎樣不料過於數日紫人正在家中悶坐外頭一片喧聲不知何事叫人去打聽更鬧到裏頭來了説什麼大人恭喜大人高升原來是一夥報子紫人接過報條看時上寫著貴府大人欽差考察南洋商務事樣一時喜得盡情知道是康先生的力量著實感激連忙具了衣冠到師門謝了恩下來應酬了幾天收拾收拾便出京搭了船徑到上海找客棧住下
