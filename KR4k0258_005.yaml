body:
  text: 第五回碧血青磷孤臣心事紅燈緑酒寄恨花叢慶如連聲叫喚方才醒來安慰了幾句便匆匆進城去了這裏紫人躺在床上心裏如轤轆一般又悔又恨悔的不合投在黨中致今日吃此驚嚇恨的康君做出這等潑天大事牽纍他人籌劃了一回毫無良策只得卷起鋪蓋悄悄的行那三十六計中的上計去了卻説慶如回到縣中打聽一番原來紅丸這事卻是托言京內諸王大臣妒忌康有為用這個大題目來陷害他的不過康梁兩人都已逃出只拿了談嗣同他們六個替死鬼這裏卻也不十分緊急除盤查進口的輪船外還封了一個書局拿了好些人幸虧時務報館有末後一番齟齬不然也要拿了過了幾日打聽得康梁已到日本京裏便把捉的六個人殺了慶如聞得十分嗟歎數日沒有出門便有他一個友人叫作平君公一的人來找他道好險好險這番真是一個轟天霹靂那當道諸公不但是頑固不化只怕還懷著什麼私心哩不過新黨裏頭也太過分了一味的興高采烈就有許多不合意的人出他花樣了我聽見這件事都是羊禦史串出來的最可憐的是談復生一班人盡有毫無干涉的也牽連在裏頭一齊殺了你道冤枉不冤枉談復生一首絶命詩什麼我是橫刀向天笑去留肝膽兩昆侖那志氣可算極好的哩慶如聽到這裏忽然長歎道世事如棋人情變幻你看從前那班附和新黨的何等興高采烈滿口維新變法到此時一概噤若寒蟬並有自己具呈聲稱並無經濟的最可笑是同康君同鄉一鼻出氣的平素何等交情何等氣概此刻卻變了面著些效忠守正的詩文作一個反對逆黨的確據這種反復行為真真令人齒冷平君我們生在這個惡社會還有什麼做頭倒不如放浪形骸學那揚州杜牧或者美人性質一片天真不致如世上之魑魅魍魎也未可知哩平君笑道慶翁又發牢騷了你難道真要學那信陵君醇酒婦人把自己身上最重要的國民職任便放棄了麼慶如正色道那又不然你看自古英雄誰不好色難道他是忘了職任麼怎麼他又做出天大的事業呢正因他愛國的心熱到極處旁隘出來借著女色發揮一個盡致他這個愛情一定是無論什麼不可動搖的將來移愛國家決不像那些朝秦暮楚的人你想想一個美人在人群中自然是最可愛的東西然而我四萬萬同胞的祖國自然更可愛些了愛美人既經竭盡我的愛情愛國家豈有不竭我的愛情麼這個正比例是確切不移的所以我説惟有真愛國的方能好色不好色的必不是真愛國平君以為何如幹君大笑道你所説的都是強詞奪理不過為你吃花酒做個護身符今番且不與你辨就照著你説的物色花叢去閲曆一番何如慶如道這又何難不過近來新到一個雛兒聽説十分好不但顔色傾城並且思想出衆我正要訪他哩平君道不是杭州來的武林林麼我也聽得如此説趁今日間暇同走也好便兩人出了城尋到迎春坊認定牌子進了門娘姨接入房間笑道大少對勿住尼先生勿拉屋裏堂唱去哉兩人惘然覺得掃興等於一回不見玉人蹤迹那叫堂唱的卻接二連三的來催曉得難以見面只得走了出來心下卻十分悵悵慶如便分路回去了公一獨自往北走去在三馬路轉角處黑暗裏被一人拉住卻一言不發拖了就走於隔不多路有一四輪轎子馬車停在那裏那人把公一推入馬車自己也鑽進來關了車門只聽忽喇一鞭那馬便飛馳電掣的去了一霎間已在曠野公一不禁駭異起來
