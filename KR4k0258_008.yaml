body:
  text: 第八回酒地花天現出官場變相溫泉竹屋消磨壯士情懷世升便同那大人進了三弄認定小林寶珠牌子進門恰好寶珠在家上前請叫過了讓在榻床上坐世升便叫把他的娘阿金叫來吩咐道今天我請這劉大人在這裏用酒你們要格外巴結些才好劉大人是公侯門第到這裏來真是賞臉給你們該要曉得阿金聽了慌忙吩咐帳房裏去了世升一面又恭維道憲駕在此屈等得很待卑職請幾位上海的闊人坐陪大人談談不瞞大人説這班闊人因卑職辦事還好都同卑職來往的很親熱一頭説一頭已寫了許多請客票什麼嚴大人哩施大人哩周大人哩也記不清許多怕相幫的不地道叫他自己的車夫去請説務必要請賞光誰知去了半日回來卻説是一概謝謝急得世升抓頭摸耳老大不堪又十分足恭想是時候太晚了倒勞大人久候也罷就請卑職的幾個同事來將就陪侍罷便又揮了幾張請客票剛剛發出門簾外一陳腳步聲進來許多人都是頭上前劉海卷得很長腳上外國的黑色線襪齊道老褚你難得請客呵世升忙丟了幾個眼色道這位劉觀察新從省裏下來的所以兄弟今天奉攀一敘邀諸位作陪衆人聽了都吃一嚇延挨半晌免不得上前招呼也有作揖的也有點頭的有一個要想學官場的請安卻把腳拖得忒長了立腳不定幾乎吃跌掙的面孔通紅好容易大家坐定世升隨便吩咐擺起臺面一面開寫局票世升對著劉大人道這小林寶珠倒還不差去年遊戲報館取過他曲榜狀元大人就叫他一個本堂罷劉大人道那是你的貴相好怪難為情的使不得世升忙道這個不妨事的只要大人中意了就是劉大人便點了點頭世升又給衆人開局票張三李四大少爺的姓都寫了卻等了半天不見有人説出倌人的名字來世升又催了一遍只見他們都唧唧噥噥了一會方才出來説了名字世升一一寫了便起手巾入了座這不用説一定是劉大人第一位了寶珠上來斟了酒便換了出局衣裳坐到劉大人背後娘姨阿小妹裝煙已過喊了烏師進來挨起胡琴唱了一隻二進宮劉大人是北邊人深通音律提著嗓子高喊起好來世升十分得意又湊趣道大人看他唱得好就討了回去做個姨太太罷劉大人微笑卻不説什麼阿小妹介面道劉大人肯討俺們的小先生那是小先生福氣到了寶珠聽了抿著嘴笑笑通席一齊附和了幾聲臺面上已上了許多菜只不見外面一個局來直到大菜上完仍不見來急得衆人交頭接耳坐立不安世升看看不像樣便叫娘姨吩咐催局衆人更加著急遞了好幾個眼色過來叫他不要催那知劉大人卻問道怎麼許多局還不來這些王八蛋不是個東西世升見劉大人發話便顧不得衆人叫娘姨快差相幫去催一面免強打起精神找些話來説又打了一套擂怎奈幾個局仍不見到急得衆人説話都沒了好久好久相幫的來回報內中有兩個是説謝謝餘者有的説老旗昌轉局過來有的説轉十七八個過來只有兆富裏王寓説是來的大衆聽了面如土色世升心想幸虧還有王寓到來還不至十分削色又想怎麼這幾個人連局都叫不出一個枉自穿著得好看正在輪算偏偏劉大人不懂老旗昌是什麼東西逼著要問個明白世升未及回言有個壞嘴大姐道老旗昌轉過來就是不來的意思罷了衆人更加置身無地劉大人還盤問什麼緣故恰好簾子一閃走進一個先生問是何人叫的是那一個三少呀那三少慌忙招呼道對不住是我叫的王寓看見哼了一聲原來是你叫的扭轉身便走到簾外大聲道人都不像便要想來叫局真正鴨水臭喃喃的去了那三少面孔紅一塊白一塊萬分難過勉強坐了一回托個頭痛溜之乎也了劉大人還只管問那個先生怎麼沒有坐世升自覺無顔支吾了幾句便復幹稀飯草草散席衆人存身不住謝了世升紛紛各散劉大人卻躺在榻床上叫娘姨裝煙呼呼的吃不住又嫌煙不好叫跟班的拿上一隻白銀長圓的煙盒來約裝有一兩多煙直等癮過足了世升陪著小心動問此番來滬的貴幹來來這劉大人號仲芬是一個直隸世家在江南候補狠當過幾回闊差使此刻是制台叫他到上海採辦軍裝以及開礦機器的他今天看中了小林寶珠便把公事置之腦後看見世升狠是巴結便都托了他又答應了阿金明天吃個雙雙台直坐到更深夜靜方才回棧世升親送到棧房裏回明天一早來伺候自回去了這裏劉大人直睡到午後兩點鍾方才起身世升已來候過五六次著末一次便坐下不走恰好劉大人起來了世升請過早安談起機器的事稟道卑職有個至好的朋友在克司洋行裏做買辦卑職方才告訴他他很願意效這個勞據説他行裏各種軍裝機器都有只消看了圖樣就到外洋去定三月內可以送到價錢除格外便宜外另外孝敬大人一個九扣叫卑職請示可否賞他一點飯吃劉大人道價錢倒不在貴不貴橫豎不是我們的錢只要用錢大些就再買些也不要緊比方你老兄辛苦了一趟賺些扣頭也是該的世升連忙立起請一個安道多謝大人栽培卑職感恩不盡卑職一下去就關照他叫他把價錢開大些再拿來請大人過目劉大人點點頭世升告辭出去劉大人約他在小林寶珠家回話世升應了幾個是走了劉大人叫當差的雇輛馬車正要望迎春坊來卻有一個同寅王大人來拜只得請會談了一刻那王大人也是一個江南候補道此番奉了制台劄子帶了一班學生到日本去留學的就派他做個監督兩人本是吃花酒朋友劉大人便約他今晚酒敘王大人答應了一起坐了車前去赴席去了那王大人帶來的學生住在棧房裏專等王大人來要去打船票換日本洋錢明天就要上船他老人家吃花酒吃昏了直到晚間兩點鍾方才醉醺醺的回棧家人上去請示明天走不走卻一頓王八蛋的臭罵竟是睡了學生們因是官費不敢觸犯他忍氣吞聲的各自安歇明天上不得船索性約了劉大人大喝大玩自有褚世升這班人趨奉不消細説看看又是禮拜五他還戀戀不舍離開又怕上司曉得只得狠了心腸搭了郵船會社的船動身一路卻不曾鬧甚笑話因為他見於外國人就用他平日待上司的樣兒去待外國人見他怪可憐樣子就不同他計較了等到了東京他也不管公事只拜會了本國公使日文本部把上校的事交代在一今文案身上自己愈著溜到長崎去玩了那時慶如在日本學的是政法速成科寄宿在外看見本國的學生不多很盼望多來些人學些技藝回去好幫助國家聽見江南派了這一班來喜歡得了不得連忙趕來訪問卻見監督不知那裏去了只得同學生們談了一會內中卻有幾個思想很高尚的便結成了知己之交時常聚會這是後活一日慶如因系校中放假之期間暇無事便約了幾個同志到上野公園裏遊眺他們都已改裝革靴絨裏倒也很像個日本人但日本人總看得出是個中國人走到路上不免有幾個小孩子圍著嘲笑他們也不介意一程來到公園只見仕女如雲青翠匝地正可發抒胸襟作個海天長嘯看見緑陰叢中青草地上有一隻睡椅大家便都坐下看那千丈大樹新緑欲滴不覺心曠神怡渾忘身在海外慶如口裏微吟道蜻嶺洲是神仙窟無限風光在此間我比秦皇多福分蓬萊親到不曾還同來一人笑道不要説得太高興了惹出無限感慨來慶如也笑道這也叫做落得説嘴哩正談論間花外有人走來便都住口張望卻見一個紳士裝束的人同了一個女子像是大家閨秀攜著手一頭走一頭説笑那一種綺麗風光令人目迷心醉慶如不覺惘然一眼不瞬的直看他們走進一個草亭望不見了方才歎一口氣又長吟道黃金世界燦精英極樂園林峽蝶盟偏我羈愁消未得海天飄泊可憐生同來一人大笑道算了罷算了罷天已不早快些回去罷慶如快快的走出園來一步幾回頭的盼望意興蕭條回到寓中倒頭便睡也不辨是昏是暮正在百無聊賴的時候一個人闖進來道慶如醒來醒來天崩地坼的事來了從此我們做了亡國之民哪里再望享自由的權利咳罷了罷了説罷掉下淚來慶如大吃一驚
