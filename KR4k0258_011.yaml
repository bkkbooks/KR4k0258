body:
  text: 第十一回海國春大開追悼會富有黨齊上斷頭臺那天晚上將近三更珊珊的運命快千終了大家瞧著不好都已預備後事元戚睛腫腫的坐在床前只是掩淚看珊珊時一絲兩氣兀是喘哩眼睛雖是睜著像是哭泣的光景卻沒有眼淚一隻手指著元戚想要説話也沒有聲音元戚此時心痛萬分忙執了珊珊的的手低低叫喚一陳眼淚都落在手上不及拭幹只見珊珊拚命的掙了一聲陳郎便兩手一伸動也不動了臉上顔色漸變氣息停了元戚知道不好連聲叫喚也都無用不禁號淘大哭幾乎暈去便有幾個娘姨上來勸道俺們先生已經過去就哭死也不中用了陳大少你還保重身體如果心下不忍發送得好看下些就是你陳大少的情了等下節我們再跟一位先生包替陳大少中意元戚聽了毫不理會拭拭淚出去辦理後事盡心盡力辦得十分豐厚妥帖租界規矩是不準停柩的當日成殮了就擡出去了也用了一付五梅花執事元戚送過回來重到三馬路只覺得零脂剩粉觸目傷心日影照簾恍惚仍有人在那裏憑欄遠眺一般又不覺哭起來了一時存身不住徑回館中那一夜間何曾睡著在枕上千思萬想要替珊珊做個追悼的會好讓他名傳不朽一天明就爬起來托人借地方那人去了好久沒有回來元戚盼得心焦在屋裏踱來踱去覺得無聊得很不免拿些報紙來解悶一瞥眼看見上面載的聯兵入京兩宮西狩的話仔細一看原來拳匪只吵自家幾個人等到洋兵一到沒見過一仗就跑的跑死的死一個不剩倒帶纍得京裏百姓吃了兩番兵荒真是會惹禍的主兒無戚彼時看了失驚道怪道幾日裏哪知道有這許多變不曉得笏臣的事發動動沒有便翻了許多報章看見今日的緊要的新聞內有一條題目是漢口會黨起事嚇了一跳仔細看時上面大略説有人在漢口發賣票布上面有富有四海字樣定於某日起事幸虧前兩天捉了他們的黨羽供出為首的住址登時發兵去圍住寓處一概擒獲沒有走掉一個此刻已經解到武昌去了以下便是如有續聞再行報告等説話元戚看了心下慌張起來一時坐立不住邊忙出門去打聽遇見一個朋友邀到家裏密談方曉得些事就是笏臣做的此刻捉了去黨羽都已四散只有他同志數人住在一塊的都捉去了聽見有什麼姓傅的姓關的在內大約不久都要正法了元戚聽了好像冷水澆背一般半晌不曾言語辭了出來惘惘的回館那借地方的人已回來了報説已借定四馬路海國春地方準于後日時開會明日要先預備起來元戚便把笏臣的事放一下一心辦追悼會的事先去登了各種小報一面差人去鋪飾起來多做幾個花圈扎得青翠撲人取出珊珊舊日一個小照預備供奉正在忙時又得笏臣等都已在漢口正法的信越發傷感當夜睡在床上做了一副挽聯道自問尚有愛情誰知道皓月難圓彩雲易散年來最多憾事更那堪碧血痛友紅淚哭卿明日一早起來同了幾個朋友徑到海國春來只見欄杆上扯起兩面白旗門口扎成一座花山儘是冬青柏子扎就異樣花頭進門連扶梯上都結了彩樓上挂滿各種挽聯挽額有的是美人黃土有的是玉隕香消都是些洋場才子租界詞人的大筆挽聯更記不清只記得有一個叫什麼倚天長劍樓主他那一聯道恨我來遲未領略蘇小腰肢瑩娘媚嫵賀卿死早好消受英雄眼淚才子詞章也還看得元戚走到台前只見花香酒洌果潔泉馨咳笑難聞音容如在那眼淚如散了珍珠一般直挂下來幾乎放聲大哭便命館供了一朵鮮花三杯美酒展開祭文讀過行了三鞠躬的禮退過一旁隨後幾個朋友上來行禮元戚等一一拜過於便走上演説台將珊珊的容貌性情著實表揚一番後來又把自己同珊珊的愛情以及今日追悼會的本旨説了出來隨後也有幾個人上去演説不必細記演説完畢敦請衆賓宴飲卻又各各叫了局來請他們同飲入座之先都在珊珊小影行了一禮然後觥籌交錯肴炙紛陳元戚覺得此舉總算哀感頑豔心上寬了好些就添了些興致了散會回來身子因哭泣勞劇之後未免困乏便自睡了又過幾日方才出門散散那時漢口的會黨殺的殺跑的咆上海的國會也散了出洋的留學生也嚇得不敢開口了武昌武備學堂裏出了許多缺額仍舊招補兩湖總督淘子香做了一篇勸戒上海國會及出洋學生文刻了板分送各處元戚餘痛未忘一概不聞不問那一天曉得拳匪的事議和將成各國索辦罪魁都已如願以償賠款也議妥了正大有重睹升平的希望欣欣得意暗想道這番兩宮回京怕他再不舉行新政若使重用起留學生來我是個老前輩更有何人越得過我去正在心中得意只聽外面一陳腳步響走進一個人來不覺大驚失色
