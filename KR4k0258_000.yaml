body:
  text: 新茶花清鍾心青著目録第一回錯中錯悟繁華一夢情外情談影事前塵第二回交際場中志士爭稱新黨衆香國裏野蠻講得自由第三回禦史席間談朝政京官衙內讀英文第四回上海縣中快識東方亞猛福州路上間評南國鶯花第五回碧血青磷孤臣心事紅燈緑酒寄恨花叢第六回祕密運動新大陸歡喜緣巧遇味蓴園第七回武備學堂組織小團體禁煙善會出現大滑頭第八回酒地花天現出官場變相溫泉竹屋消磨壯士情懷第九回一封電金太守冒死陳言三馬路謝校書懸牌應局第十回香國掄元文人韻事潢池盜甲傑士驚心第十一回海國春大開追悼會富有黨齊上斷頭臺第十二回林子姚義釋黨魁曹夢蘭深諳交涉第十三回海天萬里快整歸裝石上三生相逢狹路第十四回花好月圓憐卿憐我雲癡雨暗宜喜宜嗔第十五回鍾情深處轉無情屬望極時偏失望第十六回日麗紗窗喁喁小語風生綺席炎炎大言第十七回執牛耳花叢開大會換鷹銀楚客遘飛災第十八回喪名譽陳元戚反顔耗資財項慶土口落魄第十九回名校書情贈孔方兄留學生得意長安道第二十回奪學堂同室操戈翻花樣洞房合巹第二十一回造謠言片語驚心除牌子雙棲遂願第二十二回新馬路初仿匏止坪百花裏晾散燒炭黨第二十三回義勇隊壯志成虛革命軍偽書出世第二十四回雷霆萬鈞封禁蘇報館松揪一望埋築蓮花涇第二十五回奮雄心俄日戰爭溺豔情膏盲疾病第二十六回金消裘敝名士蕭條裙布荊叉美人憔悴第二十七回金谷香華萬福行刺海參崴平公一遠征第二十八回逞機械密布遮天網二羅織重演黨人碑第二十九回昭雪沈冤僥幸半年黑獄犧牲幸福傷一代紅顔第三十回杜少牧悟徹青樓夢平公一歸結新茶花
