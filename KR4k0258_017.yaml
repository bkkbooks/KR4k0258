body:
  text: 第十七回執牛耳花叢開大會換鷹銀楚客遘飛災轉瞬已是仲冬時候慶如濃情豔福享受方深朝夕只在迎春坊與武林林跬步不離替描眉黛代嚼唾絨做了一個妝台的掃除使倒也十分自在那林林自與慶如遇後謝絶他客不但生人不容幹視即前度郎也不再許他問津雖有華中茂屢次纏擾但俱付之不理他也無可如何只好暫收妄念這一日正是長至節的前一日滬俗稱是夕為冬至夜俗語雲冬至夜有得吃吃一夜沒得吃凍一夜所以一到是日北裏中無論何人沒有一個不是銀燭高燒玳筵廣啓大家以酒席多者為榮時髦者總有十餘起冷淡者亦必有一席聊以解嘲往往於前數日預先約定客人為之報效這一日客人的犒賞也較平日為豐此刻林林既無別個恩客自然是慶如的席面了慶如卻與林林商議道我們若是照例擺席豈不落了窠臼有何趣味呢不如索性大開筵宴做一個群芳大會也不枉這連底凍的日子林林也答應了原來上海北裏的規矩凡校書應局來的不準飲食但可為客代酒惟有用客票請的卻與客人一樣隨意飲啖慶如因想於這一晚除請了男客外並將此客的相好一併請來作為女客一同入席謂之團圓會卻又仿照西例男主人陪女客女主人陪男客其餘亦須此男陪彼女此女陪彼男互相錯亂謂之顛倒鴛鴦席中如有高興獻技的或歌或舞亦由主人預先配成對子略仿泰西跳舞會之例這種舉動為上海向來所未有風流香豔可傳為佳話慶如屈指算了客人用了一個傳單説明這個意思派人到各處投遞豈知公一季留回籍未來元戚不知何故竟是辭了只有小牧求齊是贊成的慶如一想人數太少卻好有兩人來訪一個姓貝號叫君實一個姓何號叫子青都是卓爾不群的少年卻性情各別君實是沈潛一路專心理化一科已經深造有得近來憤世妒俗漸成厭世派子青卻是高明一路不求甚解遊戲三味近于樂天派兩人都從家鄉來滬聞得慶如一番奇遇行裝甫解即來訪問慶如大喜將今日之局説了兩人自必贊成慶如取了筆墨開出單子少頃小牧求齊也到了與貝何兩人見過本系至交各寒喧了幾句便來看慶如的單子上面寫著求齊的相好是三馬路金小寶小牧的相好是普慶裏林翠寶君實的相好是西安坊小花四寶子青的相好是尚仁裏梅妃雪慶如的相好是迎春坊武林林共計男女賓主十位慶如一面寫起請女客的票來立刻發出一面吩咐擺下兩席用兩張桌子拼長上鋪白布如大菜台的格式西邊放了許多圈椅所有向例的紅燭泥香盡行刪除卻供了許多名花鮮果並囑少頃大菜上來也不準他頭戴大帽口稱恭喜的事正布置間只見跳進兩人口裏嚷道慶如好別致的舉動呀慶如看時卻是公一與季留不覺喜逐顔開道你們幾時來的怎麼卻曉得了季留道你有此盛舉不寫信來請我要我自己找來虧你還説怎麼曉得的呢林林介面道這個真是冤枉慶如這個意思昨日才發表如何來得及通信卻實是曾到你們寓處請過的季留嘖噴道足見你們的愛情深就庇護到這樣林林尚要回言公一連忙説道我們即刻才到在寓處看了客票知系難得之舉所以趕來慶如道你們來得正好就把單子上添了公一的相好公陽裏盛月娥季留的相好迎春坊謝鳳仙補了兩張客票季留高興起來説道今日我是總歸要林林陪的了林林含笑不言慶如道不要慌待我來定一個公平的判斷於是寫出道男賓第一位平公一君第二位貝君實君第三位何子青君第四位孫求齊君第五位杜小牧君第六位平季留君女賓第一位盛月娥眉史第二位梅妃雪眉史第三位小花四寶眉史第四位謝鳳仙眉史第五位金小寶眉史第六位林翠賓眉史除男賓第一位由女主陪坐女賓第一位由男主陪坐外餘均按次男女列坐當下大家無語惟有季留道吾與小花四寶有緣不如請四寶陪我罷子青也答應與他對調慶如又將第三第六女賓的位置調過了那時各眉史陸續到來聽於此事莫不眉飛色舞向來局到總在已入席之後各局即坐于客人之後此次尚未入席林林招呼在椅上坐了命青衣獻上茶來金小寶先笑道我們真個來做客了謝鳳仙搶説道難得主人這般用情我們須盡興才好呢慶如不禁擊節道鳳兮鳳兮仙乎仙乎原來這兩句是平季留送鳳仙的聯語用八分書寫在澄心堂紙上十分古朴鳳仙珍重懸諸座右的當下排定了席次一一入座觥籌交錯履為縱橫吉日良辰美人名士真個十分歡暢清飲了多時慶如發議要挨對的獻技不準搶前落後第一挨著盛月娥大家説道月娥的琵琶是春申獨步今夜務要彈個大套月娥欣然取過擅槽和準弦索背過臉去錚錚鎵鎵彈子一個龍舟競渡真覺金鐵舉鳴萬人簇擁聽到後來鏗然一聲滿座悄寂大家齊聲贊好慶如笑道讓我來吹只銅簫奉陪罷頓時取了一隻笛吹了一回亦頗好聽以下便是梅妃雪的梆子林翠寶的東鄉調金小寶的昆曲小花四寶的二簧各男賓或歌或曲或笑話各有所長惟有第四位謝風仙道我不會唱我只會吃酒倒不如我來猜拳打個通關罷大家聽了都伸出手道贊成贊成鳳仙喜得花叉亂顫站起身來向著求齊道先是你來你來於是從求齊起一一豁過雖是有輸有贏都也飲了十許觥酒有些醉意便亂了令要與季留再豁十拳季留雖是狂傲卻在美人跟前是極小心的不敢不遵且也投他所好便五魁八馬的高聲亂喊起來林林吃吃笑道還有我哩我想填首小詞只是沒有題目慶如道就是即事罷林林道未免太泛慶如道今日之事與尋常不同只要發揮本旨何乏之有君實道你們不要吵我來額外畫一張畫就寫今日的大概名為良辰美景圖你就題畫罷林林大喜取過鮫消的紙兔鬃的筆糜眼的墨當下作畫的作畫按拍的按拍頓時寫就畫的甚是精妙題的是闋風光好出自美人之口尤為香豔那時鳳仙已經酣然斜倚在一個侍兒身上醉眼朦朧的説道我醉欲眠慶如失聲道芍藥眠茵憨雲醉態恍惚見之小牧悄悄的走來折了一枝花插在鳳仙鬢邊別人都不理會惟有翠寶躲在一旁抿著嘴笑季留也醉了只是尋人猜拳子青君實勉強對壘也吃了許多酒不覺已是更深人人東倒西歪支援不住金小寶年紀最大便先向求齊丟個眼色一同起身告辭慶如不放道就是連底凍尚早呢求齊不覺臉上一紅林林嚷道瞎三話四小寶姐儘管請便罷這才散了席面林林叫做醒酒湯來與鳳仙季留吃了取出鏡匣親為鳳仙整妝就有他家中人來接了回去季留也同公一等走了慶如送客回來向林林笑道今日之會可稱極盛只怕數千年無此樂了林林道花月痕上不是常有這種的事不過不在上海罷了慶如又道最難得的是在座無一俗客像公一的俊偉小牧的風流求齊的奇倔子青的高華君實的沈著已是我輩中傑出之人我最愛季留的清狂絶俗真令人心折林林首肯道就是曲中諸姐妹也都是上品其中自以鳳仙為最又爽快又風流的系豪品此外如金小寶可評為麗品梅妃雪可評為清品小花四寶可評為逸品林翠寶可評為俊品盛月娥可評為能品你以為何如慶如也點頭道我們一時的品評卻也未可作為定論往後給他們看讓他們自己斟酌罷只是元戚今日不來少了一人未免美中不足不知他為什麼緣故林林道元戚自姍姍故後沒有遇著得意的人逢著酒筵只是亂叫他怕的是相形見絀悵觸抒懷自然不來了慶如歎道人生的豔福真是不容易消受的説著走到林林面前低低説道難得今日良宵千金一刻我們不如安歇了罷林林啐了一聲大家歸寢一宵無話次日慶如來找元戚卻不在他的館中詢問起來方知有一個湖北同鄉犯了事關在警署請元戚去作保去了慶如只得出來誰知就弄出一件大事來原來那元戚的同鄉姓屈名受是一個湖北初派出洋的學生卻是列國時大夫屈原的後裔人是有些呆頭呆腦的初到上海一切不諳那一天到四馬路上一家小錢莊上去兌換鷹洋店夥見是啞板要折他一角洋錢他又拿出一塊又是啞的店夥見他可欺跳出來一把拉住就説他是個私鑄銅洋的罪犯上海的小錢莊都是流氓開的專一欺詐外來的客商是其長技那屈受急了打起湖北的鄉談嘰哩咕嚕一字不懂店夥的意思只要嚇得他把洋錢送了他就好了結了誰知屈受又呆又板只覺自己受了屈亂跳亂罵一定不肯早有巡街捕來問起情由店夥見敲詐不遂索性想辦他出氣便咬定説是個私鑄銅洋的人那中國巡捕大半同流氓通的又見屈受是鄉人誰肯幫他便一抓辮子拉了就走店夥跟了去卻拿了一包銅洋説是在他身上搜出的屈受只道理直氣壯自然無礙誰知進了巡捕房那華捕見了捕頭打了英國話不知説些什麼那外國人最恨的是私鑄頓時把臉都漲紅了走下來對著屈受腿上就是一腳上海的俗語叫做吃外國火腿那皮靴又尖又硬好不疼痛屈受連忙分説外國人一毫不懂只叫管押起來著店夥回去明日早堂到新衙門聽審那店夥歡歡喜喜去了早有門差來牽屈受到一個監門口交與管監印捕印捕拿手向內指指叫他進去屈受不肯被他一掌打得滿面流血只得掩著臉勉強進去原來是個乞丐牢監裏面橫七豎八躺著幾個乞人一股臭氣薰天正是難受不防印捕走來拿一付西式鐵銬把屈受的手銬住了屈受只得倒在地下不能展動卻被幾個乞丐拿他當做玩意兒把惡臭的痰吐在他臉上屈受只得滾來滾去的避好像一隻元寶這一夜的苦真受足了
