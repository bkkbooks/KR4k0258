body:
  text: 第十五回鍾情深處轉無情屬望極時偏失望慶如無可奈何只得悶昏昏的睡下這一晚不知長籲短歎了幾千回搗枕捶床了幾千下何曾閉一閉眼兒直到天明忽然想起武林林既如此不堪我又何必戀他想古人到情欲熾時全虧胸有把握往往將慧劍割斷情絲我讀書至此亦曾十分仰慕過來此刻臨到自己何不懸崖勒馬做一個大悟徹呢想到此處頓時心地開朗立起身來向桌邊取出紙筆立揮一絶道花間龐呔陡然驚驅散鶼鶼比翼盟悟到色空真妙諦梵天清淨絶無塵擱筆躺下頃刻已入睡鄉午後醒來卻值平氏兄弟公一季留同來入門便笑嚷道怎這時候才起來還不請我們去吃扶頭酒麼慶如含笑道事情已經決裂了你們還講這話怎的季留愕然道又有什麼變故了呢慶如方將是晚鴛夢初回狺聲頓作陡見隔房踞坐一大腹賈作種種惡詈娘姨輩極意勸解武林林默坐一旁不發一語慶如憤火中燒搴簾徑出等情事一一告訴出來又笑道我起初卻是十分惱怒此刻則已勘破情禪不作此無益之嗔了便將所作一絶與兩人觀看公一拍手道陝絶快絶慶如快人故能有此快事我輩自負多情往往誤用以致墮入情網造出種種苦腦自古大英雄大豪傑因此失敗者甚多慶如向來不輕種情此刻又能跳出網外我素深佩慶如正謙讓間季留沈吟道這話不然如果林林是一個尋常女子此次慶如與之決絶我亦贊成但我知道林林實系出奇的人他的程度思想高出我們幾倍他又待得慶如好據我旁觀看來此番變端他必另有緣故或者因慶如鍾情到極處就時時要求全責備起來想慶如心中必以為我們愛情既如此深厚則你我即為一人無事不可告我你不該再有這種事體這是明明欺我了於是愛他的心都變作疑他的心恨他的心愈看愈不是了大約古來癡男怨女往往有此殊不知林林既做了妓女雖説自由卻有許多不能自由處偌大上海豈少傻伯爵其人按著青樓規例來幹林林林林又何法拒絶呢即使可以拒絶在林林與你尚是初會安知當晚不是拒絶那人麼你既不察情由負氣而出那女子性情是驕傲不過的他縱有萬千難言之隱弱者吞聲飲泣強者負氣終身決不肯低首下心的你用一封書去要想林林來招賠你真不知女子的性情了這一席話説得慶如如夢初醒佩服不止公一也連連點首道議論通極所以花叢中推你為祭酒了但此刻又用何法使他們復合呢莫非你要將慶如苦情代訴于林林麼季留怫然道我又不是牽頭又不是蔑片我如何肯去做説客慶如既深愛林林即無所不可難道不會向妝閣自投麼慶如躍起道是是我既情願犧牲我的性命財産名譽以殉所愛之人難道不能犧牲我的身份麼大丈夫能屈能伸屈膝于美人尚比乞憐于權貴高幾倍呢兩君請暫別我便立刻赴迎春坊了兩人大笑一同出來各自散去慶如一口氣奔到林林門首沒有歇一歇正要入門卻又躊躇起來心想如何便可進去呢卻被大姐阿珠看見上前笑問道項大少怎麼還肯到這裏來莫非走錯了路麼慶如也勉強笑道我為什麼不肯來先生在家麼阿珠道先生麼他兩天沒有出去怎麼不在家慶如聽得詫異便跟著阿珠上樓來只見風靜簾疏日斜煙細房內靜悄悄地林林慵妝懶髻躺在一張睡椅上似睡非睡的聽見腳聲開眸一望見是慶如便又閉了阿珠喚道先生項大少來了林林不答阿珠笑著出去慶如親到椅前執著林林的手口中但説卿卿我負了你了一陳心酸那眼淚落下來墮在林林手上林林陡然坐起道慶如你知道我的心了麼慶如回答不出倒呆呆的看著林林緊緊把慶如的手握住歎口氣道項君你當我心中惱著你的麼其實我卻極是感你大凡一個人愛了一個人決不願舍了此人再愛一人使那人來奪我腦中位置但又決不願我所愛之人又愛他人被那人奪我在他腦中的位置這個雖是人之常情但所爭的在愛情不在肉欲倒不是吃醋拈酸的人所能夢見當我沒有遇見君時腦中毫無沾染無所為愛無所為不愛自遇見君後覺愛君之情極大不是將腦中掃除乾淨決裝不下君偌大一個人物所以當日便將時來纏擾我的盡力打發但其中又有幾個強有力的不免多費嘴舌所以第一晚不敢就許君也是這個緣故不料君因此又生煩惱不得不急於解君之怒但是打發末淨又添出這一段孽障難怪君要發怒就尋常人也沒有不怒的但你可知這孽障是誰他就叫做華中茂從洋行買辦出身捐了一個道台刻下要算上海巨富專門交結官場無惡不作並且京裏也有他的線索他卻專喜在花叢胡鬧見有合意的便強娶回去任情作踐過後又不理了他曾幾次來此纏擾都被我回絶了還不死心三天兩次的來間坐此番聽得許了君他如何肯忍自然要吵鬧了我本要呵叱幾句但他勢焰非常深恐觸怒了他於你我的事有礙所以勉強敷衍然而已經被我冷淡一場悻悻而去大約以後也無顔再來了項君你想如此惡濁蠢物我如容納了他我又自命何等呢且我雖沒有思想也決不至此我從前讀茶花遺傳常怪馬克這般高潔卻容納一個傻伯爵難道區區銅臭物就能買我這個身體麼所以我向來于這種市儈惡物從不曾以正眼覷他的你自昨日發怒去後我十分怨傷自怨落在這個勾欄之中不能樣樣自主就想親來賠罪後來轉念一想以君愛我之深而忽作此無情之舉是疑我之不潔也如疑我之心一日不去即愛我之心一日不復縱使勉強牽合你我心中終有芥蒂這愛情決不能達到美滿地位只有暫緩一二日等你察訪明白知我不是那種下賤的人自然容易轉圓那時重溫舊好方能毫無閈隔所以你才到時我竟無從措辭只好置之不答果然你今日來了可見是你我兩心相印別無他意了叫我如何不感你呢林林説到此處不覺滴下淚來慶如聽了這一番嗚嗚咽咽的説話呆一會愕一會喜一會怒一會竟拜倒在林林膝上淚含滿眶連連謝罪從此死心塌地不敢再有異志了林林便喊娘姨進來打水洗臉説道你我話已説明了從此兩心如一且尋今夕之娛聊補昨宵之苦罷慶如因有扶頭之約即招呼取請客票來揮毫請客想起昨日有賈氏弟兄來拜因心緒不佳故未晤見此人雖非同調然新從日本遊學回來想必程度較高此刻何不請了他來也可詢問東京留學生情形了因此又添請了他二人客票去後慶如回顧卻見林林正在重勻蓮臉再點櫻唇奕奕精神與鏡光相射外面即送進一束茶花説是送花的張媽送來的慶如接過但見寶光內蘊異香襲人不覺失聲贊好
