body:
  text: 第二十四回雷霆萬鈞封禁蘇報館松楸一望埋築蓮花涇聽見他定了監禁不日仍有出頭之日以他這個才氣如果斂才就範何愁不成事業因此也代為僥幸誰知運蹇時乖在監中生起病來不上一年就長辭人世去做那鬼界革命之雄了當下慶如聽公一説了十分傷感一面派人去料理棺殮一面知照各友公一也歎道威丹鋒芒過露不能含蓄所以不壽如果照文明國民的眼光看來本來思想自由言論自由出版自由這三大自由是個人的權利國家不能過問就有矯激狂悖的話只要並不見諸實事無礙治安也未嘗不可並容於光天化日之下可惜中國還沒有到這種程度至於威丹的宗旨向來與我不同我是看天下人都是一種都是兄弟不可歧視的就是粽黑的種也應有中也養不中也養的職任何況同在區域中呢慶如道照你説來威丹不過狂妄一點其實是沒有罪的公一道自然即使有罪已經死了也就無庸義了慶如道親者毋失為親故者毋失為故我們還應盡力辦他的喪祭才是於是兩人親往吊祭著實痛哭一番過于幾日慶如接到季留自鄉間信拆開看道慶如足下仆鄉居久矣回念前塵都成往事日惟度門打掃消遣琴書致與故人疏于書牘甚罪甚罪爾聞周君威丹忽焉瘦斃鄒陽誠悃廬梭放言文人厄運中外同之仆昔年幾復快意雄談今日山丘傷心遣蛻臨風雪涕痛也何如竊思威丹持義過偏誠足駭人耳目然其英才卓越有如天馬行空似此英奇不為盛世之風麟反作井中之虎豹遭時不偶有激而鳴夫復何言竊猶有請昔日本西鄉隆盛躬為大逆死作叛人然日人不忘開幕之功盛作先河三祀鑄銅為像刻石作銘頂禮不遑瞻拜恐後何其盛耶仆恐威丹死後諸親友牖於嫌疑無從顧問則一棺長棄千里無歸孤魂夜號鬼雄為萬不其恫哉上海西偏有蓮花涇者其地遍植白蓮清幽獨絶仆本有先人之隴畝在原分五畝之宮為威丹一杯之築樹以短碣封以崇碑俾後世憑吊者猶得於尋春策騎之餘作吊古攀鱗之舉安見大陸上無未成之南洲翁耶幸賜玉成即希裁富於和頓首慶如看了額手道難得季留有此義舉這蓮花涇山明水秀真足妥威丹之幽魂矣那日復了一信竭力贊成並請其立即前赴蓮花涇地方布置一切無須來申一俟擇定日期即由滬上諸人運柩前往果然義聲所布諸同志一來顧念逝者二來佩服季留無不盡力相助不日即在蓮花涇上揀一塊清淨地方埋葬了周威丹那日會葬的人也很多各人拿一種花種在墓上四周圍一圈鐵欄面前樹一石碑上刻著周容之墓四個大字疏疏密密種了許多松樹方才回來從此這蓮花涇成了上海一個勝迹春秋佳日噫噓憑吊的甚多可見地以人重了季留做了這椿事心下暢快在家中痛飲了幾回酒竟吃慣了從此以酒為命只在醉鄉中尋佳趣不問人世的榮枯了
