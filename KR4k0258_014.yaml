body:
  text: 第十四回花好月圓憐卿憐我雲癡雨暗宜喜宜嗔慶如自覺存身不住正要出來卻有一個娘姨乖覺連忙拖住衣襟問道大少貴姓剛才可是從張園裏碰見先生的慶如道我姓項方才從張園回來那娘姨滿面堆下笑來道幾乎誤了大事大少請裏面坐先生即刻就回的慶如道停歇再來罷娘姨死拖不放道大少去不得去了時先生要怪我們的一面叫聲阿寶快些開開花門便引慶如從後門裏直走進正房間來慶如見各處房間都有客人吃酒碰和十分熱鬧偏是正房間裏門簾下著寂寂無人不禁詫異道怎麼倒是正房間有空娘姨含笑道先生吩咐過的今天這正房間要留出來我在張園已約了人了所以來做花頭的都回他正房間不空他們便都在小房間坐了慶如心裏一動不知是喜是悲那娘姨卻倒茶裝煙寬馬褂敬瓜子異樣殷勤坐下來又問長問短説個不住一會兒只聽樓梯上腳聲先是大姐手提金水煙袋進來見是慶如叫一聲大少回轉身迎著林林低低不知説些什麼只見林林已進房來向著慶如一笑便拿著瓜子盆子上前來敬説了一聲大少尊姓慶如連忙站起道不敢姓項林林便嫋嫋的在邊頭一隻椅子上坐了慶如方才細細打量比前兩番清楚許多只見神如秋水韻比春花瓜子臉兒長身材兒前留發海覆到額角顯出粉裝玉琢的肌膚頰上微微敷些脂恍惚朝霞射日一般髻上珠光寶氣閃爍生光鬢邊排幾十枝白蘭花一陳陳香氣透出真是天仙化身鎖子結骨慶如此時入幕竟作劉郎之視欣幸之懷不言可喻了當下寒暄了數語林林便道大少你知道我相請的緣故麼慶如聳然請教林林道那天在丹桂裏看見大少見了我時竟是全神傾注毫不他顧那時朋友問你説話你卻如不聽見一般想我負了這般姿容在交際場中傾倒我的多但都是些嘻皮笑臉一肚皮都是狎視我奴蓄我的意思我如何肯受呢像你昨天這樣恭容肅貌我就知道你的心裏裝滿了真愛情沒有絲毫假處那時我心中感激幾乎落下淚來想我流落風塵吃盡辛苦原來今日之下一般也有人看得我起這一喜也喜到盡情若使當面錯過以後更不想有好日子過本來就想過來招呼的又想上海最壞的風氣是在戲園子裏頭做些暗昧的事俗語叫做吊膀子我原不屑做這事也恐你看輕所以當時走了卻叫這大姐打聽你的住址正要想來奉邀不想又在張園遇見古人説的馬遇伯樂而鳴就是今日的情景了慶如聽了心中想了幾回半晌回答不出來只緊緊握著林林一隻手説道是是正在促膝密談的時候外房客人要走娘姨進來請先生出去林林只叫回説先生又堂唱去了慶如煞是感激那愛情越高一度卻越無話説只好極力找些間話不一會樓下高喊先生堂唱的已有七八次大姐收拾煙袋豆蔻匣伺候起身慶如也立起身來道我且回去明日再來林林道也好我們相於以心不在形迹只要此心不變天荒地老也無如我的心慶如辭了出來一路上盤算這事又是僥幸又是奇異猛然醒道不要是夢麼沈思一會只覺神思飛越倒反疑疑惑惑起來只得步到元戚處來要想同元戚商量一進門來只見元戚正同一人長談那人姓於號叫季留是平公一的兄弟也是日本回來的留學生本是至好不回避的慶如便將方才的事説了季留連聲恭喜道慶兄得此絶代麗妹傾心結納足為我輩之光不想風塵巨眼卻在青樓紅粉之中更令人愧死元戚卻哈哈大笑道何如你在東京説的話一般也有不應口的那時怎麼責備我呢慶如不禁也笑了當下三人談了一會慶如便約了明晚的局元戚季留都答應了到了明天傍晚慶如先到林林正在晚妝初罷的時候一圓寶鏡靜弄鉛華慶如坐在旁邊看他畫眉掠鬢調粉撚脂很為得意心想這梳裏中間也要有規則有條理倒不容易呢林林妝罷便請慶如進房去坐慶如卻找些不要緊的話來引逗他道今天你沒有張園去麼林林道本想去的因起得晚些所以不去了我想上海地方只有這張園花木扶疏有些公園的意思本來遊覽的所在也是地方一樁要政缺不來的最怪那些迂腐的人説什麼遊園是豔容誨淫自己不許妻女出來也還罷了偏又説我們去是吊戲子馬佚膀子你道可氣不可氣我們一班姊妹偏又怕他説嚇得極口的説沒有去也是何苦呢那茶花上的馬克不是常坐馬車麼一席話説得慶如很為傾倒那日唧唧噥噥説了許久郎情若水妾意如雲纏纏綿綿正在分拆不開外面説聲項大少朋友來只見元戚季留拉了公一一同進來慶如讓坐林林也上前招呼了只認得季留便道原來是於三少卻同項大少是一淘的好極子季留笑笑便將慶如家世人才表揚又道伶隱汪笑儂有詩贈你可送來了麼林林道有的我最愛他當中兩句是什麼茶花有奇節蓮子多苦心恰恰道出俺的心事俺生平最佩服的是茶花女卻被他説著了季留笑道所以外面很有人説道你是茶花第二呢如今是好了有了亞猛來相配哩説著指指慶如林林一笑又説道三少你的字寫得最好請你把這兩句替我寫一副對聯罷季留應允叫取出筆墨拿一副長箋用心寫好上面卻題為東方亞猛書贈茶花第二一覽之下那茶花兩字有些不好改了又改約有二盞茶時方才寫好終是不愜意季留道草草塗鴉留著補補壁罷林林道謝收了此時陸續又來了幾個客人便吩咐擺起台面來相幫答應上來用兩隻方台拼長當中湊兩隻茶几白布攤起一樣樣的白殼盆子擺好慶如寫了局票拱客入座彼此都是至好脫略形迹各歡呼暢飲起來林林卻也插在中間高談闊論思想很高尚議論很透癖那些座客大半從日本留學回來也沒有他的見解都驚服起來也有羡慕的也有妒忌的不必説他談了一會局都到齊慶如一看都已不認識了問起從前幾個人嫁的嫁走的走風流雲散感慨一會等到席散以後客人一哄而散慶如心中忐忑不定躺在榻床上沈思一會便叫一個娘姨叫做招姐的過來附耳小語幾句招姐點頭扯了林林到後房去卻切切促促不知説些什麼少停出來也不回復慶如徑自去了慶如知道無望怔怔良久只得立起身穿馬褂林林説聲還早哩慶如道我要回去林林説聲明天來慶如大失所望怏怏的走出一路毫無興頭徑回寓處來無情無緒便自睡了明日起來外面交進一封信來拆開看時上寫著東方亞猛君賜睞今有一女子自知拂君之意思假園遊以為乞恕之地君如許我者下午三時請駕油碧以俟茶花謹白慶如喜極看鍾上只有十點鍾便催飯來吃了竭力的修容飾貌一回用清水嗽了口梳一根光光的辮穿了一套新衣服在鏡子裏照了又照看了又看正想出門又想時候只有一點鍾去早了恐人要笑不如先睡一覺養養神便倒在床上哪知竟睡不著反覆了好久索性起來出門數步只見日光絢爛天氣晴和路上行人個個欣欣有喜色像助我歡喜一般簷頭的鳥聲樹上的葉色也都有精神盤桓了約有一個鐘頭道是時候了一徑走到迎春坊來走近門口林林接著道看見我的信麼慶如道看見特來敬踐玉人之約林林笑道還早呢慶如一看表原來只有一點半鍾心裏也詫異起來怎麼我兜了這許多圈子只去了半點鍾功夫便笑道原來還早我們談談也好今天林林因為要出去所以起來得早已經在那裏梳頭了慶如坐在旁邊見一時無人便至身邊低低説道昨天阿招姐不曉將曾把鄙意對君説麼林林頓時臉上起一陳紅暈半晌不言慶如又説道不是仆敢生妄想實是敬仰芳姿幾於患病若使卿還不許我我怕要瘋了林林沈吟半晌欲言不言慶如又催道是否請卿速言林林方才靦靦腆腆的道亞猛君君的深情我已早曉君有命令我是不敢推卻的説罷把一隻手伸出來慶如照著西禮用唇去親了一回口裏説道感極感極林林卻又歎道亞君此地不過如馬克在恩説街的時候罷了至于匏止坪之樂境我生平沒有過能得找一塊清靜地方你我兩人間處其中日日的看花飲酒這種境界我眠思夢想了許多時不知到了什麼時候才可以如願了慶如道你要享這種清福卻也不難只消過了節除去牌子或是新閘或是愛文牛路或是仁壽裏租幾間房子住上幾個月豈不同匏止坪一樣我又沒有什麼事可以一天到晚陪你的只是要盼到天長地久不要像馬克末後便好了林林笑道只要你沒有家庭的阻擋這末後一著是不怕的慶如道我家裏倒不要緊只怕什麼公爵伯爵要來纏擾呢兩人密切的説話不覺頭已梳好慶如又點子菜交付大姐叫廚房預備起來便一同出來坐上馬車徑往西來慶如因聽得人説王家庫辛園景致清幽吩咐一徑到辛園在木樹中坐了一會直到日落西山方趨著夕陽西去已兜了一個圈子慶如此時如騰雲一般覺豔福無雙不知如何是好回到家中請客叫局一如昨日慶如卻無心於此不多時已散了席客人陸續走了慶如便沒有回去真是魂銷寶帳春透紅心也算是姻緣美滿了次日下午元戚去找慶如誰知娘姨回道不在元戚詫異又到他寓處來只見慶如一人躺在睡椅上只是發呆見元戚進來也不招呼元戚望到桌邊見有一封信擱在各裏看時上寫道茶花慧奎昨晚不揣冒觸玉人自知非分之福災禍立至果也同夢方酣乃有他人入室仆不足惜如卿之名譽何想卿慧心人必知所以自重若然殆為仆發乎仆不敢復造卿之室矣良緣革草影事匆匆臨穎涕零不知所語亞猛謹句元戚看了大驚道怎麼又決裂了呢慶如不答元戚怪異不過便拉慶如起來叫他一同出外散步慶如拿好信封叫侍者送到迎春坊方才同元戚出門訪了幾個友説了幾句慶如終是沒精打采的問他緣故又不説叫他到迎春坊又不肯只得大家胡弄局同到江南村去吃番菜慶如也不叫局坐了一會只説身體不好一個人自回寓來侍者接著慶如便問信送去怎麼説侍者道送去時我沒有上樓只在樓下叫娘姨拿上去的等於一會娘姨下來説曉得了沒有回信你去罷因此我就回來子慶如呆了一呆又問你聽見什麼話沒有侍者道似乎聽見樓上有人説鴨水臭也聽不清楚不知是誰説的慶如氣得發昏把腳連跳道罷了罷了侍者不知就裏嚇得退出去了慶如便躺在椅上原來慶如癡心未絶盼望這封信去後林林必來賠不是就可以復歸於好哪曉竟弄得瓦解冰消不覺又懊悔起來
