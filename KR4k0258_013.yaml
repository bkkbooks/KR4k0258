body:
  text: 第十三回海天萬里快整歸裝石上三生相逢狹路那時慶如已將次畢業幾年海外祖國縈懷不料竟有許多變故所以急急要想回國來察看一回看見鐵山到東京便時常過來問些中國的事過了幾時收拾回國慶如一到上海此時上海縣已不是他的叔父了便另找寓所住下次日來訪元戚相見之下寒喧了幾句慶如笑問道我看見那些小報上説的什麼追悼會是你開的這中間怎麼一個情節且請説來元戚歎口氣道真是一言難盡便將上項事説了一遍道我此番造了這一番因緣總算享了些人生幸福只是往後的悲苦加利償還不止難道紅顔薄命老天竟有成例可循牢不可破的麼慶如搖著頭道那卻不然從前中國男女錯配的多往往有駿馬馱癡的事釀成疾病更有家庭專制鬱鬱不得紓的所以古諺相傳把薄命兩字作了女子的徽號其實都是婚姻不自由的緣故是人作的並不是天派的不過古人先有了迂腐的見解不歸咎于人之立法不善卻歸咎於天之造命不齊那真冤枉呢但看泰西各國自由結婚之後何曾有半途夭折的事至於像珊珊的早卒大約由於反動力過巨恣縱極了反要短命也算是人自己造的呢元戚聽了方不言語慶如又問道我聽上海還有個武林林哩他的名望比珊珊更大你可相熟嗎元戚躍起道怎麼不曉得那人的曆史我都打聽明白了他本是杭州人氏本姓石他父親也是一個秀才平日訓蒙度日只因一病身亡他母女在家存身不住到杭州來投親遭了誆騙以致墮落煙花轉徙到滬有一個秦姓客人很賞識他曾把他娶回湖南原籍過於一年又因事下堂此刻重張豔幟生張熟魏雲集其門他卻比前更覺生得風流那思想也高尚了許多還聽得他在家裏最喜歡看的是巴黎茶花女遺事常説青樓中愛情最深的要算是馬克格尼爾姑娘卻並世又生了一個亞猛兩美相台演出這一樁韻事可惜東方偌大一個繁華世界卻沒有這樣兩個人豈不使花叢減色所以他立志要學馬克那一本小説書從頭到尾背都背得出只是還沒有知心的也可當那亞猛的也是一樁缺憾慶如聽了跳起來拍手大笑道那東方亞猛除了我還有誰人我們就找他去元戚笑道你可曉得亞猛初會馬克是在戲園裏麼這武林林最愛聽戲常到丹桂裏去今天又是小子和的打花鼓大約他必在那裏我們何不也去聽戲作個不期而遇呢慶如踴躍願往當下就在元戚處晚飯先著人去定一個廂大約八九點鍾的時候便同行往湖北路來到得戲園就有案目領入包廂卻是三包靠著戲臺頂近慶如沒有坐下先向兩邊廂房一望只見花團錦簇已到了許多大家眷屬青樓蕩婦也有挂著花籃的也有裝著水果盆子的最闊綽的還點著一對水月電燈卻緊靠他們廂房的裏面一間裝飾得更整齊些客還沒有到只有一個年輕的男子坐在那裏穿一件白竹布短衫外套一件黑洋緞背心已發出黃色了赤著腳卻穿一雙黑布鞋子在那裏呆等慶如看是龜奴模樣便不理會元戚卻問案目間壁包廂是誰定的案目説一聲是迎春坊武林林便匆匆的招接別人去了慶如聽了暗喜看臺上時正做夏月潤的花蝴蝶跳五張台一時臺上台下喝彩的聲音如春雷振蟄一般以下便是七盞燈的二進宮孫菊仙的搜孤救孤都是拿手好戲慶如暗想時候已有十一點了那人怎麼還不見來正在盼望接著就是打花鼓出場小子和扮鳳陽女子雖是荊布裙叉越顯得花嬌月媚林步清扮的公子小保成扮的龜子插科打諢詼諧入妙那時千百隻眼的視線齊集在臺上口裏叫好眼裏出神慶如也覺可觀便擡著頭望只覺著鼻管裏有一陳異香透人心裏更迷迷糊糊的只道是臺上吹下來的不料一回頭卻有一個天仙般精神花朵般相貌的妙人兒端端正正坐在隔廂慶如反覺糊糊塗塗的問元戚道是不是那人來了元戚一回頭恰好林林也回過頭來正打個照面見他兩人交頭接耳的光景不覺微微一笑瓠犀一線渦印雙圓竟把慶如的魂靈直提到半天裏再循著拋物線落下剛剛落在林林身上呼的一聲被他吸入心裏去了半晌半晌開不得口直到一出戲做完老旦出場戲客紛紛的散出方才驚醒看隔廂時已空空的了便問元戚那人幾時走的元戚道你難道沒看見麼走了好久了慶如道我只覺眼裏花花的不曉得他何時才走元戚道我明明見你一眼不瞬的看著他他看見你這樣不曉得掩口笑了好幾回又同他的娘姨切切私語了幾回臨走時又回頭看了你幾看方去我正羡慕你會吊膀子原來竟是沒帳慶如方懊悔道我怎地這般昏了竟沒有領他的好情説罷又歎口氣道顛不刺的見了萬千這般可喜娘罕見元戚催道快走罷人都散了別瘋魔了慶如方才走出園來一路還估量著林林的容貌裝束不知不覺已到寓所元戚作別自去這一夜慶如如何睡得著翻來覆去直到天明等到窗上顯了魚肚白色不多時晨曦射入倒反睡著了直至午後兩點鍾醒來用些午膳覺得無聊便信步來訪元戚卻又不在只得獨自雇了一部馬車想到張家花園去散散心剛轉到南京路上只聽得蹄聲雜杳那馬車接成一字上面坐著粉白黛緑的麗妹獅頭驢足的少年還夾著些西裝剪發的學生都是往著泥城橋外迸發那馬夫只得按轡徐行魚貫而進卻見各種西人馬車一部部超前過去慶如方記得今日是禮拜所以格外熱鬧些此時慶如已改了裝結了一根假辮穿的一件湖皺夾衫外罩一件瓦當文的寧綢馬褂腳上穿一雙絲襪蹬著元緞尖圓學士鞋正是三秋天氣金風送爽清氣逼人在路上看些秋色不一會進了園門在安塏地兜子一個圈子慶如嫌著人多一經出來走到海天深處逛了一回又見照相處有許多麗人在那裏照相慶如踏進門去看了一回雖都是北裏名姝卻無武林林在內無精打采的出來踱到停車所在正待上車回去忽聽得一陳馬蹄聲從柳陰中駛出一輛橡皮輪的皮篷車向園門口直飛進來車上坐著兩個麗人左邊一個襟上簪一個碗大的紅茶花異香四溢恍惚是武林林模樣慶如便不上車了連忙跟著走來卻見馬車是徑向東南角上林木陰翳處去的慶如也就跟去到一茅亭邊聽得草地上有笑語聲遠遠望去前面一人穿著月白色的外國緞夾襖下面束著湖色鑲邊元色花緞長裙卻正是武林林後面一個打扮得乾淨俏麗卻是個大姐兩人一頭説話一頭緩緩走來剛同慶如打個照面慶如本要看個仔細不意到了面前忽然一陳眼花逼的不敢仰視不得不把頭低了拼命睜開眼時那人已走過了覺得眼中還是花花緑緑的怔了一會正待轉身只聽一人叫道大少還沒有走麼原來那個大姐又走回來呼招他呢慶如如獲至寶忙答道正是你是跟哪一個的大姐笑嘻嘻道我們先生叫武林林住在迎春坊他方才見你有些面熟叫你晚上來一趟有話對你説慶如大喜道曉得曉得吾晚上必來大姐又叮囑道你不要忘了我叫阿珠你晚上找我就是慶如連連答應大姐方笑著去了慶如得了這個資訊喜從天降回步出來恰好林林已上了車回頭對著慶如一笑就風馳電掣的去了慶如才見他腮邊有兩個渦兒含著無限風流心中一動不知如何方好半晌方走上車來吩咐速即回寓胡亂吃些晚飯等到天晚三腳兩步趕到迎春坊來認明門口走了進去上得樓梯娘姨們出來招待卻一個不認識問先生時出堂唱去了問大姐時跟堂唱去了
