body:
  text: 第十八回喪名譽陳元戚反顔耗資財項慶如落魄到了明日清早就有許多中西探捕將他提了出來同了許多犯人把鏈子連做一塊徑解到新衙門來卻沒有除去手銬路上看的人都指點笑罵屈受只得把頭低了等到中西官升座審了幾起案件方是屈受上去正要伸説冤苦只見昨日捉他的華捕對西官説了一陳話西官便叫押起來重辦屈受還要説時被旁邊一個通事大喝一聲道不許開口就有原差上來要仍行帶去管押幸虧一個華洋同知見屈受不像下流人物便喊他走上前問他是什麼屈受含著眼淚把自己本是湖北新派的留學生路過上海在小錢莊換洋受詐的事一一伸訴出來那通事接嘴道老爺不要聽他的話看他這個賊形還是學生麼方才領事大老爺已經斷定的了那官兒不聽又喊店夥上來問了幾句話方同西官説了幾句西官連連點頭那華官便喊屈受又上去説道你説你是個上等體面人我卻有些不信你須要找一個在上海的上等體面人來保你方可作為你是留學生的證據那銅洋就不是你的了如果沒有人來保就要押在捕房三個月還是從輕辦的哩屈受一想回道學生初到此地人地生疏找不到什麼體面人只有一個叫做陳元戚的聽説在一家印刷局裏做事又是同鄉又是有些交情不曉得可請他來做保人麼華官喜道那元戚先生是此間一個大新學家又本是一個留學生他肯來保你足見你也是留學生了這是頂妥當的保人有何不可只是你不要扯謊拿不認得的人當做認得那是要罪上加罪的屈受答應下來就有一個巡捕帶他出去叫他寫一封信去請元戚一面暫時仍押回捕房屈受料道立刻可以出去也覺欣然不似來時的愁苦了卻説元戚接到這信嚇了一跳曉得是一個湖北留學生雖非十分要好卻也相識正是兔死狐悲物傷其類便趕到巡捕房來要想保他忽地轉一念道他不知犯的是什麼罪如果案情重大我保了他豈不是我同他是一黨把我在上海的名譽都毀壞了還是先去問明事由再作計較的好便一口氣跑到巡捕房來剛進大門走過一個鐵柵窗口恰好屈受在窗內瞧見好像失乳的羔見了母羊一般直著嗓子大喊元戚元戚元戚回過頭來見這囚首垢面的形狀吃了一嚇拔腳就跑一擡頭已到了寫字房方才立定兀自心頭亂跳捕頭問他認得這姓屈的麼元戚連忙搖手道不認得不認得又問你肯同他作保麼又連連搖手道不保不保即轉身出來走到半路想起究竟他犯的什麼罪沒有問明又想起究竟是個同鄉如何就説不保了心下很過不去要想折回再保卻已不及只得怏怏回館看官聽説這件事就是元戚失敗的關鍵後來屈受整整的管押了三個月方才釋放趕到東京那邊的同伴已等得不奈煩屈受訴出情由大家切齒道元戚枉是個同鄉中表表的原來如此勢利當下憤憤不平開了一個湖北留學生的同鄉會推屈受上去報告被難情形便有一個提議要把元戚逐出湖北學生界當下諸同鄉因元戚太無公德都贊成此議印了許多傳單報告各處那時慶如季留公一等也知道了暗道原來元戚冬至夜不到是為這個緣故心下鄙薄其人從此來往得疏了卻説元戚得知此事又是懊悔又是惱恨又是氣苦正是萬難消受忽地把腳一跺道他們既經不留我的體面我也要對不起他們日暮途遠只得要倒行逆施了曉得慶如們疏遠他他就不來聒噪打聽朝延主張立憲重用法政學生連賈新民也得了極闊的差使心下很是羡慕自忖上海存身不住不如翻過臉來到京裏去運動運動不怕不升官發財那時你們幾個窮酸那在我的眼裏主意打定收拾行李一溜煙上京去了慶如因不曉得這個事尚未去送行後來有人來告訴了慶如向林林歎道元戚這個人是極聰明極多情的只可惜宗旨有些不定像我既定了這個主意無論什麼橫逆如何能奪得去林林道你難道不想上進了麼你出洋的時候難道不想圖個出身麼慶如大笑道你如何沾了紅樓夢中薛寶叉的習氣呢出洋留學為的是求些文明學問豈是為了做官才去麼自有那些卑鄙惡劣的人拿留學頭銜當做加捐八成儘先補用花樣一般就把留學界污穢了林林道有了學問原為圖謀公益起見做了官豈不更易做些事業難道一定要發財麼慶如道這句卻通但必須國家真真立憲大家熱心公益那時方才可以做官方才有些事業做出來若政府仍是腐敗社會仍是惡濁就叫做一木不能支大廈任你英雄好漢做了官也就一籌莫展了林林笑道你這句話我要駁了古人常説英雄造時世時世雖不好果是英雄自然能把他翻過來若個個不做官如何能造時世呢慶如鼓掌道你只知其一不知其二所謂英雄造時世這個造字好不煩難決不是做官就可以造的必須做一翻驚天動地的大事業方算得是再造世界若是做官就有職守拘束縱能小小補苴仍是無裨大局只怕風會所趨自己也把持不定不免隨波逐流那時自命英雄者安在這造時世兩字更説不上了比方此刻政府雖是隆重留學生但是于苞苴女寵依舊是喜歡的那就不啻懸此一格以詔留學生合格者進不合格者退於是留學生中要做官的不得不鑽門路不得不進賄賂不得不請安磕頭不得不脅肩諂笑更不得不千方百計購求美色以博顯者之一樂你想有氣節的人肯麼然而如果大家不肯去做那政府無可如何或者降格以求無如自有一班下流種子枉是受過文明教育一般也蠅營狗苟起來那政府得了手自然更高不可攀了這種既經失節於前就有學問也決不能施展於後倘使稍稍施展只怕就削職而歸前功盡棄了所以現在一班得意的留學生都是從舐痔吮癰中得的功名難怪我但願作青樓的狎客不願為朱門的走狗也林林不服道這是你憤世妒俗之談難道人人矚望的中國主人翁竟如此不堪麼我雖是青樓賤貨自揣也不肯為此難道他們肯麼慶如大笑道你的人格本高出他們百倍何苦自輕自賤呢林林還要説時聽得阿招説道怪道天這般冷原來竟下雪了慶如推窗一看果然搓棉扯絮的降下一天大雪林林也亭亭的過來與慶如並立窗前只見琪樹瑤花內外一白慶如覺得丰韻清絶低徊了好久陡地身上冷起來方想未著大毛衣服便思回寓添衣並看看外間雪景便與林林説了匆匆的踏雪回寓原來慶如的寓所是賃在一家書鋪樓上用了一個侍者服侍此時侍者接住便送上許多帳條來慶如看了道怎麼這般早就送起帳條來了侍者道今天已是十二月二十一下今年又是小年離年底下只有九日了所以各處帳條俱已發出慶如一驚道怎已這時候了我當還有好幾日呢只得細細檢點只見江南村大菜館有一百餘元公大的馬車行有二百元謙吉的衣莊有三百元慶和的銀樓有三百余元連零星小帳共一千二百餘元嚇得目瞪口呆道怎麼有這許多我只當不過五六百元罷了因又細細核對卻又不差原來慶如家本中資頗多現蓄所以任情揮霍加以生性慷慨不較錙銖誰知半年之間已欠下這些巨債當下搔首摸耳籌思無計檢點行篋只剩二百餘元心下盤算道此次開銷各帳再加上武林林處一切開銷總得一千八百元方能敷用我前日已寄信回家囑將今歲所收秋租盡數寄出大約可得千元卻尚不敷五六百元這便怎處
