body:
  text: 第十二回林子桃義釋黨魁曹夢蘭深諳交涉原來那人正是孫求齊元戚跳起來道你怎麼會得回來的我只道今生不能見你的了求齊搖頭道一言難盡我此番真是死裏逃生十分僥幸若沒有林觀察一番好意仗義釋放真要不得見你了元戚道林觀察是不是江蘇候補道湖南林子桃麼求齊道不是他還有誰人我那天從上海趕到漢口恰恰得了凶信馬上扭轉身就走那時船上盤查已是十分緊急我又是改了西裝更容易惹人眼目我也無可如何只好聽天由命後來漸漸的我坐的房艙外面窺探的人越多也有偵探裝束的我出去走動走動都有人跟著正在著急忽然一個當差的走來説是我們大人請到官艙一談我想事體不好索性跟他前去看是如何不料一進官艙卻見是一個偉丈夫同我見禮坐下便問我的姓名我看他意思甚好便老實告訴了他他卻流起淚來道時事如斯諸君熱血可敬刻下雖然失敗不可因此灰心今日之當代為設法就吩咐當差的將我行李取來與他同房居住有人來問只説是他親戚到了南隸他雇了一乘轎子將我擡進他的公館住了些時聽見風聲稍好方才動身到上海來你道險不險呢元戚也替他慶幸道這種冒險的事可一而不可再的你以後謹慎些不要再同他們亂哄了倒是上海青樓中很有幾個俠妓可以發抒壯懷便又把珊珊的事告訴了求齊求齊深悔來得遲了幾天沒有遇見國色心中也存了一個訪尋的意思子當下求齊就住在元戚那裏漸漸跟著出門遊散把復仇之念忘了那時北京匪亂早已平定八國聯兵分據了地方倒整治得十分安靜那些排外的大師兄二師兄到了這時候都挂起某某國順民旗打了幾句外國話洋大人洋大人喊個不住還要仗著洋勢去訛詐人家卻忘記了自己原是個義和團這種情形不一而足只是洋人查察實在精明只要曉得他做過拳匪便拿來殺了打了算為報仇往往有達官高宦被人告發拉去為牛為馬真是衣冠塗炭那也不用説了只是留京的官員倒是個極難處之事那洋人戰勝之後威風十足如何肯來就我範圍不要説辦事連酬酢都是難的就是外交老手的李傅相也常常有碰釘子地方哪里曉得香國中間卻出了一個豪傑運著一雙纖腕洋人應酬得八面周到只怕那些盛名鼎鼎的外交官都不如他哩那人是誰就是狀元夫人曹夢蘭他一生的事實自有他的歷史到那個時候已經半老徐娘了誰知他從前曾經跟著使節到過德國能説德國的言語恰好此時在京張著豔幟便放出他的手段運用他的神通把那些洋員弄得隨手而轉天天的車馬盈門到成了一座極熱鬧的外務部了有一天有一個大員在他家裏請客請的是聯軍中的幾位將帥還有治理地面的官員這一席一來是聯絡邦交二來是乞憐昏夜那日主人老早就到了整理收拾弄了那樣又弄這樣鬧一個不清頭又怪他當差的不會辦事大罵了幾句夢蘭正在梳洗聽見了皺皺眉頭道成什麼樣子呢便出來勸道你老人家歇歇罷他們有一回兒來呢也不犯著這般起忙頭呀那主人直跳起來道你曉得些什麼那洋人是好將就的麼如果稍有待慢那真要我的命了夢蘭笑道洋人也是個人我們也是個人總有個情理可講何必那樣怕呢據我看來應酬一道雖是不可不講卻也要有個分寸不然倒要給他們看輕的那人被他搶白一陳正要發作恰巧洋官到了趕快出去迎接對面就請了安側身引導直接到房間裏請在上首坐了吆喝著泡茶倒酒出來一面斜著身子側坐相陪什麼天好呀路遠呀亂鬧洋人也不答言盡著張望那時夢蘭不慌不忙的説聲密斯忒好早便把雪白的手伸了出來洋人連忙躬身回答也拿手伸出曳了兩曳曉得他能操洋話便蟈蟈咕咕説起來那人一句不懂坐在旁邊幹急要説一句話通事也不替他翻譯只好罷休等到酒席擺上洋人也不睬主人只管大吃大喝談笑自如夢蘭卻侃侃的講些難民的苦楚市面的敗壞談一陳笑一陳到後來洋人也答應相機辦理通席沒同主人講一句話竟是走了主人仍舊恭恭敬敬送出大門看上了車方才回來把夢蘭的肩上一拍道幸有你的你原來有這種才能我倒看你不出明兒具一個門刨占子來拜你做老師學些洋務的經絡你可肯收夢蘭笑道你們這一班外交官竟這等沒出息見於洋人嚇得什麼是的想我那年在柏林的時候看見那些外部的人真算是一把能手呢有用柔軟的有用剛強的各有各的手段一個賽過一個哪里像我國這種鏟頭那主人聽了大為無趣又不敢觸犯他怕他告訴洋人只得訕訕的走了夢蘭回頭對他的娘姨説道你看這樣人可笑不可笑冤枉還是個官只曉得到窯子裏來吃花酒發脾氣使足他的官腔見了洋人便像小鬼見於大王一味的掇臀捧屁教我那一隻眼看得上若説現在的國勢實在不興難怪洋人欺侮但終究是一個自主國哪里好由著人作主呢正説時又有人來打茶圍便止住了那打茶圍人姓石號叫耕朱是一個江蘇人在京裏警察局裏當差捐了一個官在身上同夢蘭是在上海便相識的當下坐了一回便辭出來徑回寓處只見家人稟道上海來了一位客説是老爺的舊交今天來拜過住在西河沿客店裏便把名片呈上來耕朱看是紀永業三個字曉得是南方一個豪傑此番到京必有什麼運動便去回拜了他原來這紀君號鐵山上海舉人曾在武備學堂畢業年紀不過二十幾歲高才博學大節英風所以各處志士都推他做個領袖他卻不事生産不事冶遊終年奔走都是國民的大事業這次到京是為要到日本遊學想運動些官費誰知此時正是大難方定瘡痍滿目的時候兩宮雖已回京李傅相卻又死了大小臣工著急的是趨承洋人誅除瓦礫哪有心情來識據寒酸做那沒要緊的事鐵山又是心情耿介不肯阿附權貴所以竟白跑一趟當下與耕朱見了説明就裏便搭船回到上海幸虧有幾個朋友大家幫助了些擇定日期出洋一到東京就有慶如一班人來接洽
