body:
  text: 第十六回日麗紗窗喁喁小語風生綺席炎炎大言林林回過頭來秋波滴溜匏犀乍呈更覺國色無雙名花絶世慶如方道你看這朵花的嬌豔真到極處了卻近了你時反覺得他的色香收斂了些似乎相形減色一般足見卿的豐姿絶妙但除了這種茶花別的花更配不上你即如牡丹的富麗維多利亞的奇偉櫻花的爛燦雖有國粹之名卻都與美人不甚相稱譬如一個盛飾的女子雖是豐容盛髯但未必為人人所愛惟有茶花的含煙欲笑帶露如顰方合那美人身份所以馬克格尼兒姑娘生平喜簪茶花足見他的賞鑒不同好在此花中西皆有安見中土奇葩不及巴黎異種我卿會心不遠真令我心神俱醉了林林一面梳掠一面格格笑道你倒説得好頓時為此花增了許多聲價你既這樣説何不就將此意起個樓名呢慶如思想一回道這樓名用茶花第二樓五字可好林林點首道雖是落了窠臼總算還妥當就用了他罷少頃平季留來請他寫了就好裝潢起來了不一時梳洗已完坐到靠窗一隻榻床上來慶如挨身上來悄言蜜語領略那溫柔的趣味撚挪了好一會所請之客陸續的到了公一季留牧求齊元戚共計五人只有賈氏弟兄未到慶如因又發票催請公一問道這兩人是誰何以我們未曾見過慶如道他們原是同鄉一向遊學日本前日方才回來因出洋較後所以沒有會見諸君同我也無甚深交不過前日曾來拜我所以不得不應酬他那個大的號叫新民聽説在法政大學畢業小的號叫鈞人在士官學校畢業的慶如一面説一面拿出一張上好宣紙請季留來寫匾額季留高興道寫是好寫但是何人給我拂箋磨墨呢慶如道就讓林林來當這個風雅之役罷林林低鬟一笑真個上前按好了紙季留濡了筆墨把那相了一相一氣揮成擱筆大笑道今日之樂真不數李謫仙在沈香亭上也大家通笑了正説時外面報客已到林林忙把宣紙收起即聽得履聲橐橐走上兩人前面一個頭戴一頂拿破侖的帽身穿一件長衫腳上革靴卻裝一根假辮還挂著極大的辮線對著慶如請了一個安後面一個身上也穿長衫腳上卻是一雙快靴頭上戴一頂日本高級武官的軍帽上面盤好幾條金線見了慶如頓時立正將右手在帽沿上邊一舉行了個軍禮他兩人見有許多人便要一個個見禮起來公一等笑不可仰的慢慢回轉身來連聲止住方才免去大禮但招呼了幾句須臾坐定慶如因時候已晚吩咐即擺桌面不及細談等到局票去後大家入席正上菜的時候只見賈新民軒眉攘臂的説道我們弟兄久仰諸位先生的大名今日真是幸會想諸位先生出洋最早呼吸文明空氣最多正值祖國改革政治預備立憲之時何故還逗留海上做那冷淡的生涯呢大約諸位先生運動的手段還沒有達到極點的緣故不瞞諸位先生説兄弟在東京發起了一個政治雜志極蒙家父第二所賞識此番奉召入京大有破格用人之意諸位先生如果不棄兄弟倒可做個介紹拜在家父第二門下到明春殿試留學生時包管狀元及第才曉得兄弟是個政府的間接主動哩慶如聽了不覺變色正要開言那杜小牧雖是個風流種子卻沒有到過東洋於新學界是個門外漢聽了這許多新名詞竟有幾句不懂得不禁問道新翁才説家父第二是個什麼東西呢新民把舌一伸道難怪外人説中國是個野蠻呢連家父第二一個政界大人物都不曉得他是當今政府最有勢力的外相王公掌著五洲萬國來往的大權卻是心地開通最肯提拔留學生不比諸位大老頑固的兄弟因為受恩深重無可稱報常説道生我者家父知我者王公豈不可以算得家父第二麼論起來稱他第二還是有屈最好要稱做特別的家父呢慶如不覺撲哧一笑只見季留立起身來向慶如發話道今天你安心來害苦我我要少陪了袖子一豁頓時揚長而去慶如挽留不及只望著林林笑那賈新民正説得高興毫不理會他兄弟賈鈞人等均不奈煩攔著他道算了罷算了罷你仗著學了幾年法政就想運動政府又要結連外交官殊不曉得外交全仗兵力為其後盾若不靠我輩一班陸軍學生認真練兵提倡尚武精神如何敵得過那武士道與天的驕子呢公一聽鈞人的説話倒還有道理但是他説的什麼後盾什麼武士道什麼天的驕子都是不懂便説道鈞翁説的有理中國就是兵力不振所以吃人欺負此刻惟有通國皆兵還可以救亡但不知鈞翁有何高見鈞人見公一贊他更加高興道據兄弟的愚見外國兵都是有學問的中國兵卻是招集市井無賴目不識了的居多兩邊程度相差得遠就勝負分了此刻練兵總要教兵士讀書識字最好是仿照日本將通國劃分區域舉行微兵的制度公一又不解微兵二字問道何謂微兵鈞人曉得公一不懂這種制度更加高興道微兵者對於募兵的稱呼就説他是招募來的這是微召來的小牧因新民罵他野蠻骨都著嘴半晌不言此刻卻忍不住説道這兩個字我們一向讀作徵兵原來日本卻讀作微字鈞人臉一紅尚未回答新民接著道征字就是微字日清字典上注明可以通用的小牧正要言語適值他叫的普慶裏林翠寶到來方把話頭打斷各局陸續到齊主賓也不能交談等到酒闌局散新民弟兄都道謝走了慶如復留公一等論茗清談林林先笑道季留的脾氣近來更利害了本來也是慶如不好像賈氏兄弟邀他來做什麼慶如唯認過公一微笑不言元戚道他所説運動的話倒也有些道理不一時衆人散了慶如住下正是新婚第二夕次日慶如補作了定情詩七律兩首送給各人季留於次日説開了仍行往來因他要在本籍辦學堂不久也匆匆的回籍去了
